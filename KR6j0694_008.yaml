body:
  text: 阿難如是衆生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想此結前起後也各各具者每一顛倒中各具十二顛倒一則現起餘則冥伏究其所以皆是顛倒妙圓真心而有都無實事上約無明熏真如而成染用為十二類生之因已竟下約真如熏無明而成淨用為五十五位菩提之因也汝今修證佛三摩提於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業本因即顛倒因也就本因亂想立三漸次者教其翻染成淨必從染處下手淨器所謂幻化空身即法身指六根也若不生滅地豈貯毒蜜豈可洗滌耶除去毒蜜者喻除助因刳正性也以湯滌器者喻違現業也後貯甘露者喻得無生忍安立聖位也云何下出漸次之名謂欲修習耳根圓通先當立此三種漸次方得證入也助因為增上緣正性是生死根本為因緣現業是根緣境緣除此三種緣則甘露寂滅法顯矣修習真修增進皆修也除助因刳正性違現業皆斷也所修即聞性所斷即根塵流根奔塵名現業忘塵盡根名違前說戒定慧為修行三決定義此三漸次不出戒定慧意云何助因阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切衆生皆依食住阿難一切衆生食甘故生食毒故死是故衆生求三摩提當斷世間五種辛菜是五種辛熟食發淫生啖增恚如是世界食辛之人縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日銷長無利益是食辛人修三摩地菩薩天仙十方善神不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚淫怒癡命終自為魔王眷屬受魔福盡墮無間獄阿難修菩提者永斷五辛是則名為第一增進修行漸次此釋除助因也衆生日用最切者飲食若無飲食命不自全故依四食而住也此四種食若大槩論有具不具人間段食所飱必有分段鬼神歆觸而飽有觸食禪天思食識天識食既無形色但以識思故五辛者葱蒜韭薤興渠也興渠此方所無五辛發淫增恚故須斷也如是下出過天仙嫌其臭穢餓鬼䑛其唇吻菩薩不來擁護魔王得其方便過惡多而福德消塵滓近而清虗遠若不斷除則日就月將漸為魔眷初心入道者必欲先除也云何正性阿難如是衆生入三摩地要先嚴持清淨戒律永斷淫心不䬸酒肉以火淨食無啖生氣阿難是修行人若不斷淫及與殺生出三界者無有是處當觀淫欲猶如毒蛇如見怨賊先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起禁戒成就則於世間永無相生相殺之業偷劫不行無相負纍亦於世間不還宿債是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險是則名為第二增進修行漸次此釋刳正性也對助而言故曰正淫殺與身俱生與性俱有實生死之正性故當刳之也無啖生氣謂無情有生氣者尚不忍傷況有情有命者耶防微杜漸之至也淫欲害法身損慧命視如毒蛇怨賊則不敢近狎矣執身不動者七支不犯也執心不起者一念不生也斷淫則不相生斷殺則不相殺斷偷則不償宿債三業既除名清淨人修三摩地者因戒修定也下文因定發慧肉眼觀見十方世界即色陰盡相覩佛四句即受陰盡相宿命二句謂去塵垢永離生死險難惡趣即想陰盡相云何現業阿難如是清淨持禁戒人心無貪淫於外六塵不多流逸因不流逸旋元自歸塵既不緣根無所偶反流全一六用不行十方國土皎然清淨譬如琉璃內懸明月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中是人即獲無生法忍從是漸修隨所發行安立聖位是則名為第三增進修行漸次此釋違現業也如是清淨持禁戒人牒上因持戒而發定慧者由欲界九品思惑已盡故心無貪淫於外六塵不多流逸而不許絶無者根中無始虗習尚未淨盡所對之塵猶在現業猶未違也因不下方顯忘塵盡根始違現業也既不流逸於外則不隨前塵所起知見而復歸元真外無所入內無所出根塵不接兩不相偶始得反欲流而全一精明至是六根對境不生分別如鏡照像即識陰盡相此正聞所聞盡已斷思惑因戒得定也十方下復顯忘塵盡根已後所證境界由根不接塵則世界清淨故見十方國土表裏洞徹猶如琉璃內懸明月即前如是浮塵及器世間應念化成無上知覺由塵不交根則無所繫縛故身心快然而身量心量平等不動故曰妙圓平等獲大安隱前云圓澄覺元妙此中妙圓二字正指覺相在如來為究竟覺故加密淨二字皆現其中者謂此果德皆現是人之心也華嚴十忍第三曰無生法忍謂不見有少法生不見有少法滅離諸情垢無作無願安住是道名之曰忍是人得不生不滅果地覺為因地心從定發慧也菩薩初入流時即以如幻三昧觀察俱空不生之理所謂理須頓悟乘悟併消故當下即獲此忍諸經說入地方證無生忍華嚴說等覺後方證今信前即獲者此經因地發心與果地覺名目相應故有因地無生法忍有果地無生法忍有因地乾慧有果地乾慧如新月與望月全無異體從是漸修以此不生不滅為因地心然後圓成果地修證下文住以成德行以成行向以成願地以斷惑證真皆以此位為基阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地欲習初乾未與如來法流水接續生以根境為因欲愛為緣乾枯不偶則因緣雙絶果報無托不受後有無界內繫縛矣無著曰虗不昧曰明欲乾則慧生依慧住持故名地乾義有二欲盡曰乾欲愛乾枯也但乾亦曰乾未與法流水接也法流以活潤為義無取於枯滯慧性明圓已具金剛之體但未能如意自在發真如體相之用下列聖位以十信為初因十住十行十向十地等妙相次而躡行人從信趨入住佛智地依智起行濟行以願超三賢入十聖登等妙修證之序即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住即以此心指不生滅心也中中猶前勝義中真勝義性圓妙指心體也上言妙圓平等但初獲此心而已如來密圓淨妙皆現其中但佛心映現而已今則自心妙圓之體如華開敷雖未齊佛之密淨然真中發真重重漸廣矣乘此心開益增進之愈妙愈圓也開敷重發漸入活境與乾有其慧不同矣深忍不動曰常住妄想即諸邊見妄想盡而中道純此時識陰相盡名信心住能安住信心也真純無妄之謂信相應之謂信以中道心純真無妄因心與果覺相應十心信為首故通名十信位真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住真信躡前位明了指本位一切圓通總該下文而言陰不能覆處不能局界不能隔無始習氣非唯修斷為難即能見亦不易今日現前則妄無所逃見妄乃能除妄無忘即念故名念住妙圓純真真精發化無始習氣通一精明唯以精明進趣真淨名精進心妙圓純真躡初位真精躡次位發化以下即四卷明相精純一切變現不為煩惱也前位習氣現前猶未能化此則真精洞發化無始習通一精明妄即歸真矣真淨即妙圓心體但須至密圓淨妙方是真淨以精明而進趣故名精進心精現前純以智慧名慧心住上位精明尚屬有心此方是自然智體上以精明進趣此以智慧菩提之體無復雜妄是名慧心前云純是智慧蓋斷惑之慧如夜向曉此云純以智慧蓋證真之慧如曉出日執持智明周遍寂湛寂妙常凝名定心住散心之慧有邊際而不遍有去來而不常故慧必資於定前因定生慧是返流之定如器澄濁水此先慧後定是常光之慧如燈貯密室遍寂常寂皆大定之相故名定心住定光發明明性深入唯進無退名不退心定慧雙運如車兩輪唯進無退精進猶是有心如馬著鞭不退是無心如順風使帆心進安然保持不失十方如來氣分交接名護法心前雖不退而勤勇無間尚涉工夫至此雖精進而不見有勤勞之相故曰安然持心至於安然則悠優坦蕩永保無虞矣所保持不失者何物即諸佛法身命脈也由我保持法身命脈而不失自然與諸佛氣分通同䐇合故名護法覺明保持能以妙力回佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名回向心妙力即定慧之力力承保持說妙力承覺明說前與如來氣分交接蒙佛慈光攝受尚有自他之分此以己之妙力向自己心佛安住實無二種心不離佛佛不離心如兩鏡相寫傳耀無盡故名回向心光密回獲佛常凝無上妙淨安住無為得無遺失名戒心住以微密觀照頓獲寂滅清淨心體故曰心光密回常凝即常住真心妙淨即清淨妙淨明心前位猶相對此則獲佛心矣常凝妙淨總是無為之相諸佛之戒心也一念有為遺失即是破戒住戒自在能遊十方所去隨願名願心住持戒猶覺著力住戒則自在矣隨願即自在之意遊生於住遊有資本故能如願所謂能遍十方供養諸佛也前位冥契此位親承修行之初必枯絶愛欲使心性虗明然後能入妙圓真性真性明圓細習乃現因現遂化使純智無習又持之以定使寂湛發光深入明性護持不失斯則回佛慈光獲佛淨戒而涉塵不染所去隨願十信之序阿難是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住妙圓真心非一非十約用差別故有十相若十相不顯不名發心十相不融亦不名發心故以三漸次為真方便開發十心如十琉璃各懸一燈炳然齊現是十信境界久之精光遍滿互涉互入全是一心了無十相如以十𦦨總安一琉璃十光互融光相愈大至此方名發心心中發明如淨琉璃內現精金以前妙心履以成地名治地住三漸次中即以不生滅為因地心但真心雖獲而無明尚存須層層破除乃得層層親切前破異相無明故如琉璃懸明月入住以來破住相無明故如琉璃現精金琉璃喻智精金喻理初住妙心始發今則履以成地一切境界皆是練治心地故曰治地前是理須頓悟此是事則漸除心地涉知俱得明了遊履十方得無留礙名修行住心地即上妙心成地涉知涉境不昧也俱得明了正是涉知之義二信明了是憶念之明此位明了是正知之明二信不能為礙如目遠視此得無留礙如身入空四弘六度任運而行不為境所礙前位心境相應此位心境一如故名修行住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住佛者覺也今既明了無礙即是隨順覺性故直與佛同便受佛氣分自求父母喻如意無礙陰信冥通指中陰同業會合之時喻受佛氣分也入如來種所謂我以不生不滅合如來藏也太子處胎貴壓羣臣故曰生貴前云氣分相接如近侍獲入王宮此云受佛氣分如太子親承遺體既遊道胎親奉覺胤如胎已成人相不缺名方便具足住親奉覺胤猶言親承正脈人相喻方便善巧之用謂聞見等圓通妙用具足一切方便善巧如中陰六根成就克肖父母也所修善根皆為救護一切衆生饒益一切衆生故名方便具足容貌如佛心相亦同名正心住心相佛心不動之相雖善巧方便而體恆不動正心即定心也前九信獲佛戒心至此獲佛定心身心合成日益增長名不退住身心合成牒上同佛之德日益增長謂境智愈廣也於增長處見其不退十身靈相一時具足名童真住有進無退具體而微故以童稱十身者菩提身願身化身力持身莊嚴身威勢身意生身福身法身智身蓋用雖未顯而體已頓足形成出胎親為佛子名法王子住出胎喻破障起用自發心至生貴名入聖胎自方便具足至童真名長養聖胎至此長養功成故喻出胎堪紹佛位曰法王子表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住表以成人堪行佛事也衆德全備堪令分化十方而行佛事轉輪聖王取四大海水置金瓶內灌太子頂是時受王職位菩薩受職亦復如是諸佛智水灌其頂故十地名灌頂菩薩十住亦分得也發心必治地治地乃修行然後生如來家而具覺相同佛心長道體圓十身為佛子任佛事十住之序阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行具足妙德躡前起後為十行總十方者現十界身利衆生也衆生根行有異菩薩隨順以形以說能化隨順也菩薩現種種化衆生隨順一一受化所化隨順也能所既皆隨順機應俱生歡喜施度也善能利益一切衆生名饒益行饒是豐饒無不益故戒度也戒有三種以饒益有情為勝九信獲佛戒心至此以佛戒為行矣自覺覺他得無違拒名無瞋恨行自覺覺他見諸衆生無一非隨順覺性故曰得無違拒非止能忍罵辱也無瞋恨行忍度也此中六度不比嘗途有一人不受法樂便是慳施一念不護衆生便是破戒一念分別衆生便是瞋恨種類出生窮未來際三世平等十方通達名無盡行隨機隨感現種類身窮未來際益物無量三世下釋所以也以知三世空寂故得窮未來際以達十方無礙故能現種類身若時若處現化不絶故云無盡進度也六住獲佛定心至此以佛定為行矣一切合同種種法門得無差誤名離癡亂行定心不能持諸法門是為癡定於諸法門未免差誤仍是亂心今一念定心能持種種法即有種種音聲一一分明不爽毫髮是名癡亂俱離禪度也則於同中顯現羣異一一異相各各見同名善現行同異各現不名善現同異互現乃是善現真不違俗故同中顯異俗不違真故異復現同智度也前位即寂而惺為定此位即惺而寂為慧十住獲佛慧心至此以慧為行矣如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行此總攝六度也塵中現剎名現界不壞塵相名現塵不相留礙者界入塵而界不小是小不礙大塵合界而界不大是大不礙小由善現行擴充圓融故著即留礙意無留礙則無著矣三住得無留礙是境不礙心此不相留礙是境不礙境種種現前咸是第一波羅蜜多名尊重行六度中以般若為第一以智度融之則五度皆趣智度是故咸是般若也般若極尊重故名尊重行如是圓融能成十方諸佛軌則名善法行前自成此成就衆生前雖利他總成自己行門此則行住皆成軌則依希天人師矣一一皆是清淨無漏一真無為性本然故名真實行前方便此真實也無漏與無為不平前以戒生定慧為三無漏學至此始得清淨耳前是有為法未能稱性此是真性本然妙用相雖萬殊體唯一真故曰真實從前至此始露性字染淨總如來藏而純淨無染方是如來藏妙真如性阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度衆生滅諸度相回無為心向涅槃路名救護一切衆生離衆生相回向滿足至留患牒前此行滿足當修回向行回向之行悲願最深故職在度生然見有可度即涉有為背涅槃路故須滅諸度相回無為心向涅槃路無為心即不生滅心也三漸次中即依此為本修因九信位始獲安住無為從無為法界建立萬行至此反本還原仍歸無為界中無佛可求無生可度回視前日所獲無為佛心依然無二從此漸向佛乘十住位中雖皆純用中道未嘗顯言度生是則趣空之智居多十行位中顯言度生是則出假之悲最勝此十回向顯然悲智等運真俗互融圓滿中道回者轉也向者趣也轉自萬行趣向三處三處者衆生菩提真如也衆生菩提是隨相真如是離相此與次位是回向衆生準華嚴經回向即是發願良以有行無願行必茫然有願無行願唯虗設故行願兼資方入如來大涅槃海壞其可壞遠離諸離名不壞回向壞其可壞即上滅除度相也遠離諸離即離衆生相亦遠離也名不壞者不壞度生事業也蓋有能度所度是可壞者今滅除度相是壞其可壞若能壞之心不空亦復可壞故須遠離諸離方名不壞本覺湛然覺齊佛覺名等一切佛回向此下四位是回向佛道本覺湛然自己本佛顯現也覺齊佛覺與一切如來心精通同䐇合也等一切佛回向者我與如來寶覺真心無二圓滿也精真發明地如佛地名至一切處回向精真即本覺體發明即發揮妙用地如佛地表因地所含無邊境界同佛果地所現無量剎土地字指本覺境地德用無不周遍故曰至一切處世界如來互相涉入得無罣礙名無盡功德藏回向此於地中觀諸功德也世界即至一切處如來即等一切佛前猶分自覺佛覺自地佛地此融一不分矣互涉者以世界涉如來則一一毛孔有無量寶剎莊嚴微妙以如來涉世界則一一微塵有無量如來轉大法輪無罣礙者世界涉如來時不礙如來即入世界如來涉世界時不礙世界即入如來無盡功德藏者佛各具無量莊嚴表無量功德七無著行現塵現界單就依報說此則依正報無礙等一切佛如月出雲至一切處如月照空無盡功德藏如月中現山河大地等影於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根回向此後從功德藏起無為之為也佛地躡前功德藏菩薩證此即同如來果地地中各各者以此藏中功德無盡如六度萬行皆其本有生清淨因者依彼本有一一隨緣各起無修之修如依金造器器器皆金豈不純一清淨依因發揮取涅槃道者乘因取果因果互徹萬德為萬行因萬行為涅槃因行從理起故名隨順平等能生妙果故名善根真根既成十方衆生皆我本性性圓成就不失衆生名隨順等觀一切衆生回向平等善根是真如體故稱真根前隨順諸佛平等此隨順衆生平等有一衆生可度非平等也捨一衆生不度非平等也約成則人人本成約度則念念不失方是稱性隨順此位又回向衆生即一切法離一切相唯即與離二無所著名真如相回向此下三位是回向真如即一切二句總是一意即相離相非滅相離相也無生可度無佛可成不著於即也度無可度之生成無可成之佛不著於離也前云遠離諸相者離之極也此則離亦不著矣七住云無著者不著於有為也此則無為亦不著矣前回無為心總是趣向真如今始明見其相真得所如十方無礙名無縛解脫回向真得是親證義所如即真如也若能親證真如則處處皆如業報二障不能係縛故能遊戲十方現身無礙無縛是解脫因解脫是無縛果性德圓成法界量滅名法界無量回向性即真如性德即真如之德相也凡有分限皆非圓成菩薩住此位中洞見一真法界圓滿成就不墮諸數有何限量是以剎中之塵塵中之剎重重稱性互攝互融故曰法界無量阿難是善男子盡是清淨四十一心次成四種妙圓加行四十一心者乾慧一信住行向各十加行者菩薩聖位難入須加功行特標妙圓別於小乘之四加第三漸次云身心快然妙圓平等已如礦中出金只缺一淨入信以來曰圓妙開敷曰進趣真淨至十行中方云一一清淨至回向中方云生清淨因可見四十一位總無加於前心只是方便磨鍊令之現佛境界如將真金重重烹鍊淨相益顯但有心有佛能所歷然尚非極淨之境故復以妙圓心成妙圓加行并前能所之相廓爾泯絶方得從差別因證地上平等因如金入九還方可成丹即以佛覺用為己心若出未出猶如鑽火欲然其木名為暖地向雖覺齊佛覺居然二覺也此以佛覺為己心但覺未全開耳此時菩提將達故喻鑽火無明將破故喻欲然其木暖相現前功不容間加行之相也又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地向雖地如佛地居然二地也此以己心成佛地但地未全融耳身入虗空喻非依也下有微礙喻若依也頂者將超未超之謂心佛二同善得中道如忍事人非懷非出名為忍地上兩位猶未同也此則二同矣前中中流入猶未得也此則善得矣忍取信順義心佛二同等即信順也如僧中辦事忍則默然既不懷疑亦不說出數量銷滅迷覺中道二無所目名世第一地前云善得中道雖心佛不分未忘數量此則心佛兩融而數量始銷迷中道覺中道皆是數量今二無所目高出世間故名世第一地凡有能所總為生滅邊事十住十行能所熾然無為真如尚在遙遠第十行後回無為心漸向真如矣然離衆生相又見真如相曰心曰佛曰中道皆是帶相真如四加行中初位佛即是心次位心即是佛三位即心即佛四位非心非佛重重淘汰方於真如之相少分破除方可出生滅門入真如門阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地下明十地地有成實發生二義蘊積前位至於成實一切佛法從此發生唯識此地以無分別智證遍行真如蓋一切差別總是菩提瞪發勞相此位頓證二空如清淨眼觀晴明空逈無所有故於大菩提善得通達此句是總覺通如來是如理智盡佛境界是如量智以初得法喜故名歡喜異性入同同性亦滅名離垢地前位斷九界異性入平等佛性但佛境未忘亦是清淨心中一點微垢故同性亦復除滅方得離垢蓋異性是濁邊垢同性是淨邊垢故須雙離淨極明生名發光地由離垢故淨淨極則明生真如自體相有大智慧光明義故名發光明極覺滿名𦦨慧地前云明生如火始然此云明極如大火聚覺滿者真如自體相有遍照法界義𦦨慧慧之至也一切同異所不能至名難勝地二地同異雙離止約衆生與佛菩薩三平等性此總該一切法也約體如空有約相如垢淨約諦如真俗約道如中邊約位如權實約教如世出世間但是一切同異緣影悉皆爍絶逈不相干所謂生滅既滅也向後寂滅現前總從此始誰能勝之無為真如性淨明露名現前地圓頓人發心即悟真如然心垢未除其於真如尚屬比知豈即親證今歷真修極盡有為功行則無為真如性顯現故名現前地盡真如際名遠行地上地真如既已明露此則盡其邊際尋常望之不見其涯窮之不見其量今則遍界遍空無不呈露不但現前已也初地盡佛境界是通達之盡此盡真如際是具足之盡盡無際之際豈不遠乎一真如心名不動地身口意業皆息即佛心菩薩心涅槃心尚不現起況復起世間之心故曰一真如心前獲無生法忍至此親證所謂徹法源底故名不動地發真如用名善慧地既得真體斯發真用凡所照應無所不真無所不如華嚴名此菩薩具四無礙智演說無量阿僧祇句義作大法師廣度羣品應時合節故曰善慧阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位慈陰妙雲覆涅槃海名法雲地自初發心以來皆修習事善慧已超八地無功用道悲智並圓修習功畢故名修習以結十地之因後乃十地之果無復修習蓋因地有修果地無修也慈悲利他妙智自利如陰庇潤如雲充滿涅槃海十地將證未證之果德菩薩悲智圓滿切鄰斯果稱合涅槃故云覆法字雙含悲智雲字攝陰如來逆流如是菩薩順行而至覺際入交名為等覺阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地如是重重單復十二方盡妙覺成無上道如來先證妙覺果海不捨衆生倒駕慈航逆流而出菩薩方取果海順流而入已至覺際故名入交與佛無間雖齊等尚未臻妙慧即本覺之體前欲習初乾而獲分覺今無明全乾而獲圓覺前乾慧如新生之月此乾慧如望夜之月雖淺深不同要之此慧只是空竟前慧乾慧暖頂忍世等妙位各一為單信住行向地位各十為復復五單七合之十二圓頓初心與如來同一覺道但約位次則後勝前前世第一是世間無上此則出世間無上是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入上文陳列位次若不開示下手工夫如數他寶身無半文故此段直指通修法門見得徹前徹後只用金剛如幻三昧觀察深入而已觀察根塵如幻便入乾慧觀察乾慧如幻便入十信乃至觀察等覺如幻便入妙覺十喻者幻人陽𦦨水月空華谷響乾城夢影像化也總是不取法門至堅至利一切境界應手粉碎故曰金剛總論之全是自性大定故曰奢摩他細分之種種地中種種差別種種觀察故曰毗婆舍那所謂微密觀照正指此也行者於自性定中用此微密觀照無修而修無證而證層層漸入直抵覺海故曰清淨修證漸次深入阿難如是皆以三增進故善能成就五十五位真菩提路作是觀者名為正觀若他觀者名為邪觀五十五位始乾慧終十地也等妙二覺即菩提也圓教外三乘所修皆屬邪觀對勝揀劣為邪非叛道之邪此經圓教異於常途全在以不生滅心為本修因及因地發心與果位覺名目相應圓融行布之旨全似華嚴而因中名目遍攝後位有出於華嚴之外者以常途相較果位全同因位全異中間安立位次名同實異常途先斷見惑次斷思惑次斷界外塵沙惑次進斷無明方許分證真如然則無生滅心至地上始有分此經直以如幻法門入流亡所還復元覺便得無生滅性為因地心故未入信前第三漸次便得無生忍如初生月便含圓月所謂因地全異也常途十信不過具四信心起五種行而已此則純真十心與佛相契常途十住不過信心成就入正定聚而已此則明見真心親住佛家常途十行依解起行而已此則稱性之修即真諦而入俗諦常途十向依行發願而已此則全修歸性由俗諦而入第一義諦常途加行由凡入聖更加功行而已此則以妙圓心成妙圓行遣除第一義諦之相併遣除心佛之相常途地上然後分斷分證此從初地以至妙覺不過泯絶證相方始圓滿因地初心如望夜月豈有外於初月哉所謂名同實異也至於前前位中每攝後後信位加以住名則以信攝住也十信之名八同常途獨於六信名以不退則攝七住及八地也八信名以回向則攝十向也住位第二名以治地則攝地上也四住同於華嚴四地八九十住同彼八九十地所謂因該果海果徹因原如初八以後月遍在初三月中此經所獨者矣爾時文殊師利法王子在大衆中即從座起頂禮佛足而白佛言當何名是經我及衆生云何奉持佛告文殊師利是經名大佛頂悉怛多般怛囉無上寶印十方如來清淨海眼亦名救護親因度脫阿難及此會中性比丘尼得菩提心入遍知海亦名如來密因修證了義亦名大方廣妙蓮華王十方佛母陀羅尼呪亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持初示密因次開修證證此極果正範具矣故請經名及奉持法佛佛相傳以心印心曰寶印清淨海即心海眼即智照心海之智曰清淨海眼阿難為親摩登為因常遍曰大執持曰方包博曰廣因果同彰染淨不滯於法自在曰蓮華王出生十方一切諸佛曰佛母總一切法持無量義曰陀羅尼誦持則如來智水灌其心頂曰灌頂章句說是語已即時阿難及諸大衆得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱三界九地地各九品煩惱今所斷除乃最後地之前六品微細煩惱所餘三品佛地方斷下談七趣使修楞嚴者不戀人仙天趣果不犯修羅三途因也經初每曰輪轉曰諸趣曰輪回日淪溺乃至十二類生而不及詳故復談之即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開衆生微細沉惑令我今日身心快然得大饒益世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蠕動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是衆生妄習生起世尊如寶蓮香比丘尼持菩薩戒私行淫欲妄言行淫非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受唯垂大慈發開童蒙令諸一切持戒衆生聞決定義歡喜頂戴謹潔無犯七趣皆障地獄尤苦故復詳問引淫殺妄三生墜之事起疑有定處者同受同見也自然隨業私受不同見也阿難此問一則以初卷云一切衆生業種自然如惡叉聚故至此請問其詳二則以世尊惓惓持戒一事恐衆生不信此事之切故詳問七趣因果使人悚然此是度衆生處佛告阿難快哉此問令諸衆生不入邪見汝今諦聽當為汝說阿難一切衆生實本真淨因彼妄見有妄習生因此分開內分外分阿難內分即是衆生分內因諸愛染發起妄情情積不休能生愛水是故衆生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行淫男女二根自然流液阿難諸愛雖別流結是同潤濕不升自然從墜此名內分阿難外分即是衆生分外因諸渴仰發明虗想想積不休能生勝氣是故衆生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沉自然超越此名外分前問六道為本來有為妄習招今答實本真淨則非本有但從妄習所生分即身分之分情緣身起故曰內分想勝離身故曰外分愛恨俱情情必化水貪戀本趣不求出離俱為內分聞勝事而渴仰為虗想想久觀成能生勝氣若染想即情矣情想升墜以輕清重濁而分雖勝劣有異皆為虗妄耳阿難一切世間生死相續生從順習死從變流臨命終時未捨暖觸一生善惡俱時頓現死逆生順二習相交純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊於四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下情想均等不飛不墜生於人間想明斯聰情幽斯鈍情多想少流入橫生重為毛羣輕為羽族七情三想沉下水輪生於火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄純情即沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十重更生十方阿鼻地獄循造惡業雖則自招衆同分中兼有元地一切衆生愛生惡死生從存住則順其習死從變流則逆其習經文互略也流逸奔塵曰順命光遷謝曰變生從順境而習染則無業不造死從變境而遷流則無業可造將死未死之際善惡之業歷歷現前則變流者來順習者去兩相交接隨業受報矣想體輕舉純即飛升若單修善必生天上若兼福慧淨願必心開見佛而生淨土可見念佛往生皆由於想但兼福慧耳勝想不純少滯邪情故感仙類輕舉非遠者竪不越四天橫不出輪圍遊者暫到非久住也經文通舉若等降論之則一情九想為飛仙二情八想為大力鬼三情七想為飛行夜叉四情六想為地行羅剎住佛座下即天龍八部之類雖滯邪情而有善願故感善緣情想均為人類人有聰鈍者想雖等於情而想之明有力則為聰情雖等於想而情之幽有力則為鈍六情四想為情多想少毛羣地行故重羽族空行故輕水火風輪餓鬼所受八寒八熱等報非天地下金水風輪受火氣以為身故常被焚燒或得水飲亦化為火故水能害己交過猶交勝也在火輪而又近風輪經缺八情二想生有間地獄有間即十八獄無間即八無間獄阿鼻此云大無間謂受罪苦具身量劫數壽命五者皆無遮間至劫壞乃出若兼謗大乘等則此劫雖壞更入十方阿鼻無有出期以謗法者令無窮人生邪見故毀佛禁戒如寶蓮香比丘尼誑妄說法如善星比丘無功而貪人信施謂虗無德而當人恭敬謂濫元地者各隨元由因地也前問地獄為有定處為各私受此答造雖各私報有定處蓋各作而同受也阿難此等皆是彼諸衆生自業所感造十習因受六交報上內外情想已結此下七趣應是別起而文若相連前論情想自勝向劣今詳因果自劣向勝二劣相接語勢就便躡之非仍屬上文也上論情想感變略明七趣下詳根境遘造精研七趣交報者六根交起惡報如眼造業餘五為助受報時亦遍及云何十因阿難一者淫習交接發於相磨研磨不休如是故有大猛火光於中發動如人以手自相摩觸暖相現前二習相然故有鐵牀銅柱諸事是故十方一切如來色目行淫同名欲火菩薩見欲如避火坑二者貪習交計發於相吸吸攬不止如是故有積寒堅氷於中凍冽如人以口吸縮風氣有冷觸生二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發二習相鼓故有血河灰河熱沙毒海融銅灌吞諸事是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵橛劍樹劍輪斧鉞鎗鋸如人銜冤殺氣飛動二習相擊故有宮割斬斫銼刺槌擊諸事是故十方一切如來色目瞋恚名利刀劍菩薩見瞋如避誅戮五者詐習交誘發於相調引起不住如是故有繩木絞校如水浸田草木生長二習相延故有杻械枷鎖鞭杖檛棒諸事是故十方一切如來色目奸僞同名讒賊菩薩見詐如畏豺狼六者誑習交欺發於相罔誣罔不止飛心造姦如是故有塵土屎尿穢汙不淨如塵隨風各無所見二習相加故有沒溺騰擲飛墜漂淪諸事是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺七者怨習交嫌發於䘖恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡二習相吞故有投擲擒捉擊射拋撮諸事是故十方一切如來色目怨家名違害鬼菩薩見怨如飲鴆酒八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見二習相交故有勘問權詐考訊推鞫察訪披究照明善惡童子手執文簿辭辨諸事是故十方一切如來色目惡見同名見坑菩薩見諸虗妄遍執如臨毒壑九者枉習交加發於誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善二習相排故有押捺捶按蹙漉衡度諸事是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷十者訟習交喧發於藏覆如是故有鑒見照燭如於日中不能藏影二習相陳故有惡友業鏡火珠披露宿業對驗諸事是故十方一切如來色目覆藏同名陰賊菩薩觀覆如戴高山履於巨海先言所感之境次言所報之事二習能所也交接相磨相然皆能所二境也下同淫習自耗其精火界熾然生有消渴內熱等症死見猛火宜矣如來為導師故色目以警之菩薩為行人故深怖而避之色目形容而名目也貪習計較來取如吸攬然吸生冷觸吒波羅忍寒聲青赤白蓮寒凍色即八寒地獄貪水即貪泉飲之生貪瘴海南方瘴癘之氣觸之即死慢習驕逸由輕陵恃己而發故感騰逸奔波之境血河灌吞之報西國有水飲之則癡慢屬癡是昏濁之氣瞋習身心熱惱心屬火氣屬金心火作氣鑄而為金故感刀山劍樹之境殺人而還自殺不知隨順衆生即是隨順覺性瞋火若除氣金不鑄無所容其刃矣詐習諂言勾引人若繩縛木禁索絞校錮使無所脫故感繩木絞校之境必浸潤已久令人心悅然後引入彀中如水浸田而草木長校是枷屬檛是槌屬誑習狂言欺人其志誣罔其心飛揚如風鼓塵使人無見故感塵土穢惡之境沒溺騰墜之報怨習包藏恨心故感飛石投礰等境相吞謂銜恨之人唯欲囓其肉而啖之不知視怨如親銜恩而不銜怨出世之正因也違害鬼違理害人之惡鬼見習謂惡見交明各有己見發明惡見有五一身見執身有我種種計著二邊見於一切法執斷執常三邪見邪悟錯解撥無因果四見取非果計果如以無想為涅槃之類五戒禁取非因計因如持牛狗等戒為生天因之類薩迦耶此云身見違拒相反者各執所是也由違反不肯就正故感王使證執以正是非如行路相見者狹路相逢無處逃避也照明者在業鏡臺前令其照明無所隱諱也能溺法身名見坑能致業苦名毒壑枉習無罪而加之罪不曲而強謂曲以氣𦦨逼人也兩山合來無逃避處合石謂石夾之排擠挫也迫蹙其體瀝漉其血又窄孔橫度其身如拔絲之狀能傷人名讒虎可驚怖名霹𮦷訟習攻發人之覆藏此覆彼訟曰交喧陳獻白也陰賊覆藏發則獲罪適足以自壓自墜故如戴山履海不戒訟而戒覆意欲拔惹訟之根本云何六報阿難一切衆生六識造業所招惡報從六根出云何惡報從六根出一者見報招引惡果此見業交則臨終時先見猛火滿十方界亡者神識飛墜乘煙入無間獄發明二相一者明見則能遍見種種惡物生無量畏二者暗見寂然不見生無量恐如是見火燒聽能為鑊湯洋銅燒息能為黑煙紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火迸灑煽鼓空界二者聞報招引惡果此聞業交則臨終時先見波濤沒溺天地亡者神識降注乘流入無間獄發明二相一者開聽聽種種閙精神愗亂二者閉聽寂然無聞幽魄沉沒如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧灑諸毒蟲周遍身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄三者嗅報招引惡果此嗅業交則臨終時先見毒氣充塞遠近亡者神識從地踊出入無間獄發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絶於地如是嗅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛砂礰擊碎身體四者味報招引惡果此味業交則臨終時先見鐵網猛焰熾烈周覆世界亡者神識下透掛網倒懸其頭入無間獄發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨髓如是嘗味歷嘗則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下五者觸報招引惡果此觸業交則臨終時先見大山四面來合無復出路亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄發明二相一者合觸合山逼體骨肉血潰二者離觸刀劍觸身心肝屠裂如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為爇歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷嘗則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙六者思報招引惡果此思業交則臨終時先見惡風吹壞國土亡者神識被吹上空旋落乘風墮無間獄發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍如是邪思結思則能為方為所結見則能為鑒為證結聽則能為大合石為氷為霜為土為霧結息則能為大火車火船火檻結嘗則能為大叫喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰造業招報根識必俱今以識為業而報從根者業並由心報多約色用中相背故諸根各別性中相知故受報原通悟時一根返元六根解脫迷時一根造業六根受報極悟境中一根遍滿法界極苦趣中一身遍滿地獄臨終先見是現生報亡者神識是地獄報六交皆無中陰直入無間從極惡論也眼主心心屬火眼為心之外竅故見火見業所取不離明暗交聽則水火相擊故有鑊湯洋銅交息息是氣故成黑煙紫𦦨交味味因食顯故成焦丸鐵糜交觸觸近欲事故成熱灰爐炭交心心屬火內外二火相然故成星火迸灑此由不能反見循元流逸奔色之報耳主腎腎屬水耳為腎之外竅故見水聞業所依不離動靜交聞從本根發也責詰是聲塵類交見則水火相擊發為雷吼變為毒氣交息則氣挾水散為雨霧變為毒蟲交味變為膿血之類交觸觸有形質陰陽氣合而為畜鬼糞尿交意亦水火相擊乘其意識起滅而為電雹摧碎此由不能反聞自性流逸奔聲之報嗅屬氣故臨終先見氣鼻息吸則下入呼則上出故神識從地而上復從上而墜嗅業所依不離通塞質礙也履通也因中恃虗氣以衝人今即衝本根不得自在恃見火而害人今氣衝見火為火炬自燒恃聽聰而損人今氣衝聽水閉為浸溺通為大洋沸海以滋味為厭飫今氣衝味皆成爛壞魚敗曰餒羮敗曰爽以利刃觸衆生肉今氣衝觸為綻裂腐爛為衆生咂食巧思傷人今氣衝思為灰瘴砂礰擊碎身體此由不能反息循元流逸奔香之報變嘗為味從所嘗得名貪味則網捕燒野故見網𦦨等相舌業所依不離吸吐吸氣為寒吐氣為熱因中舌噉生命使彼承領忍受故歷嘗發苦己亦承忍依嗅恣貪籠取羣味故為大鐵籠觸味傷物故感弓箭以自傷緣味思物故感飛鐵以充味雖但曰味細詳報處亦多口四所招此由不能旋味循元流逸奔味之報合山刀劍貪著男女身分而感此相倍多倍惡以淫習染合敗化傷倫起殺起盜積罪尤廣觸業所依不出離合屠裂即離相道趨獄之路觀獄王之闕廳案治罪之處刀插肉中曰剚括袋結口不令吐氣考縛繫身不容轉動耕是拔舌而耕鉗是夾具截是支解思則或降或升或熱惱故為墜飛煎炙此由不能反身自修流逸奔觸之報思屬土而漂蕩故見惡風吹壞國土思業所招不出迷覺荒奔迷思也知苦覺思也思必有所故結思為受罪方所見能鑑證故結見為證罪事合石等水土交感也火車等皆載物之具氣所化也叫喚悔泣痛苦難忍也大小等觸業乘亂思而變此由不能反思自咎流逸奔法之報阿難是名地獄十因六果皆是衆生迷妄所造若諸衆生惡業同造入阿鼻獄受無量苦經無量劫六根各造及彼所作兼境兼根是人則入八無間獄身口意三作殺盜淫是人則入十八地獄三業不兼中間或為一殺一盜是人則入三十六地獄見見一根單犯一業是人則入一百八地獄由是衆生別作別造於世界中入同分地妄想發生非本來有迷妄所造者自心惑業妄發更非外境萬物不出陰陽五行世智所知萬變不出六根世智所不知世尊窮源之論同造者六根十因具足而造各造者雖具足而先後間歇有心而不犯為不兼境無心而誤犯為不兼根故作特犯兼境兼根上皆極惡若止造殺盜淫三惡而不遍六不具十則輕矣三惡中犯二則又輕見見是能見根所見境若一根獨造單犯二業則更輕地獄亦從重而遞減八無間即八寒八熱大獄較阿鼻稍輕十八獄從大獄所分三十六獄從十八獄所分一百八獄從三十六所分獄勢分則受苦輕造者始於六根發起惡業作者次於六境成就惡業惡業不同即別作別造所感獄報入同分地則有定處非私受矣曰同分地可見境界歷然曰非本有可見當體全空復次阿難是諸衆生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形若於本因貪物為罪是人罪畢遇物成形名為怪鬼貪色為罪是人罪畢遇風成形名為魃鬼貪惑為罪是人罪畢遇畜成形名為魅鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼貪憶為罪是人罪畢遇衰成形名為厲鬼貪傲為罪是人罪畢遇氣成形名為餓鬼貪罔為罪是人罪畢遇幽為形名為魘鬼貪明為罪是人罪畢遇精為形名魍魎鬼貪成為罪是人罪畢遇明為形名役使鬼貪黨為罪是人罪畢遇人為形名傳送鬼阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有地獄罪畢而入鬼趣也非謗也破犯也於一切戒犯而兼謗犯菩薩戒唯犯無謗毀佛涅槃謗佛而兼謗法戒為衆生出苦之具佛為衆生拔苦之師法為衆生盡苦之地謗此三種即名斷佛種性罪莫重焉輕重諸罪略舉地獄之因地獄受苦者衆生業識身隨識變現直待業識身盡方受鬼身十貪即十習於物生貪餘報在鬼還托於物為金銀草木之精怪貪色傷正和氣餘習為風魃鬼能令亢旱惑即詐習變幻迷惑附畜為妖如倀附虎鼠成精之類魅現形以惑人者嗔恨餘習附毒蟲蠱人冤者追憶宿恨伺衰求報故為疫癘鬼散瘟行瘧之類傲慢恃氣故乘虗氣為餓鬼又慢必轉吝吝乃感餓罔即誣枉逼壓良善故為鬼憑幽托暗魘惑寐者見習為明作聰明而無正慧魍魎木石變怪舉一例耳枉詐成私謂之貪成明呪也因中以詐術牽制驅使人故為鬼被人呪術役使訟者結黨朋證謂之貪黨故報在鬼類附人發泄傳送如巫祝傳迸吉凶之類純情舉重該九情八情等燒乾者因窮果盡也悟菩提者如從夢醒何法可得妙則不受業縛圓則不容他物明則了無幽暗諸趣皆空何況鬼趣復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債物怪之鬼物銷報盡生於世間多為梟類風魃之鬼風銷報盡生於世間多為咎徵一切異類畜魅之鬼畜死報盡生於世間多為狐類蟲蠱之鬼蟲滅報盡生於世間多為毒類衰厲之鬼衰窮報盡生於世間多為蛔類受氣之鬼氣銷報盡生於世間多為食類綿幽之鬼幽銷報盡生於世間多為服類和精之鬼和銷報盡生於世間多為應類明靈之鬼明滅報盡生於世間多為休徵一切諸類依人之鬼人亡報盡生於世間多為循類鬼業盡而入畜生趣也畜生趣亦有上趣貶墜及修帶嗔殺者如龍王迦樓羅王等此唯從鬼來者多者約多分不盡然也類攝非一所著之物毀壞鬼隨壽終是為報盡土梟附塊似怪鬼之著物貪習傾奪坑殺酬斯債耳咎徵如商羊舞水鼯鼠呼人之類旱魃為災變畜仍以兆災魅鬼原於狂惑轉為妖惑之狐毒類蛇蝎之屬厲鬼入人身為病轉為蟯蛔還托身內慢習驕吝缺負必多作鬼受饑為畜充食所以償也綿著也幽暗也暗中魘著之鬼服類駝驢牛馬之屬為人服用酬其逼壓之債見明作鬼和諸精靈為應類之畜即社燕寒鴻能應時序者和者雜也呪以持力發靈力盡無驗鬼亦報終轉生休徵之屬如鳳麟之類附巫之鬼所附巫死鬼亦報終循類如猫犬等依順人者阿難是等皆以業火乾枯酬其宿債傍為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結此總結三途也三途各自虗妄造業發生非天降地出人與也妄造妄受覺性之中皆如空華若是從他所授或有漏網自作自受真無逃避處復次阿難從是畜生酬償先債若彼酬者分越所酬此等衆生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢畜生固來酬債若債主過分取酬此等將復為人徵索所餘之直常見善人生子破家或被劫盜或被缺負或橫遭驅役或枉受挫打斯皆先業合捨此身為畜酬剩由樹福德人中略償阿難下復明負債易償負命難償奢摩地正定自力也佛出世與之釋冤仗他力也唯二方得停償汝今應知彼梟倫者酬足復形生人道中參合頑類彼咎徵者酬足復形生人道中參合愚類彼狐倫者酬足復形生人道中參合庸類彼毒倫者酬足復形生人道中參合狠類彼蛔倫者酬足復形生人道中參合微類彼食倫者酬足復形生人道中參合柔類彼服倫者酬足復形生人道中參合勞類彼應倫者酬足復形生人道中參合文類彼休徵者酬足復形生人道中參合明類彼諸循倫酬足復形生人道中參於達類阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法於塵勞中法爾輪轉此輩名為可憐愍者畜生業盡而復人形也人道善報而從畜來雜廝其中故曰參合十類之中凶多吉少苦多樂少業計顛倒索債與命徵債相生索命相殺非好緣會聚也不遇如來聞法解釋生殺無休故可憐愍十類皆宿習報唯傲因柔報者昔藐人而今為人藐乃反對報文明達亦雜技聰黠耳阿難復有從人不依正覺修三摩地別修妄念存想固形遊於山林人不及處有十種仙阿難彼諸衆生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙堅固金石而不休息化道圓成名遊行仙堅固動止而不休息氣精圓成名空行仙堅固津液而不休息潤德圓成名天行仙堅固精色而不休息吸粹圓成名通行仙堅固呪禁而不休息術法圓成名道行仙堅固思念而不休息思憶圓成名照行仙堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絶行仙阿難是等皆於人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絶於人境斯亦輪回妄想流轉不修三昧報盡還來散入諸趣從人道進修而入仙道也依正覺修三摩地者依不生滅心為本修因也存想長生欲形骸堅固不壞即妄念也終歸敗壞比天為劣比人為優山林人不及處名山洞府神仙隱跡之鄉十行字功行也服餌胡麻蓮芡之類食所常用故曰食道康壯壽永未得輕舉草木芝菖松柏之類藥所常用故曰藥道身輕飛步升高越壑金石鉛汞丹砂之類化道二種一能化骨壽永體堅二能化物俾賤作貴遊戲人間廣行利益動止運氣調生之事煉精還氣煉氣還神煉神還虗也羽化飛升虗空遊行津液鼓天池咽玉液能令水升火降而結內丹故曰潤德超空行而至天上精色如朝採日精夜採月華通行精神與造化通也持呪自成仙道亦兼愈病驅魅以濟羣生故曰道行思念或存想頂門而出神或繫心臍輪而煉丹澄神凝思久而照應故曰照行取坎填離抽添鉛汞以結仙胎所謂交遘也攝衛精氣故曰精行勿惑邪說通悟化理能大幻化妙絶一世稱絶行仙煉心非止服餌等尤以操行為本如持戒積德救濟纍功不修正覺者不達本心真常萬形自體乃怖死留生長生為號言長僅以勝短說生終以待滅豈識無生妙體別得生理者於正覺外別得延生妄理阿難諸世間人不求常住未能捨諸妻妾恩愛於邪淫中心不流逸澄鎣生明命終之後鄰於日月如是一類名四天王天於己妻房淫愛微薄於淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天逢欲暫交去無思憶於人間世動少靜多命終之後於虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天一切時靜有應觸來未能違戾命終之後上升精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天無世間心同世行事於行事交了然超越命終之後遍能出超化無化境如是一類名他化自在天阿難如是六天形雖出動心迹尚交自此以還名為欲界此下明天趣不求常住者不求出世間修本常理但希世間有盡樂果妻妾為正淫外色為邪淫不但身不犯邪淫而心亦無一念犯愛水不流則湛性澄鎣故生須彌腰四天王天持國增長廣目多聞各據一面淨味不全為有微愛比前已超一倍故生須彌頂忉利天此云三十三帝釋所統之界此上二天名地居天漸向於靜曰動少靜多能感空居朗住較須彌更高一倍日月光不及上照唯有身光互相照耀須𦦨摩此云時分以蓮華開閣為晝夜常居靜中則自無欲或有觸來未能違情暫應之耳生第四天此天有內院外院內院是補處菩薩寄居即外院不得窺其堂奧況下界諸天故曰精微天主彌勒發弘誓願得生彼處以無漏力三灾不及二院之外又有業報天有漏業所成三灾可壞經或先言外天而後兼內院譯者省文兜率陀此云知足無心而境至曰橫陳無心應境同前無味勝之生越化地者自能變化欲境隨意受用超越下天之無化自居化地無世間心者心希上界無世間情欲但同世間權作夫婦不但全無滋味抑且了然超越超出化無化境化即第五天無化即前四天他化自在者諸欲樂境不勞自化皆由他化而自在受用此上四天名空居天制動而向靜曰出動地居二天則形交男女嫁娶亦如人間但風氣一交欲漏便除非若人間不淨流溢𦦨摩則勾抱兜率則執手變化則對笑他化則相視共有飲食睡眠淫欲故號欲天六欲天福因五戒十善而致今止約欲微增勝者欲為輪回根本前明淪墜始於此今明超騰亦始於此初心未能成就禪定智慧且速斷根本則輪回可出也
