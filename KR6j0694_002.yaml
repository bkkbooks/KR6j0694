body:
  text: 爾時阿難及諸大眾聞佛示誨身心泰然念無始來失却本心忘認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性發明二字要從理上發顯義看葢謂真性理中自有不生不滅所顯發性即下一為無量無量為一大中現小小中現大等是也妄明理中所顯發性如下晦昧為空空晦暗中結暗為色色雜妄想想相為身等是也時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大眾諸有漏者咸皆願聞佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸消殞殞亡不息決知此身當從滅盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚潤澤年至長成血氣充滿而今頹齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思惟其變寧唯一紀二紀實為年變豈唯年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母擕我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所說二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽黎等都言此身死後全滅王聞是言信知身後捨生趣生與諸大眾踴躍歡喜得未曾有阿難願佛就現前身心拈出不生滅性此理甚難發揮且死後難明故借匿王身心開示所謂現前拈出也若現前變滅則未來亦變滅現前不變滅則未來亦不變滅四卷中杵音之喻云縱汝形銷命光遷謝此性云何為汝銷滅死後不生滅之性透底拈出矣匿王在身上觀察故成斷滅世尊在見上發明故無生滅阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢上惟舉見此復兼聞阿難疑真性不滅云何遺失而謂顛倒不知因顛倒而說遺失非因斷滅而說遺失也下示顛倒不失之相即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間眾生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來竪臂兜羅綿手上指於空則名為正佛即竪臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明如來之身名正徧知汝等之身號性顛倒隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大眾瞪瞢瞻瞻目睛不瞬不知身心顛倒所在倒與正同此臂也特首尾相換耳正徧知與性顛倒同此身也特迷悟相反耳可知即遺失顛倒不妨元不生滅瞪音正直視貌瞢音萌目不明也佛興慈悲哀愍阿難及諸大眾發海潮音徧告同會諸善男子我常說言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本玅圓妙明心寶明妙性認悟中迷此下發明顛倒實處也應不失時故曰海潮色總舉根塵心總舉諸識諸緣總指色心生起之緣心所使即五十一心所也諸所緣法廣舉山河大地明暗色空等也唯心所現如鏡中像全體是鏡汝今幻妄身心皆是妙明心鏡所現全體是心此心非攀緣之心乃妙明真精妙心故身心皆現其中今不即幻妄而悟妙體乃遺本妙而執幻妄是認悟中迷也不屬空有曰妙遠離晦昧曰明萬法實體曰真精具此諸義曰妙心恆不昧此曰正徧知本來自妙不假修為曰本妙通融流動曰圓有隨緣意清淨堅實曰寶有不動意心則從妙起明圓融照了如鏡之光性則即明而妙凝然湛寂如鏡之體自色心諸緣至唯心所現則會妄歸真如來藏性已揭于此後特詳發之耳晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來說為可憐愍者自晦昧為空至色身之內所謂認悟中迷也迷性明而成無明曰晦昧由此無明變成頑空即下經迷妄有虗空也所變頑空與能變無明二法和合變起四大為山河依報外色即想澄成國土也以四大色雜妄想心變眾生正報內色想謂妄心相謂妄色色心和合五陰備矣即知覺乃眾生也妄有緣氣積聚於內隨想搖蕩逐外境而奔逸此特雜妄緣塵昏擾之相而以為身心體性得非迷哉既一迷此決定以心為在幻質之內不知妙明真心範圍天地包含萬象乃認之於蕞爾身中何異棄彼無邊剎海認一浮漚以為全潮之體瀛渤之量哉遺大心而認浮想如棄海認漚已為迷矣執浮想為大心如認漚為海加一倍迷如我垂手正指顛倒所在本無遺失而常如遺失懷珠困窮故可憐愍阿難聞呵非心驚謂捨此更無將同土木如來摩頂許以真心有體而已未示真心也至此方指示之阿難始知緣塵外有如此廣大心體阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現說法音現以緣心𠃔所瞻仰徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道未敢認非不肯認也特以初獲此心尚未受用未敢遂認為主人翁求世尊徹底發明使得親見本來面目乃敢承認此正實參實證處下文佛以二者敵體相番一有還一無還使阿難分明親見阿難問意不重捨妄不得只重認真不明世尊答意不重破除緣心只重指明真心佛告阿難汝等尚以緣心聽法此法亦緣非得法性如人以手指月示人彼人因指當應看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是緣心者能緣之心法緣者所緣之塵法音即聲塵亦非真法性者真理也教詮真理理是眾生之心豈可執教為心哉指喻法月喻聽法者之自心說法顯心聞教自合觀心若執聲教不觀自心豈唯不達自心亦復不知教意何以故以他聲教為己自心自他不分也豈惟不知教意兼不了教心體相何以故教屬聲塵不能覺照心體靈知具有覺照以無照之塵為有照之心有照無照二不別故阿難迷心迷教及迷教心體相亦如是耳阿難不捨緣心重佛法也豈知此法亦緣而當併捨乎若以分別我說法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去云何離聲無分別性斯則豈唯聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性則汝心性各有所還云何為主前以客喻身境此以客喻緣心而見性為主人聲分別心指聲上緣心即悟佛法音者也分別我容指色上緣心即允所瞻仰者也非但聲分別心離聲無性色分別心離色相亦無性如是乃至等兼舉六塵緣影皆無自性也一切皆無故非色對緣妄有故非空既非色空冥然莫辨外道昧為冥諦拘舍離即末伽黎離諸四句結前起後阿難言若我心性各有所還則如來說妙明元心云何無還唯垂哀愍為我宣說佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影真月喻妙精明心第二月喻見精明元水中影喻緣塵分別阿難問妙明元心云何無還佛以見精為答者真心無朕發悟良難故託見精方便開示且者權宜之詞言放下妙明元心且託見精而言之也第二月雖非真月然因揑目而成其實一體例見精明元雖非妙精明心元是妙心而出本無二相若月影則有二相故曰非是二月雖非真月然離真月必無二月可得見精雖非真心然離真心必無見精可得葢從真所起全體即真但當由見精得真心不可以見精當真心去見精中之妄即是真心去目之揑即是真月汝應諦聽今當示汝無所還地阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦暝則復昏暗戶牗之隙則復見通牆宇之間則復觀壅分別之處則復見緣頑虗之中徧是空性鬱𡋯之象則紆昏塵澄霽斂氛又觀清淨阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還牆宇緣還分別頑虗還空鬱𡋯還塵清明還霽則諸世間一切所有不出斯類汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被漂溺是故如來名可憐愍塵相有還見性不與塵俱還離塵別有全性還日者隨日輪而俱來亦與日輪而俱去八塵於見性之中自相往來自相陵奪而此見體朗然常住豈同緣塵之心與塵俱還乎汝但知見性無還則知汝心本妙明淨欲其由見性而悟本妙明心非即以見性為本妙明心也見性屬第八識猶帶業識本妙明心不屬於識即如來藏妙真如心迷悶者執緣心不捨喪却本妙明淨心自取輪轉也阿難言我雖識此見性無還云何得知是我真性阿難意以見性雜在萬物之中無物而非見無見而非物安辨何者是我之見性乎只重我字不重真字欲於現前諸物中辨其是物是我也佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚眾生洞視不過分寸阿難方見初禪見一四天下阿那律證四果得天眼見三千大千世界如觀掌果此云閻浮且從近示耳大千世界菩薩累至百千然尚有限窮盡微塵數國土則無限矣佛眼所觀淨穢皆同清淨不過分寸者隔紙膜不見外物隔皮膚不見五臟也一初果二羅漢三菩薩四如來五眾生見量雖殊見性不殊皆可即諸物象而決擇之阿難且吾與汝觀四天王所住宮殿中間徧覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象阿難極汝見源從日月宮是物非汝至七金山周徧諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性就阿難親見者使自審擇自即見性所謂我體也他即諸物象極汝見源如云盡汝眼力是物非汝物不是見也然此物雖復差殊同汝見精中清淨本體所矚物有殊而見無殊則此精妙明誠汝見性見不是物矣所謂分別自他也下更反復辨定總是物象有形可見見性無形不可見可見者是物不可見者是汝之見性也若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝若汝認見為物吾見亦同是物汝應可見同見者依物之迹也不見者離物之體也若謂吾汝同見一物是見吾之所見特迹而已吾離物不見之時其體何在無處可見定非物矣云何非汝真見又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立阿難若汝見時是汝非我見性周徧非汝而誰云何自疑汝之真性性汝不真取我求實承上見是物義重辯必非物而結歸真性若見是物則物應有見而有情無情體性錯亂不可分辯故曰不成安立阿難下結顯相見分明不成混濫故曰汝今見時是見屬汝與我無與絲毫不雜則知見性離一切相而能周徧一切分明照矚則見性即一切法如是則汝所見日月宮等皆是汝之真性周徧何至混物而非汝自性乎非汝而誰正答云何得知是我真性之問自疑真性者本是自性而疑混於物也性汝不真取我求實者真性在汝不能自信其真取我言求實也阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓徧娑婆國退歸精舍祇見伽藍清心戶堂但瞻簷廡世尊此見如是其體本來周徧一界今在室中唯滿一室為復此見縮大為小為當牆宇夾令斷絕我今不知斯義所在願垂弘慈為我敷演躡前見性周徧則知是自非他應隨處不變何故大復成小通復成塞由他不由自耶佛告阿難一切世間大小內外諸所事業各屬前塵不應說言見有舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應說言更除虗空方相所在虗空本無方圓方圓俱由於器器除而方圓泯矣虗空何相可除乎見性本無大小大小俱由於塵塵忘而大小泯矣見性何相可除乎入達解也若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築牆宇能夾見斷穿為小竇寧無續迹是義不然一切眾生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端徧能含受十方國土覺觀日非舒自知入室非縮覺穿無續迹自知夾無斷痕挽引也面猶邊也萬物皆己而迷己為物遂失萬物一體之本心物既不屬於自心非惟不隨心轉反以轉心是故動為物礙葢自心真性本來周遍眾生不自覺知遂變成業識及相見二分於是本來真心全然遺失故於前塵境上觀大觀小見分又為相分所礙矣若能內脫身心外遺世界中翻業識則同如來身心萬物一體圓而不偏達物皆己明而不昧何物能遷動之毛端含十方小攝大大入小小中現大大中現小自在無礙何舒縮大小之有說到同如來則見性會歸如來藏妙真如性中但除器方空體無方妙葢如此阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我唯垂大慈開發未悟現在我前承上見性周遍來阿難至此信得現前皆是不復惑為色身之內矣但見性既真則虗空大地融成一體云何復有我身我心且此果何物反有分別之能而彼真見反不能分別此身心耶若謂分別者非我心而見性實是我心即我今分別之見皆是見性所主張者然則現前之見性實我而在我之身心非我與物能見我之說何殊耶阿難疑處認見性與身心為二耳復是何物物字從前妙明真心中物字來葢疑實有一物在妙明中不能和會為一也不知身心器界當體本空全一真見譬之鏡中影像即鏡所現豈真有一物居於鏡中耶至陰入處界皆如來藏妙真如性則妄即是真所用身心即此見性初無二體矣佛告阿難今汝所言見在汝前是義非實若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林徧觀林渠及與殿堂上至日月前對恒河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已是見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑阿難言我今於此重閣講堂遠洎恒河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所說況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是佛復告阿難如汝所言無有見精離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實徧見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是於是大眾非無學者聞佛此言茫然不知是義終始一時惶悚失其所守阿難問意雖多惟見在我前是其謬本故佛但破前相而諸疑盡釋矣物不能雜曰精物不能障曰明物不能染曰淨物不能縛曰妙前如是如是許其物無是見即一切物不得也後如是如是許其物無非見離一切物不得也前用一喝使阿難矍然此用雙許使大眾茫然葢妄須頓破故一刀兩段以掃之真難直說故委曲擒縱以窮之如來知其魂慮變慴心生憐愍安慰阿難及諸大眾諸善男子無上法王是真實語如所如說不誑不妄非末伽黎四種不死矯亂論議汝諦思惟無忝哀慕慴音哲懼思也決定曰真實稱理曰如所如賺誤曰誑虗偽曰妄意活不決曰不死強言曰矯非理曰亂忝者孤負之意哀慕猶云悲仰是時文殊師利法王子愍諸四眾在大眾中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大眾不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮唯願如來大慈發明此諸物象與此見精元是何物於其中間無是非是是非是義者是與非是二種義也是義者無是見之義非是義者無非是見之義缺二無字語之略耳謂此見與象元是何物而乃無是又無非是乎佛告文殊及諸大眾十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是此會相見而歸真如發明無是無非是之旨也三摩地即前首楞嚴大定由彼大眾未得大定故於萬象中分物分我分是分非諸聖住是定中了知如下所云不作是非是見也見根也見緣塵也所想相識也根塵識三攝盡萬法文殊問見精物象元是何物今答云元是菩提妙淨明體諸物若與見精有二體可說是見及非是見今唯一菩提妙淨明體何說是說非是哉佛初以見為性不與身心萬物為侶似謂見獨真而餘皆妄令人獨依見性今乃謂妄則降見性同是空華謂真則升諸法同為真體將何適從今試喻之一真如大海水見精如水之光諸所物相如水中映人物等影世間迷人如夜半觀海見彼影相認為實有今欲令其舍影認水無奈水體瑩徹無形可見只得指水面之光令彼認取故斥影為妄讚光為真欲其即光以識水也而彼愚者復執光影各自有體橫起是非故復告云光影皆無體惟水是實體耳光影雖皆虗然影有生滅光無去來影乃外境所映光實自體無餘見精與萬法得失判然文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月世尊既與發明復恐不能信解令文殊從旁添註就體發明故問之曰即汝此身是个文殊還許此文殊外更添一个文殊喚作是文殊得麼還許此文殊外減却一个文殊喚作無文殊得麼文殊是大智慧人自然同聲相應故曰即我一个是真文殊此外不得更添一个是文殊若更添一个是文殊則便有兩个文殊然我有一个真文殊在又不得喚作無文殊喻真如體不剩一法不欠一法圓同太虗無欠無餘故也既知真文殊上本無是非則知真體上亦本無是非也由彼色空精見本是淨圓真心不覺心起而有其念故迷為業識轉為見相妄有色空精見良以色空精見依真而起如第二月既如二月則知本無豈可在第二月上妄生卜度以為是真月非真月不知生是生非皆未見真月者也若見真月則不妄立是非矣是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指承上二喻觀見塵而發明終沉妄想不能出是與非是由真精而發明方可出指與非指出者超也指非指應前既有方所非無指示葢初執在前似有可指及對物辨又無可指既悟一真斯疑頓絕阿難白佛言世尊誠如法王所說覺緣徧十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種說有真我徧滿十方有何差別覺緣謂覺性徧緣無所不在梵志此云淨行娑毗迦羅此云金頭外道投灰苦行外道妄計身中有一神我常住不滅處處受生徧十方界以濫真覺故云有何差別下不剖此疑者因緣自然和合不和合既已盡破情窮理極諸計消亡真我自顯故云圓滿菩提不生滅性清淨本心本覺常住是佛所謂周徧也豈外道妄計可同哉楞嚴圓教全相是性阿難分性相為二故疑外道真我與妙覺混前云見必我真我今身心復是何物謂身心之外別有見性便成和合不和合二相有一真我在十方中是和合真我與十方體不相雜是不和合世尊不與分疏但舉五陰六入十二處十八界本如來藏妙真如性七大圓融周遍乃是遠離和合與不和合及因緣自然外道之真我不辯而判然世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常說自然我說因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性外道說自然謂內而心性外而萬物悉本無因自然而然擬無因果不立修證故佛廣說因緣破之因謂親因種子緣謂助發資緣內而三乘等性須由宿生根種復假諸教助緣方生諸果外而百穀等物亦須根種為因土等為緣方生芽等非彼境界者異於彼所說也非生非滅即常義遠離虗妄顛倒即徧義與類也似非因緣而類彼自然矣云何開示者阿難實以為自然但求不同於外道不知何但不同且了無自然之義故佛唯破自然不復分別外道我說我字世尊我今我字阿難佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明自然謂自體本然也自體本然則不隨境變今皆隨變非自然矣外道不了法空計有一物為自然體今推其體體而無自誰曰本然阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞始疑妙性同外自然既聞逐破謂如佛昔說因緣義矣但未知妙性云何符合假物為因循物為緣既無定趣非因緣矣用既隨緣故非自然體既不變故非因緣見性是自體明暗塞空是他法自體能隨他法非自然也他法不能變自體非因緣也當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空祇益自勞虗空云何隨汝執捉此下重重拂跡結顯覺性不變隨緣隨緣不變也以執自然者不解隨緣執隨緣者不知不變故有外道小乘之別若夫不變隨緣隨緣不變是世尊說法之弘範入理之深談故結示云當知如是精覺妙明不屬因緣不屬自然不屬非因緣不屬非自然以此精覺妙明元清淨體本無非與不非亦無是與不是以一切情計之相非一切法自相也法本無差情計成過因緣自然等皆是世間戲論名相如何於精覺妙明中作意妄想戲論分別阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣說見性具四種緣所謂因空因明因心因眼是義云何佛言阿難我說世間諸因緣相非第一義阿難吾復問汝諸世間人說我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見因緣自然二皆被黜不問自然者非自教也因緣自教故重起問緣生之法因空而有因明而顯因心而知因眼而見乃世間名相於第一義皆為戲論昔說因緣為對治自然權宜之教非今所說第一修證了義之教阿難誤認妙覺性為因緣法然不獨妙覺性不屬因緣即見性何曾屬因緣哉若謂見性是因緣生者即如世人各說我為能見是因何物而成見復因何物而不見阿難答世人因日月燈光故見因無日月燈光故不見此則見與不見皆屬因緣故知見性從因緣生世尊借其語以破之曰若此見性無此三種光明名不見者應不見暗若謂雖不見明必能見暗斯則但是無明云何稱為無見若謂在黑暗中不見光明名不見者則在白晝時不見黑暗亦名不見則見暗見明俱名不見有是理乎若謂明來暗謝暗來明謝是明暗二相自相傾奪非關見性暫有暫無則見暗見明皆名為見云何見暗之時名為不見是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見見猶離見見不能及云何復說因緣自然及和合相汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路將明暗空塞推論成就見性離此四塵之義則見性不屬緣生明矣見性雖不屬緣生猶屬自己業識變現與妙覺性尚隔一層故復破之見見三句下三个見字是見精上三个見字是性體葢又以見精為妄而性體為真所謂第一義性在見中名為見精性離於見名為見見葢謂見明見暗見空見塞特見耳妄見也見此見者方稱真見此之真見已離見矣非彼見所能及況因緣自然和合等相而能及之哉清淨實相即真見也即前之精覺妙明也前舉精覺妙明盡拂因緣自然戲論阿難滯情未解再引世尊常說因緣為問故發明真見而重拂之明暗塞空塵也見此明暗塞空者見精也見此見者性體也性本超然見精所不能及因緣自然和合總不離塵豈能及之故為戲論阿難白佛言世尊如佛世尊為我等輩宣說因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲淚頂禮承受聖旨爾時世尊憐愍阿難及諸大眾將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果阿難信見性非因緣自然未知見性是和合不是和合已是迷悶世尊前拈出見性舉似阿難尚恐不能承擔重重開示阿難領受已將見性為妙覺性矣今又說見見非見則見性似復破無可依據故重增迷悶阿難所迷心境轉細如來所示觀照愈深以分別覺觀為麤以反觀之智為微密觀照用此而見暗見明謂之覺觀用此而反觀見性破除業識直見覺性即名微密觀照非二物也阿難一切眾生輪迴世間由二顛倒分別見妄當處發生當業輪轉云何二見一者眾生別業妄見二者眾生同分妄見見妄即起業業起自輪轉當處當業更非異時也約一人一識所見根身器界為別業妄見一人如此彼彼皆然故復約多人多識所見根身器界為同分妄見云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影此設喻以明別業妄見也目喻自覺聖智燈喻本覺真理赤眚喻無明業識圓影喻根身器界色即影也理智一如本無能所無明一動能所遂分故有根身器界發現耳於意下雙開二關以辨圓影不即燈見而有亦不離燈見而有也若此圓影即燈而有則無眚人何不同見者喻如來自住三摩提見與見緣本無所有元是菩提妙淨明體也而此圓影唯眚之觀者喻有無明業識方見有根身器界也若此圓影即見而有此見已成圓影而能見圓影者更是何物喻此根身器界若從見生則此見性已成身器而見根身器界者更是何物故知根身器界從業識變非關見性也若此圓影離燈而有則合傍觀屏帳几筵有圓影出者喻此根身器界若離清淨真如即是無因生不合云當處出生也若此圓影離見別有應非病眼所矚喻此根身器界離見而有則應有妄見者不見根身器界云何有妄見者必見根身器界也可見妄元無因見圓影者更無他故只是目眚恠頭走者更無他故只是心狂眚除即是清淨眼狂歇即是菩提心問目眚心狂獨非因乎答眚非目所原有狂非心所本然若有之終無除眚歇狂之時矣是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應說言此揑根元是形非形離見非見此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見此發明圓影起處也謂此圓影既非即燈見而生又非離燈見而有然從則何處起故示之曰燈上只有光明眼上曾無圓影因淨眼有眚故轉此燈光而成圓影是則圓影從赤眚生故曰色實在燈見病為影不唯所見圓影是赤眚生即能見圓影者亦是赤眚所成以目非眚則不病燈非眚則無影故曰影見俱眚然能見眚之見體未甞墮眚病中故曰見眚非病是則圓影從赤眚生無關燈見故知以如如智合如如理決不見有根身器界若燈見本無圓影也因一念不覺無明妄動轉此覺性遂成見分以有見分遂成相分所謂見病為影也不唯所見根身器界是無明起即能見者亦是從無明起所謂影見俱眚也然能照破相見二分是無明起者謂之微密觀照亦名自覺聖智此則靈光獨照逈脫根塵初未甞病所謂見眚非病也則知根身器界從無明業識生如第二月非真月體亦非月影是揑目所成也既從揑出豈應執此是月體生非月體生離見生非離見生以第二月從一揑生則知見性從一動起也云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲祇有兩國唯一國人同感惡緣則彼小洲當土眾生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹蜺種種惡相但此國見彼國眾生本所不見亦復不聞閻浮提即南贍部洲在須彌山南不祥氣現唯災地見之彼無災地不聞不見矣舉國見之顯同他國不見顯妄二日如宋太祖陳橋兵變時見日下復有一日兩月即月食時如有黑月覆障之狀惡氣環匝曰暈薄蝕曰適妖氣近日狀如珮玦星芒遍指曰彗四出曰孛橫去曰飛下注曰流氣夾日如背如耳曰負耳氣映日或明或暗為虹蜺阿難吾今為汝以此二事進退合明進退者先進別業之喻合明別業之法以顯一人之妄見為別次退別業之法復進別業之喻以例同分之法次復退一人別業之喻進一國同分之法例大千之同分以顯多人之妄見為同合明者謂以法喻同別比例發明也阿難如彼眾生別業妄見矚燈光中所現圓影雖似前境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎例汝今日以目觀見山河國土及諸眾生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚此進別業喻合明別業法也雖似前境目眚所成者謂此圓影雖有相現是赤眚成非實有也眚即見勞非色所造者謂此目眚從勞見起非燈光所自出也然見眚者終無見咎者若能見此赤眚是勞見所起此見終非有眚病之妄也例汝下以喻合法目觀是見分國土眾生是相分合圓影也皆是無始見病所成者見病即無明業相由無明業相熏熏不已遂起能見而成所見故曰見病所成合上終彼見者目眚所成也由無明業相而起見相二分如目有赤眚而見圓影也見與見緣似現前境者謂業識轉似二分相見俱依自證起故不是實有合上雖似前境也元我覺明見所緣眚者謂見相二分元是我本覺妙明心體忽起一念而成眚妄遂有能見及所緣耳非覺明心體本自有也合上眚即見勞非色所造也覺見即眚本覺明心覺緣非眚者若以本覺明心覺此見精從赤眚生則此本覺明心雖徧覺諸緣實非有眚之妄見可並合上然見眚者終無見咎也覺所覺眚覺非眚中此實見見云何復名覺聞知見是故汝今見我及汝并諸世間十類眾生皆即見眚非見眚者彼見真精性非眚者故不名見此答見見非見重增迷悶之疑也若以本覺明心覺此所覺之見性從眚妄起而此覺心不屬眚妄者即前所說見見之時見非是見之義也既知妙覺之性若此則知見精屬見妄矣云何將此妙覺明性而與見聞覺知齊稱並列汝今見我併見十二類生此見有能有所皆是目中帶眚之見如病目見圓影相似非照見眚病皆虗之見以彼照見眚病皆虗之見真而不雜於妄精而不雜於眚終日見而不見有世間相不可以帶眚之見目之故曰見猶離見見不能及也阿難如彼眾生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此眾同分所見不祥同見業中瘴惡所起俱是無始見妄所生此退別業之法復進別業之喻合明同分之法也何故作此例耶以別業妄見虗而易明同分妄見實而難信欲將實者同虗也一病目人所見圓影屬眚妄生例明一國之人所見不祥從惡緣起雖虗實有異所見不同然俱屬見妄所生例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸眾生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死此退別業之喻進同分之法以例大千也既一國所見不祥從瘴惡起則南閻浮提三千洲中諸國皆然其餘三大部洲諸國亦然一日月所統世界既然則百億日月大千世界十方諸有漏國亦然同是覺明無漏妙心最初一念妄動轉為見聞覺知虗妄病緣而有生死眼所現見名為所見從他傳聞名為所聞運己心所思搆名為所覺自內所受及自所證名為所知四種根中積生無始虗習乃至分劑頭數和合一處為虗妄病緣俱時而生俱時而死生死根本實基於此若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住此正所謂離見也和合緣即下文分為六和合也不和合即下文湛入合湛歸識邊際也二種俱屬見精但和合是行陰不和合是識陰與首卷二種根本相應前以攀緣心為生死根本以識精元明為菩提涅槃元清淨體此又以識精中一分妄見為生死根本須離此妄見然後滅除生死根本純是菩提涅槃元清淨體阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不知合阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者前破因緣自然此破和合與不和合和則雜而不辨合則附而不離上言遠離諸和合緣及不和合下言本覺妙明原無和合與不和合也緊接以陰入處界本如來藏妙真如性求於去來迷悟生死了無所得正言無和合與不和合也則汝今者妙淨見精為與明和為與暗和為與通和為與塞和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義彼暗與通及諸羣塞亦復如是仍用見精者以真見無別體也明屬前相見屬內心齊何處所而論其雜乎見之與相目擊可分明見相雜作何形相若非見者四句承雜何形像詰之問明與見雜者明非見乎即見乎若非見者止有一明成所見之相所見安能見所見乎故曰云何見明若即見者止有一見成能見之相能見安能見乎故曰云何見見全體皆見見圓滿也何處容明而與之和全體皆明明圓滿也不合容見而與之和見必異明者即前見見之時見非是明也雜則見亦可呼為明明亦可呼為見各失本名始云兩和番成兩失然則見與明和決無是義復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合若明合者至於暗時明相已滅此見即不與諸暗合云何見暗若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗彼暗與通及諸羣塞亦復如是合則不離見精既與明合至於暗時明相已滅此見亦隨明滅決不復與暗合云何暗來又能見暗若謂雖即見暗實不與暗合既許不合方見則應合反無見與明合時應不見明矣云何無明合時知其是明而不是暗今既能見明復能見暗決知此見不與明合和合不成則菩提非和合起矣阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶和合不成即非和合此計真妄二法了不相觸妄計分別不出自他共無因四性自然即無因因緣即共阿難所執空明心眼四種因緣空明即他心眼即自佛說同別二種見境見亦自境亦他既有自他必含共性由共性難破更作和合而說然則非和合義亦從自他開出為防末習委曲搜揚佛言汝今又言覺非和合吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成彼暗與通及諸羣塞亦復如是若見明時明見非和則明之與見應分邊畔汝今細審於見於明齊何處所而論邊畔乎相及則有畔明中無見則不相及且不知明在何處齊何處而分畔乎畔既不成則非非和矣又妙見精非和合者為非明合為非暗合為非通合為非塞合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理彼暗與通及諸羣塞亦復如是非和約體不相入故以際畔推之非合約性自差別故以乖角破之初卷破心破見破業識以顯如來藏者以如來藏不變不與心見等和合故下文即三科七大以顯如來藏者以如來藏隨緣能與三科七大和合故阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得一切浮塵諸幻化相承上明暗塞空等說來當處出生來無所從隨處滅盡去無所止則幻妄稱相而已實無自性其性即妙覺明之實體無相而能現相故稱妙覺明體妙覺明體如鏡浮塵幻化如鏡之影影之體即鏡之體也五陰六入十二處十八界總是色心二字對機開合攝盡萬法廣上一切浮塵諸幻化相也曰本如來藏妙真如性即相而談性即性而融相也色有生滅心有去來虗妄而無自體現此者何物耶當知本如來藏常住妙明不動周圓妙真如性隨緣所現也如來藏即眾生本覺性體也藏者含攝眾德也本無生滅曰常住不滯明寂曰妙明本無去來曰不動無不徧足曰周圓皆稱真如之德也妙萬物而至神性一切而不異曰妙真如性幻相有去來生死真常性體有何去來生死乎迷悟在人性中實無迷悟可得上文破妄心破二種妄見是破妄之極絲毫混真不得曰見非是見曰非因緣非自然非和合及不和合是顯真之極絲毫容妄不得阿難剖判明白不復認漚為海矣但恐看得真妄迢然不免離波覓水故云汝猶未明云云使知全相是性全波是水本無二體方是事事無礙一真法界後剖陰入處界虗妄本如來藏妙真如性近五千言文繁語奧初學急難理會只將一切浮塵至了無所得百餘言熟讀深味義旨了然此學經簡要之法阿難云何五陰本如來藏妙真如性陰覆葢也又積聚也積聚有為覆葢真性陰若有性則與真如敵體並立惟其無性全是真如故下釋中只明無性阿難譬如有人以清淨目觀晴明空唯一晴虗逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是阿難是諸狂華非從空來非從目出如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼是故當知色陰虗妄本非因緣非自然性一切狂亂非相如見毛輪第二月之類以妙覺明圓照法界如以清淨目觀晴明空也清淨本然一法叵得如晴空無有也性覺必明妄為明覺如人無故瞪目也勞久發塵如虗空見華也若有出入則有實體故非虗空非空則實如阿難體更無所容此辨狂華不因空生也若華從目出則得目之性必應有見無見則應有翳今旋時既不見眼又不翳眼非目出矣華從目出則見華時華已離目目體全空應無翳矣云何見華目尚有翳必晴空無華方號清明眼耶此辨狂華不因目出也本無生體曰虗循業偽現曰妄既了幻華無因當知色陰虗妄本非因緣非自然之妙真如性矣阿難譬如有人手足晏安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是阿難是諸幻觸不從空來不從掌出如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤跡必有覺心知出知入自有一物身中往來何待合知要名為觸是故當知受陰虗妄本非因緣非自然性觸情於境納境於心曰受晏安調適性無違順喻藏性本無諸受也二手空摩妄生諸相喻妄觸引起諸受也若空能生觸則空無所不觸豈選擇而觸觸掌乎若掌能出觸則孤掌即出何待合掌乎合而出時掌既知矣離而入時臂腕骨髓亦應覺知入時蹤跡何不覺耶若說有物身中往來覺心知出知入則無問離合隨時可覺何待合掌方知而始名為觸耶阿難譬如有人談說酢梅口中水出思蹋懸崖足心酸澀想陰當知亦復如是阿難如是酢說不從梅生非從口入如是阿難若梅生者梅合自談何待人說若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想蹋懸崖與說相類是故當知想陰虗妄本非因緣非自然性想無實相由心成相說梅思崖無實相也口水足酸由心成相也凡想如之若此酢說是梅生者梅合自談口中之水當從梅生何待人說而口中水出若此酢說從口入者口應自聞而口出水何待耳聞而口中水出若獨耳聞此水何不從耳中出而反從口出既知酢說無根則知想陰不實矣阿難譬如暴流波浪相續前際後際不相踰越行陰當知亦復如是阿難如是流性不因空生不因水有亦非水性非離空水如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此暴流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流是故當知行陰虗妄本非因緣非自然性行以遷流為義以能驅役自心造善不善等故即是業行故以瀑流譬之非水性者非水一定之性也不因空生三句乃非即意非離空水總翻此三句乃非離意非即非離行陰無實體矣流因空生則此世界成無盡流喻行陰若從真如出則行陰與真如同一無際終無破行陰之時矣流因水有則水與流應成兩體如樹生果果不是樹水為能有流為所有二相應現在也今且不然如何流因水有耶空非有外則流不能離空喻真如本非有外故非離真如也水外無流則流不能離水喻除却業識別無行陰故非離業識也阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是阿難如是虗空非彼方來非此方入如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出是故當知識陰虗妄本非因緣非自然性識以了別為義性覺真空周徧法界含吐十虗寧有方所一迷為心惑為色身之內自私自小故以瓶空為喻人喻業瓶喻身空喻識塞其兩孔謂煩惱所知障塞二空也業牽身識而走如人擎瓶空而行也千里遠行用餉他國者三界六道無處不往也若彼下破此識不從彼方來若此下破此識不從此方入則知識陰所自出便可即識陰而通達實相矣
