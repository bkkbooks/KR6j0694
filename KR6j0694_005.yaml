body:
  text: 阿難白佛言世尊如來雖説第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧唯願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示如來前卷開示第二決定始令審詳煩惱根本次云汝觀世間解結之人不見所結云何知解煩惱根本即是所結阿難欲深知此結故請世尊發明元本也即最初結起本元此有遠近遠即因明立所所既妄立生汝妄能近即識精元明遍在根門名為所結之元從無始際與諸無明俱滅俱生謂之俱生無明亦是此物故此結元關係極重爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祇陀林灌如來頂是諸大衆得未曾有於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根唯汝六根更無他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物此經名大佛頂者正謂開示無上頂法也含生本具極果所宗識精元明超出理表見道者見乎此也修道者修乎此也證道者證乎此也將欲開示此法先摩當機之頂而表示之諸佛又各放頂光灌如來之頂者意明當機識精中之元明即如來果位究竟之明元同一頂法表示之方至詳盡矣如來既以此形示之復以此明告之曰生死涅槃煩惱菩提皆是六根更無他物足為發明結元之謦咳開示解結之先容無明即結也無明而曰俱生見有六根即有無明問云何是結答以唯汝六根問從何名解答以亦汝六根此就今日身心確實指陳離此更無結元離此更無解處阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物佛告阿難根塵同源縛脫無二識性虗妄猶如空華阿難由塵發知因根有相相見無性同於交蘆是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物爾時世尊欲重宣此義而説偈言恐阿難誤執六根結塵流逸故佛言此根與塵同是湛圓妙覺心迷時結水為氷悟時氷還為水故曰縛脫無二恐阿難誤執六根引識自劫家寶故佛言識體全空不但縛脫無二亦且本未嘗縛也識性二句明自證分之虗由塵四句明相見二分之虗知即見分相即相分根塵為緣識生其中見分似由根引然離塵則不能發知相分似因塵起然離根則不能取相是則離相無見離見無相了無自性徹底虗妄執知見實有名立知見此即妄心達知見無性名無知見此即真心於知見處明暗妄形粘湛發見流逸奔色即此知見便是無明根本於知見處不隨前塵脫粘內伏內瑩發光即此知見便是涅槃根本阿難問云何是結從何名解知見立知即是結知見無見即是解真性有為空緣生故如幻無為無起滅不實如空華言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆結解同所因聖凡無二路汝觀交中性空有二俱非迷晦即無明發明便解脫真性二字頌同源源字有為空至交蘆頌識性虗妄真性本空則諸有為法云何而生皆托緣而生其體如何如幻而已如幻故無為無為故無起滅無起滅故如空華所謂真性者亦因言妄而顯耳妄與真同為二妄也真尚不立何況於妄極言妄之必無真非真者即真妄二字見謂根所見謂塵真妄猶且皆非云何有見所見乎若相若見俱無實性豈不若交蘆之互倚而其中實空者哉結解下頌縛脫無二所因謂六根也結即為凡解即成聖聖凡結解不離六根故曰同所因無二路也汝觀交中性牒前喻言空則蘆有外相言有則蘆中本空喻根境妄執似有其體元空也迷晦即無明所謂失彼精了可以結也發明便解脫所謂發本明耀可以解也發者翻迷發悟明者轉晦成明真性四句總顯有為即無為耳有為通指根塵識前云決定棄捐諸有為相又云汝但不循十二諸有為相阿難謂離此有為別有無為故疑云何同是六根更非他物佛言汝今分妄分真總未達根塵之源耳源者何真性是也以真性觀之諸有為法當體即空全是無為求起滅不可得求真妄不可得何必離縛求脫離結求解離有為求無為哉解結因次第六解一亦亡根選擇圓通入流成正覺陀那微細識習氣成暴流真非真恐迷我常不開演自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗達磨十方薄伽梵一路涅槃門躡前結解之義起後圓通之文因者解因結之次第也六解則根拔一亡則湛圓選得圓根則入聖流成正覺矣陀那下俱承入流成正覺來如何謂之流即陀那習氣故成暴流云何入流即不取無非幻等云何成正覺即是蓮華等阿陀那此云執持第八識也含藏種子為習氣積生識浪為暴流湛由是分結由是起也此識依真如而起雜乎真妄之間若以為真恐迷妄習而自誤以為非真恐迷自性而外求故非時非機寧不開演一切諸法唯心所現而於中取著妄成根結是自心取自心非幻成幻法也由妄取故有幻非幻若不妄取非幻亦無非幻尚無幻法何有則根塵頓淨圓通現前矣不取二字入流之法是名下所謂成正覺也是字指不取法門以其用果覺為因於淨不著於污不染名妙蓮華究竟堅固根境結惑擬之即銷各金剛王覺真妄俱泯幻與不幻二俱不取名如幻三摩提正受依此修道一彈指間可超無學而入圓位十方如來逈出生死速證寂常莫不由斯故曰十方薄伽梵一路涅槃門聖足所履其乘無二曰一路此偈發明如幻之義首提緣生如幻次明結解俱幻然後以自心取自心成如幻三摩之義次卷觀音如幻聞熏可見此偈已暗選觀音法門後五十五位真菩提路又以如幻結之於是阿難及諸大衆聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明嘆未曾有阿難合掌頂禮白佛我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次唯垂大慈再愍斯會及與將來施以法音洗滌沉垢此因領悟而復請未明也祇夜此云應頌應上長行而頌故伽陀此云諷頌不應長行但孤起而諷美稱頌故雜糅精瑩者謂二頌合明無不精透也無遮大悲言其博濟性淨妙常真實法句稱性之談也沉垢微細結惑也阿難至此方信根性為修證之門不復致疑但請倫次及選擇一門而已即時如來於師子座整涅槃僧斂僧伽梨攬七寶几引手於几取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾祇有六結終不至七亦不停五云何如來祇許初時第二第三不名為結佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生我今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異涅槃僧云裏衣僧伽梨云大衣劫波羅云時分即夜摩天疊華西天之帛織成華卉繁多天獻尤為貴重同謂一真之性理本無差如巾之體異謂六根之精事用有別如巾之結一一致問者明不綰則已綰必成結喻六塵粘湛定生六根也世尊以性中相知難其可將六成一阿難以用中相背答六結不可亂名將六成一者六根互用也畢竟同中生畢竟異者未結之先元是一體本無異同既結之後各有界限分隔不得互用以上結之倫次佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起於中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成佛言六解一亡亦復如是佛謂必欲反異為同將六作一用何籌策方可得成阿難謂六結若存則彼此各有定位若以六作一則諍論鋒起決不可得莫若解除則結惑不生而同異圓泯六根之精元是一真之性以隨緣故在眼曰見精在耳曰聽精若能隨拔一根脫粘內伏六既融一一亦斯亡一亡非併真體而亡之但不對乎六結自不立乎一真由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相阿難言此勞同結云何解除如來以手將所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難我今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心狂亂者清淨心中不覺心起而有其念遂成業識知見妄發者由業識而轉成見分勞見發塵者由見分而復生相分一切世間山河大地即相分生死涅槃即見分若執相分為有而墮我見者為生死若空相分為無而墮法見者為涅槃本覺湛性之中一法叵得世出世間一一名數皆是狂勞華相也阿難謂勞見發塵之勞即是一巾所成之結不知用何等工夫方可得解世尊示左右各牽而不能解喻凡夫執有二乘著空皆是以結去結盡屬偏邪俱不能解當從結心下手方得解除結心者即陀那細識是根結之心阿難我説佛法從因緣生非取世間和合粗相如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待既説解結當於結心欲選根而修圓行故示佛法從因緣生若前四大因緣則世間和合粗相故一向排擯今之因緣是欲揀選圓根一門深入發明大事因緣也世謂六凡出世謂四聖知此十界皆隨所修而得果所謂因緣也懸知界外雨滴及松棘鵠烏等元由有情無情種種因緣照了不昧佛智如此則今所説選根解結圓修因緣豈差謬乎以上舒結方法阿難我今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍解結次第即在選根選字之中一根在先其結已解其餘五根次第而除互相為用六結不同時喻六根不同位也結不能一時並解喻根不能一時盡消也此根下明結解所得之功能得人空者於我無著破煩惱障空性圓明成法解脫則破所知障得法空矣俱空者人法俱空而俱空亦空始得不生不滅為因地心入發心住是名得無生忍阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別唯垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授承上賜與華屋請乞入門佛陳二決定義又決定義中開示慧覺圓通悟知一六亡義猶未的曉圓通本根乃思多劫飄零何意今得值佛可謂奇際矣若復因此際會名為成道而所得密言只同向悟一六亡義依然不知圓通本根與未聞開示何別故願更惠祕嚴成就最後開示蓋冀佛的指一門令得深入是謂圓通本根也爾時世尊普告衆中諸大菩薩及諸漏盡大阿羅漢汝等菩薩及阿羅漢生我法中得成無學我今問汝最初發心悟十八界誰為圓通從何方便入三摩地陰入處界本如來藏妙真如性佛欲顯諸菩薩萬行首楞嚴故寄選根令二十五聖各開衆妙之門明彼皆為正修也一切法不出十八界只十八聖足彰萬法矣必陳七大者七大為總十八界為別若總若別皆可入法界也二十五聖證圓通處皆從三科七大中非從根來非從境生非從空出等悟諸法不自生不他生不無因生證到圓通周遍隨衆生心應所知量之妙即是圓通地位宗門一派明是諸聖逗出問金剛經云實無有法名阿羅漢又云我不作是念我是離欲阿羅漢何故諸聖歷言所得所證答法華會上世尊説諸大弟子皆是內祕外現助宣大教之人今楞嚴會中特問遠因欲其轉教菩薩故諸聖方敢恣口自陳從無量劫中種諸善根是現身説法非存所得心也憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀見如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上此因聲塵而入憍陳那此云火器先世為事火外道後世以為姓五比丘乃佛最初得度者佛出家時父王命本族三人母族二人隨衛後逃鹿苑修外道佛成道已即往為彼三轉四諦問言解否陳那答已解佛命彼阿若多此云解也因聞四諦了聲性空唯如來藏妙音即音之實相密圓者密悟圓理於聲教發悟也四諦苦集滅道也苦是苦果集是苦因無始積集業行故名為集由業因而招苦果是世間因果滅是寂滅滅苦集而證涅槃道是三十七道品修此道品得證滅是出世因果優婆尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸於虗空空色二無成無學道如來印我名尼沙陀塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上此因色塵而入優婆尼沙陀此云近少亦云塵性謂微塵是色之少分也因塵解悟故得此名昔多貪欲佛令作不淨觀因觀色塵本如來藏故曰悟諸色空幻色既空空亦不住故曰色空二無幻垢永消證真實相故曰色塵既盡妙色密圓始以色為病九想與空為藥至此則藥病皆除忽然悟入九想者一䏺脹想二青瘀想三壞想四血塗漫想五膿爛想六蟲噉想七散想八骨想九燒想香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齋見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非煙非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號塵氣倐滅妙香密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上此因香塵而入因香成道悟香性空得堅固定故名香嚴初成覺道具體而微故稱童子宴晦安坐冥心之謂清齋靜室也香乃有為中一法寂然者無相也觀香無從心相亦盡故曰由是意銷狂心頓歇也發明無漏即見如來藏性也染幻既空實相常住故曰塵氣倐滅妙香密圓藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良醫口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢醎淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今於會中為法王子因味覺明位登菩薩佛問圓通如我所證味因為上此因味塵而入苦酢等六味也衆味共成名和合直爾採用名俱生修煉炮火名變異世嘗藥草即神農之儔事佛聞法即於味性了知無生因而證覺空有味非空故非離身心味非有故非即身心跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先於威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅妙觸宣明成佛子住佛問圓通如我所證觸因為上此因觸塵而入跋陀婆羅此云賢護亦云賢守能護自己不為物轉故得此名破諸無明始開佛覺故稱開士威音見諦是為初心今從釋迦證於深位外塵內體內外俱無安有中間為水洗者觸之為義以水與我交涉得名今皆無之觸果安在無觸而觸觸實無觸觸處道場觸目菩提故曰妙觸摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫金光塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修於滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊説我頭陀為最妙法開明銷滅諸漏佛問圓通如我所證法因為上此因法塵而入摩訶迦葉此云大飲光姓也其身金色光吞日月名畢鉢羅紫金光尼在家眷屬供養舍利等敘往因也觀塵變壞悟法空寂遂修滅盡定以滅意根不緣法塵得無生滅故超百千劫如彈指頃持金袈裟於雞足山入定待彌勒降生此其證也六塵竟六塵皆言妙者不縛於塵故阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢佛問圓通如我所證旋見循元斯為第一此因眼識而入阿那律陀此云如意是佛堂弟過去以飯施辟支佛感九十一劫受如意樂佛在給孤園説法那律眼睡佛説偈云咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字樂見照明略似修淨土作日觀目雖不見而以心目樂見忽得照明體無時昏物莫能蔽不失不壞故曰金剛精真洞然者真性之中精光顯發洞見大千猶如掌果周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下印成無學佛問圓通如我所證反息循空斯為第一此因鼻根而入槃特迦此云繼道以生路邊故周利其兄也是雙生兒故兼標兄名過去為大法師祕吝佛法不肯教人感愚鈍報以宿善故遇佛出家佛令調息攝心因而了悟出息入息皆具四相初起曰生不斷曰住漸微曰異已斷曰滅諸行即四相遷流也暗鈍雖有遠因而近緣亦由雜亂調息攝住不雜餘緣所以心得豁然定能發慧也反息循空謂反窮氣息至極細處亦歸於空也憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離三有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印登無學道佛問圓通如我所證還味旋知斯為第一此因舌根而入憍梵鉢提此云牛呞牛不食亦虗哨往昔見老沙門無齒而食説其似牛世世感此報佛為遮謗賜之數珠令常念佛斷諸雜緣純一清淨既得念佛三昧復觀味性非體知不隨根也非物知不著塵也雖舉味塵蓋顯於舌能知乃舌耳佛欲教以舌根圓通先令止散入寂後教從寂起照觀察嘗性根塵兩忘豁悟藏性故諸漏頓盡內脫身心是正報解脫外遺世界是依報解脫遠離三界纏縛如鳥出籠所向無礙也離垢銷塵明斷惑功法眼清淨明得果義還味旋知謂還味之流旋歸真如覺也畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如來説諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學佛問圓通如我所證純覺遺身斯為第一此因身根而入畢陵伽婆蹉此云餘習五百世為婆羅門種性傲慢餘習未忘世間不可樂事即苦諦也奉教思苦適遇苦事入道之緣也木石無知則刀割香塗了無所知我唯有知故知此痛雖有覺而覺此痛吾本覺心原是清淨無痛蓋清淨覺心痛不能及也且我一身寧身雙覺乎止有清淨之真覺原無覺痛之妄覺真妄不兩立故身心忽空正是悟處身空故無痛者心空故無覺痛者攝念者隨順無痛清淨之真覺不隨順覺痛之妄覺也諸漏虗盡者真覺藏性現前妄覺了不可得也純覺遺身唯一圓融清淨寶覺更無身相須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一此因意根而入解空非止一世在胎知空空慧不為胎陰所迷也生而即能談空亦令衆生證空雖解空而修惑未盡發者與之發明也性覺真空即第一義空入寶明海同佛知見證空如來藏而具不空之德也諸相入非諸相皆入於非相也非所非盡空相亦空矣旋法歸無無即空也六根竟闕耳根者選當機特留殿後五根內四有旋反字面以根性門中俱有旋根脫塵之義與塵識不同舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於中路逢迦葉波兄弟相逐宣説因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生佛問圓通如我所證心見發光光極知見斯為第一此因眼識而入心見即眼識清淨無障礙也世出世間一切凡聖境界也由眼識明利故一見即通名為法眼迦葉説偈諸法從緣生亦復從緣滅我佛大沙門常作如是説從緣生滅生即無生滅亦無滅以悟此故得心無際即見離念之相獲慧眼矣見覺明圓幻識已銷真覺圓現也得大無畏見之徹也智慧第一名德居長稱長子如來開示妙法故云從口從法獲佛眼矣心見發光光極知見從於眼識發顯智光智光極處即佛知見也普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就佛問圓通我説本因心聞發明分別自在斯為第一此因耳識而入行彌法界曰普位鄰極聖曰賢無行不修無德不滿也凡具大根修菩薩行者皆名普賢之行心聞即耳識發明也象表行步安詳常行不暴象有六牙表普賢行遍於六度白者衆色之本表一真之理為萬行之本擁護不令魔擾安慰不令心退心聞發明內證也分別自在外用也即用耳識自性分別不用意識計度分別也孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及拘絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如煙身心內明圓洞世界遍成虗淨猶如琉璃煙相漸消鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提佛問圓通我以銷息息久發明明圓滅漏斯為第一此因鼻識而入孫陀羅云好愛妻名也難陀云歡喜己號也為簡放牛難陀故連妻標名是佛親弟先敘欲心未忘於入定時心常散動拘絺羅志性明敏狂慧數多心亦散動佛令同觀鼻端之白駐心於此勿令異緣息由風火而起鼓煩惱濁其狀如煙淨觀發明煩惱漸銷內明外虗煙銷成白及乎漏盡無復煩惱內瑩發光息化光明富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣説苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我説法無上佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一此因舌識而入辨才有四一詞二法三義四樂説不屈不窮俱稱無礙宣説下指小乘法如是下示大乘義祕密法門者或如來久默不説之法或半明半暗之法或言東意西之法微妙開示者曲盡其意而闡明以徹法源故無所畏上敘過去佛事世尊下敘現在佛事音聲輪者是説法音聲輪是喻説能摧惑障得勝轉依故喻法音為輪教我發揚者令其助佛揚化也我於下明功得果佛問下結今問義説法乃舌根而咀嚼法味則舌識説法須意識今用舌識者見説法自在不勞計度也優波離即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推無上佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一此因身識而入親隨親觀乃至承教皆身識事優波離此云上首持戒為衆綱紀故又云近執佛為太子時彼為親近執事之臣故三昧經云太子既成道感天動地放大光明映蔽魔宮魔王波旬恐怖憂懼乃統八十億魔軍殊形異狀來相擾害擾之不動魔心始服外道者佛成道後遊化諸國外道六師遍於五天一師三種合十八部皆博學多聞悉破邪心皆從化也降魔制外明佛智德解脫欲漏明佛斷德承佛下正明悟因三千威儀者比丘二百五十戒對行住坐臥各二百五十成一千對三聚戒成三千威是威嚴端莊持正之謂儀是儀表視聽言動俱有法故八萬等者重以三千配身口七支成二萬一千復配四分煩惱成八萬四千今舉大數故稱八萬性業即殺盜淫妄性所造遮業即枝末愆失因過制遮印心者印其持戒修行之清淨心也依身有識故執身次執心聰利者證圓通也三聚戒攝善法無善不積起助道行是智德因修成報身也攝律儀惡無不離起正道行是斷德因修成法身也攝衆生生無不度起不住道行是解脫因修成化身也七支心三貪嗔癡口四妄言綺語兩舌惡詈也四分煩惱多貪多嗔多癡及等分也大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣説如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來嘆我神力圓明清淨自在無畏佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一此因意識而入目犍連是姓此云采菽氏拘律陀是名此云無節樹優樓頻螺此云木瓜林伽耶此云城那提此云江各從居處得名大兄門徒五百兩弟各二百五十佛因降伏火龍以諸聖迹而調御之故兄弟三人兼徒一千從佛出家因緣深義非世間和合粗相乃發明諸法空義十方無礙正顯神通第一不測曰神無礙曰通出沒聚散一多大小更互移易忽隱忽顯皆不可測知名為神通然此是迹若究其本元我妙覺真心本有之光旋湛者旋意識而復妙湛即轉意識而證如來藏心心光發宣神通妙用也六識竟識與根何分姑以眼論眼照境時一念不動如鏡中無別分折此見性也名眼根用因循歷黑白大小善惡等相歷然分別即眼識也由是次第標指差別計度即眼家意識矣餘四例知烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲有佛出世名曰空王説多淫人成猛火聚教我遍觀百骸四肢諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶𦦨登無上覺斯為第一此因火大而入烏芻瑟摩此云火頭依德立名不言座起者良由示金剛身衛護侍從不設本座將敘其悟先陳其迷因迷得悟則迷是悟因淫由暖觸迫發生為欲火死為業火業力增熾成猛火聚問水從貪致火因嗔心何故多淫為猛火答法無定喻淫心漸漬潤生死根則喻水淫心昌熾枯清淨種則喻火嗔心猛烈炎炎難滅可喻火嗔心洶湧滔滔難禦可喻水人身氣有冷暖以多淫心醞釀薰蒸諸冷暖氣悉皆成暖以正念觀照氣從何來因何成火觀力所注此氣化為神光向之欲火今成智火向爇功德藏今燒煩惱薪故曰火光三昧力士是金剛本名親伏魔怨是大願實迹由護法而伏魔怨也佛問下結今問義初因諦觀身中暖觸與外世界火大無二無別不相為礙諸漏盡者破無明也寶焰約喻説寶是心寶𦦨是般若此指圓心實慧方證無上覺故因中説果也持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現於世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其直毗舍浮佛現在世時世多飢荒我為負人無問遠近唯取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齋我於爾時平地待佛毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢回心今入菩薩位中聞諸如來宣妙蓮華佛知見地我先證明而為上首佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一此因地大而入持地菩薩依行立名平世界地積行淳厚未達塵性本空聞毗舍浮教即得心開觀身界微塵等無差別由達天地同根萬物一體空諸塵矣以空合空豈相觸摩刀兵亦塵也故亦無所觸悟無生忍者以達蘊中無我得證人空也雖悟無生而廣修萬行具菩薩道故遇宣説佛知見地我必預會而作證明身界二塵元是如來藏性本無差別由無明一動知見妄發故有根塵差別今根塵既銷鏡智圓滿云何不成無上知覺月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地觀於身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別我於是時初成此觀但見其水未得無身當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投於水內激水作聲顧盻而去我出定後頓覺心痛如舍利弗遭違害鬼我自思惟今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失爾時童子捷來我前説如上事我則告言汝更見水可即開門入此水中除去瓦礫童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一此因水大而入月乃水精水性圓明故號月光水天者證水大徹於性天也此佛或從此大入圓或觀時機示號與觀相應耳無奪者不相乖異準華嚴經華藏海中有大蓮華其蓮華中有諸香水海一一香水海各有一華為諸佛剎世界之種華藏世界在香水海中有二十重纍高如幢故曰浮幢王剎香水海無量無邊今觀身水與彼海同水遍室中觀成之相也問室中之水是從何來答是定果色定心所化入定則有出定則無不同業果色共業同感唯自見之而能令他人見者觀力殊勝不思議境如世尊伏龍火石窟洞然聰禪師入火光定山谷如焚未亡身者身水為二猶有我身同彼水也亡身者與水為一求於我身不可得也身存因有小苦觀成永無大害舍利入定於恆河岸為宿怨鬼所擊出定頭痛佛曰汝若無定身應碎壞此身既空水觀亦空即與性空真水周遍法界得自在也得童真名者具童子之真德預菩薩會者證菩薩之法空水性流通者從水觀得圓通也琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此羣動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一此因風大而入以所悟洞徹得琉璃號無量聲佛亦合風大開示本覺無動而身界之動皆風力所轉琉璃因是觀界觀世觀身觀心遷流運止同一虗妄大千羣動皆即狂勞猶百蚊蚋鼓於方寸耳既了狂勞乃見不動佛也東為羣動之首而佛號不動即動而靜也能即動而靜故身心無礙傳一妙心者證無動本覺也虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一此從空大而入從德立名故名虗空藏然非斷空能容一切利物方便因加一藏字定光佛即然燈佛也空體無邊故得無邊身華嚴海中有四寶珠能消海水喻菩薩有四智珠能消性海中波浪也照明塵剎化虗空者以性融相也心境放光攝剎入身而身不妨礙則空而不空身同虗空法身也身入微塵應身也説三乘法為佛事稱四悉檀為隨順悉遍也檀施也初世界悉檀者隨方異説令生歡喜益也二為人悉檀者生善益也三對治悉檀者破惡益也四第一義悉檀者入理益也此大下結歸本因謂由觀四大身心虗空佛國同一虗妄於同發明而悟性覺真空性空真覺故有如此大用也妙力圓明指空色無礙身土相入也彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊族姓爾時世尊教我修習唯心識定入三摩地歷劫已來以此三昧事恆沙佛求世名心歇滅無有至然燈佛出現於世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處佛問圓通我以諦觀十方唯識識性圓明入圓成實遠離依他及遍計執得無生忍斯為第一此因識大而入彌勒此云慈氏心重世名者務虗名而不務實修也好遊族姓者不內旋而向外馳求也修習唯心識定者令其審觀萬法皆從心識所變非實有也求世名心歇滅無有者知幻境不實名心頓空一意內觀也然燈下因觀成而悟入妙圓識心如來藏性也乃至下悟器界淨穢皆從識變不自外求也世尊下明諸佛皆從識性流出不由他變也次補佛處者謂既登等覺位鄰極聖釋尊法滅之後彌勒即於此界補釋尊之後化不悟唯識故背心逐境若了唯識則攝境歸心經論載三性圓成實性依他性遍計執性圓即法身遍一切處成即般若覺無漏實即解脫德無礙依他者從緣所起指所緣法説遍計執者周遍計度指能緣心説依他有相無性遍計有名無實入圓成實約果德説得無生忍約果位説大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧譬如有人一專為憶一人專忘如是二人若逢不逢或見非見二人相憶二憶念深如是乃至從生至生同於形影不相乖異十方如來憐念衆生如母憶子若子逃逝雖憶何為子若憶母如母憶時母子歷生不相違遠若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開如染香人身有香氣此則名曰香光莊嚴我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一此因見大而入大勢至亦名無量光以智慧光普照一切令離三途得無上力名大勢至念佛三昧若據理念念即始覺佛即本覺若據事念冥記不忘之謂念放光接引之謂佛則能念屬己所念屬佛也一人專憶者喻佛念衆生一人專忘者喻衆生不念佛佛專念衆生未嘗不在衆生前故若逢若見衆生不念佛故佛雖在衆生前而不逢不見果如母子相憶則永不相隔矣十方三句合一人專憶若子二句合一人專忘子若四句合二憶不離去佛不遠者常親近佛自得心開者見自身佛所謂但得見彌陀不愁不開悟也近香故身亦成香近佛故心亦成佛香光莊嚴者以佛身香光莊嚴自性佛也都攝六根者謂一心念佛則六根皆念佛眼不取色是眼念佛乃至意不取法是意念佛唯其六根都攝故得淨念相繼觀音勢至皆彌陀之輔弼一以念佛接人一以參禪誨衆皆就此界根機各開戶牖問參禪者不但不容起我人衆生壽者見即佛見法見亦不容起此經斥見相發心為生死金剛訶聲求色見為邪道念佛者志在淨念相繼現前當來決定成佛空有二門逈然各別答參禪者志在泯一切相所以不容起念善惡盡掃念佛者志在佛來接引要須淨念相繼頭頭見佛唯能掃除一切方能見性既能見性何難見佛亦唯淨念相繼必能見佛既能見佛亦易見性唯真空者證妙有唯妙有者見真空門雖有二其究歸一通論二十五門六塵當始於色今始於聲而耳根在最後者以此方真教體清淨在聲音揭教體之綱領也七大當始於地大而火大為先者以多淫召火合此經墮淫起教警多聞人先除欲漏也七大當終於識大而終於見大者以勢至念佛圓通稍次於觀音所云攝念佛人歸於淨土自度度人何等願力本事原是最上一乘
