body:
  text: 爾時富樓那彌多羅尼子在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為眾生敷演如來第一義諦世尊常推說法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所說法音尚紆疑悔世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始又如來說地水火風本性圓融周徧法界湛然常住世尊若地性徧云何容水水性周徧火則不生復云何明水火二性俱徧虗空不相陵滅世尊地性障礙空性虗通云何二俱周徧法界而我不知是義攸往唯願如來宣流大慈開我迷雲及諸大眾作是語已五體投地欽渴如來無上慈誨滿慈聞三科七大皆如來藏性故執性難相以興二問善為眾生敷演如來第一義諦者正領三科本如來藏七大徧周法界此第一義諦理極深微即世尊推我說法人中最為第一今聞如來微妙法音喻如聾人逾百步而聆蚊蚋抑且本所不見焉能聞其聲乎佛雖宣明此法令我除疑然我不能入於無疑之地且阿難輩雖得開悟然根中無始虗習宛然盡在其疑固然即我等輩無學已證諸漏已除者尚紆疑悔況未得無漏者乎舊修已悔新聞尚疑也世尊下先牒三科以呈疑番上本如來藏妙真如性之義既曰清淨本然不應忽生穢染器界根身業果從曠劫來相續不斷又如下次牒七大以陳疑番上圓融周徧之義若謂七大本性圓融周徧則土能尅水地水不合相容水能尅火水火何能共徧通塞各異地空安得互周不知是義之所歸趣唯願下所謂審除微細惑也爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空迴向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處汝今諦聽當為汝說富樓那等欽佛法音默然承聽如來常依二諦說法世俗諦勝義諦今又勝義中勝義也二空人空法空也人空已得未得二空一乘即佛乘也滅場即大寂滅海得果之地練若即蘭若此云離諠諍修因之處借靜境喻大定也正修行處者除此一乘其餘皆是旁蹊不名正修佛言富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣說性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣說斯義佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱起為世界靜成虗空虗空為同世界為異彼無同異真有為法性覺妙明者此性覺是極妙之明葢寂而常照之明也本覺明妙者此本覺是明之極妙者葢明雖照而未常不寂也本字即清淨本然也與性字相承不相對欲示本清淨心所以生出山河大地諸有為法者由妄起明覺而致先舉性覺妙明本覺明妙之語問富樓那此覺明義作何理會為是性本自明不須再明故稱明為覺耶為是性覺尚有不明必加明字於覺字上而稱為明覺耶富樓那愛著明字言覺是所明之理須有能明方有所明若便以不明為覺則無所明矣安得謂之覺耶佛順其辭而破之曰汝慮無所明則無所覺然則必有所而後為覺耶不知真妄分界正在一所字有所則是明非覺無所則是覺非明然真覺只是無所不是無明若并無本明又非覺湛明性矣本性之覺必具湛明所謂妙明明妙也不知覺本自明妄加一明於覺之上便生出許多事來何也性覺之體本非所明因有妄明遂立妄所所既妄立益生妄能宛轉相生無有窮時無同異下承生汝妄能來本性之覺無同異也能所既立則無同異中熾然成異矣異彼所異是因異又立同也同異互相是非復立無同無異矣因明立所擾亂真性因所生能因異立同因有同異復立無同無異晴空淨眼變成勞目矣勞久發塵下正山河大地生起相續之狀塵即世界虗空眾生自相渾濁即下文從始至終五疊渾濁也因世界眾生而有業果晴空之中別見種種華相矣詰其根元總是妄明一念所生一念中紛起者為世界晦昧者成虗空虗空為妄明中所現同相世界為妄明中所現異相眾生業果諸有為法即妄明中所現無同無異之相彼謂無同無異者乃真有為法豈待眾生業果熾然頓興之日而後謂之有為哉覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界火騰水降交發立堅濕為巨海乾為洲潬以是義故彼大海中火光常起彼洲潬中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種以是因緣世界相續覺明者覺中妄起之明空昧者頑空全是晦昧相待成搖者明昧相傾不覺心動也風以動為性由心動之所感風輪持世者最下依風輪而住也因空生搖牒上文堅明立礙者堅凝妄明成立質礙金以堅為性由心堅之所感金輪保持國土者大地最下依金輪起也堅覺寶成搖明風出牒上二文風金相摩因生火如鑽燧一堅一動而火出者然變化性者火能變生為熟化有成無也寶明即含潤相如珠光出水者然火光上蒸者火有蒸之氣即能成水如蒸物汗流者然世界下有水輪兼承載涵潤意四大俱由二法相合而成初則明與昧合而成風輪次則搖與礙合而成金輪次則風與金合而成火輪次則金與火合而成水輪總以覺明為最初根本堅覺搖明寶明俱帶此明相來交發者水火既濟也立堅者結成器界也海亦由立堅而成者注水巨坎全是堅體海中火起潭中水注水火共生之義也水勢劣火者水少火多也土勢劣水者土少水多也融則成水如煉金鑛成汁者然交妄發生者互以妄相生也遞相為種者初由妄心而生四大復由四大而成器界也世界相續者成住壞空終而復始相續不斷永無清淨之期也由無明為風輪種執心為金輪種瞋心為火輪種愛心為水輪種若無明破而風輪息堅執消而金輪壞瞋心歇而火輪空愛心盡而水輪涸器界應念化成無上知覺復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等胎卵濕化隨其所應卵唯想生胎因情有濕以合感化以離應情想合離更相變易所有受業逐其飛沈以是因緣眾生相續明妄指眾生見聞覺知諸妄境界也謂此妄境非他法所成是於覺體上加一明字為過咎耳理猶體也明理不踰者覺明之體隔礙不成圓通能所為局也聽不出聲見不超色不踰之相也六妄即六塵成就具足義分開見覺聞知攬六塵以成六根也同業二句六道四生之始也同業即胎卵類因父母己三者同業故相纏著而有生合離即濕化類不因父母但由己業或合濕成形或離異托化見明八句別示胎生之相也妄心見妄相故云見明色發即於中陰見父母也依妄境起妄惑故云明見想成想成之中又有憎愛違情者名異見順情者名同想流愛為種者見彼交遘之色則流愛想入於母胎成胎生的種子納想為胎者有福之人想母胎如華林殿堂薄福之人惟棘樹圊廁交遘發生謂男女會合染心成就吸引同業謂吸引過去同業而入胎也故有三句明成胎歷位的名相胎中有五位一七名羯羅藍此云凝滑二七名遏蒲曇此云皰三七名閉尸此云輭肉四七名健南此云堅肉五七名鉢羅佉此云形位舉其二故曰等胎卵六句示四生感應各從其業也四生起時業與情想相應之處即便受生情想合離四生皆具據多分說卵中生者多分是想如飛鳥魚龍皆迅疾故胎中生者情多想少以情多重墜不能輕舉濕氣中生不由父母但情想與濕氣合即便受生化亦由想懸想勝處情愛彼境即便化生情想四句重明四生更變不常或情變為想合變為離無定業也卵易為胎濕易為化無定質也所受業報或升或沉無定趣也眾生相續之由也富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我憐汝色以是因緣經百千劫常在纏縛唯殺盜婬三為根本以是因緣業果相續欲貪通乎四生今就人倫辨之想愛同結不專受生時在世亦然貪愛同滋者貪愛身命同賴滋養也人羊生死互來相噉名盜貪者亦殺亦盜也奪財為盜況奪其生命乎命屬殺債屬盜愛憐屬欲汝我命債負還文義互見心色愛憐亦然欲貪殺貪盜貪皆曰為本生死輪迴之本也故知三界流轉唯一貪愛若斷貪愛便出三界矣富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始如上世界眾生業果三種顛倒相續皆是本覺明中妄起明了因了而發相從妄而見生耳前問云何忽生山河大地諸有為相次第遷流終而復始今答皆因虗妄了知所發也富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟而出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是狂人為愚為慧佛言如汝所解云何問言諸佛如來妙覺明空何當更生山河大地又如金鑛雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是眾生覺體與佛無別無端忽生諸有為相則如來既證空覺何時復生諸有乃常情所惑故特發問昔本無迷非眾生未妄前也正當迷時無迷可得如迷方者方實不移也無迷則亦無覺似有迷而覺之耳故不覺則已但一覺迷迷即頓滅永不復生葢迷時已無迷可得況覺後豈復生迷乎妄本無生非成佛始滅真本無變非成佛始生眾生分中尚自無生無變況成佛者有生有變乎四喻兼舉使知迷悟雖妄而不廢修證葢方本不移空本無華此指清淨本然鑛必用鍊木必用燒說向工夫去也迷喻煩惱永不起華喻生死永不續金喻菩提永不滅灰喻涅槃永不還富樓那又汝問言地水火風本性圓融周徧法界疑水火性不相陵滅又徵虗空及諸大地俱徧法界不合相容富樓那譬如虗空體非羣相而不拒彼諸相發揮所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀當知是明非日非空不異空日觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真唯妙覺明妙覺明心先非水火云何復問不相容者真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據此下答富樓那第二問也虗空體非羣相不拒發揮喻如來藏體非諸大不礙隨緣已盡大意下詳明之殊方者隨處而發也彼指日雲等且日至空日單舉日明以例六妄者無體之意諸大無體云何得相陵滅且觀如來藏性雖有真火真水等名元一妙覺明心實無質礙潤濕燒燥之相何有不相容耶空明空現是循空業而現空相如鑿井而空出也各明各現各循業而各境現如一處求火一處火出一處求水一處水出也俱明俱現同循業而境同現如徧法界執滿法界起也正表隨眾生心應所知量之妙二卷顯如來藏體故以真月喻真以月影為妄此顯如來藏隨緣不變不變隨緣非借水中日影不能形容俱現之妙但觀如來藏隨七大俱現如一日影隨東隨西其妙自見富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周徧法界是故於中風動空澄日明雲暗眾生迷悶背覺合塵故發塵勞有世間相我以妙明不滅不生合如來藏而如來藏唯妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場徧十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裏轉大法輪滅塵合覺故發真如妙覺明性上文七大之相如此不可詰其相陵滅義七大之性又如此不可問其不相容者然則七大何故而有由汝業識不空相見未破循色空之業互相傾奪於如來藏而如來藏即循汝業而現空現色故見色空周徧法界於開眼時但見物象森羅塵勞滿前全成穢土不知相本虗而無可憑據良由眾生內為無明所蔽業力所使心自迷悶不自了知背清淨覺和合妄塵故發塵勞見世間相不見真如妙覺明性所以全性成相我則無明已盡業識已空唯是清淨妙明智體更無所有即以妙明智體合如來藏而如來藏唯見妙覺明心徧十方界更無一物為障為礙是故於中事事無礙所以全相成性故知心有也娑婆境現心無也華藏合空一為二句一多相容也小中二句廣狹無礙也不動二句即一為無量身含二句即無量為一毛端現剎者正中現依微塵轉輪者依中現正即小中現大也此皆如理智中現如量境如來藏如鏡之體妙覺明如鏡之光圓照法界如鏡現像雖三而一雖一而三一為無量等皆顯此義也而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多如是乃至非怛闥阿竭非阿羅訶三耶三菩非大涅槃非常非樂非我非淨以是俱非世出世故即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得如檀那即尸羅即毗梨耶好羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨以是俱即世出世故即如來藏妙明心元離即離非是即非即言雖滅塵合覺一多小大相攝相容起大神用而如來藏中實纖塵不立非一切也雖非一切又萬法悉備即一切也又互泯互存不可思議也何疑諸大周徧法界不相陵奪哉心至火七大五陰也心即識大而攝五陰眼至意識界十八界也亦攝十二處以上世法明無明至老死盡緣覺界也苦集滅道聲聞界也智得二乘界也六波羅蜜菩薩界也怛闥阿竭乃至常樂我淨如來界也以上出世法世乃六凡出世乃四聖是即非即猶云亦即亦非即也明無明由真明而起之無明也檀那此云布施尸羅此云滅惡戒之總名毗梨耶此云精進羼提此云忍辱禪那此云靜慮般剌若此云智慧波羅蜜多此云到彼岸六度究竟方稱到彼岸故分說也如是乃至者出世法教理行果名數既多不能盡述故超而言之以至佛之十號非怛下是遣能證之號怛闥阿竭此云如來阿羅訶此云應供三耶三菩即三藐三菩陀此云正徧知是佛十號之三非大涅槃是遣所證之法涅槃是體常樂我淨是涅槃之四德不死名常無苦名樂具八自在名我無染名淨俱非約真諦示如來藏俱即約俗諦示如來藏藏理即無而有十界宛然也如何世間三有眾生及出世間聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發汝與眾生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足前文滅塵合覺故發真如妙覺明及一為無量等所謂如我按指海印發光也前文背覺合塵故發塵勞有世間相所謂汝暫舉心摩勞先起也前文是法此是喻海印者閻浮所有色像大海皆有印文喻如來法身性海普現一切世間之相富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪迴今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切眾生何因有妄自蔽妙明受此淪溺此窮索妄因而擬斷也我與下根上寶覺真心各各圓滿來而我下領前妄為明覺也世尊下領金鑛木灰喻也敢問下正請妄因言蒙佛慈誨已知妙明真心與佛無二已知我因妄想故久在輪迴佛因妄滅故獨妙真常但未知此妄何因而有耳前問清淨本然云何忽生世尊答以因妄明起今問此妄明復因何起所謂直窮到底也佛告富樓那汝雖除疑餘惑未盡吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅得菩提者如寤時人說夢中事心縱精明欲何因緣取夢中物況復無因本無所有如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失富樓那妄性如是因何為在此借事發明妄本無因突然而起也言汝已知相續起於妄明七大唯是真性如來得妙明覺不生山河大地猶不知妄本無因故曰汝雖除疑餘惑未盡達多頭本不失己非魑魅忽自以為魑魅無狀狂走者此狂何因而起滿慈當下分明答云此人心發顛狂而走更無他故佛言妙覺明心本來自圓本來自明本來自妙未甞有妄既稱為妄云何有因若有所因即名為真云何名妄究其現在是自己妄想展轉相生初無定處推其本始是一迷積迷歷乎塵劫亦無有因我前與汝發明汝猶不能自己反求而從人索妄本耶如是迷因是迷自己本圓妙心而有別無他故若汝識此迷本無因則汝妄想元無所依汝今雖遭妄想久在輪迴尚無有生云何說世尊諸妄圓滅獨妙真常索妄本於我耶我今雖得菩提但能說此妄本無因豈能拈出無因之妄以示人乎正如寤人說夢中事別無方法取夢中之物以示人也夢中物似有因尚不能取況本無之妄想乃欲索其生起之因惡可得哉此妄無因正如達多狂性相似不是本來有狂元是迷頭認影而狂其因豈有定在耶汝但不隨分別世間業果眾生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得此告以歇狂之方也不隨是歇狂初步分別是分別二執言汝但不隨順世間業果眾生三種分別現行相續心則三種現行相續心一時頓歇所謂緣斷而因不生又答遷流終始之問三緣世界眾生業果之緣覺明空昧相待成搖等為世界因緣明妄非他覺明為咎等為眾生因緣欲貪殺貪盜貪等為業果因緣又借達多之狂迷頭認影以例滿慈之狂認明墮所狂事不同狂心無異此狂一歇當下即證菩提不勞餘力則知勝淨妙心本然周徧元是己物何藉粘皮帶骨動經劫數勤苦修證哉衣喻無明珠喻勝淨明心言雖有此勝淨明心而為無明包裹有而不覺也所願從心致大饒富者現塵現剎無不如意也即時阿難在大眾中頂禮佛足起立白佛世尊現說殺盜婬業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏今說菩提不從因緣則王舍城拘舍梨等所說自然成第一義唯垂大悲開發迷悶富樓那問意已圓復以阿難起問仍還當機也殺盜婬舉業果因緣該世界因緣眾生因緣頓棄句指歇即菩提何藉修證等語此阿難第三番執因緣也必帶自然者若曰今棄因緣則外道自然之說為當矣所說自然謂八萬劫後自然成道佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走阿難不執自然但執因緣佛言汝不說因緣則已若謂狂性以因緣故而得滅除則正滅除時不狂性便自然而出是則本排自然翻墮自然因緣自然之理至此窮矣阿難下拂頭非自然也謂頭本自然則本自其然也當常常自然矣何故忽怖失而狂走乎此因緣二字只是故字法合當云本性若屬自然眾生當常見自性何故有迷而背馳者可見菩提不屬自然若自下拂狂非因緣也頭若因緣而狂即宜因緣而失今本頭不失也狂怖特妄出耳當狂怖時本頭實無變易則狂歇而覺有頭何藉因緣乎法合當云性本不失無端迷背似失當迷背時性無變易則迷破見性何假因緣哉可見菩提不屬因緣本狂下拂狂非自然也上文狂非因緣恐轉計狂屬自然故以此破之法合當云清淨本然原無妄想也不狂下拂不狂非自然也不狂自然應上文不狂性自然而出恐轉計不狂為自然故以此破之若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則明自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法菩提涅槃尚在遙遠非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恒河沙秪益戲論此下發明正義悟字知字是歇狂妙訣由悟本頭非自然非因緣然後知狂走非自然非因緣悟本頭方見本來面目是真知狂走纔覺向外馳求是妄言汝自迷家寶向外馳求執緣執自固所不免若使親見本來狂心頓歇則知因緣自然俱成戲論非實義也我說三緣斷故即菩提心者即歇狂悟本之法豈因緣自然之可擬哉雖然若執狂心歇而菩提心生者亦是因緣亦是狂心亦是戲論猶然生滅不獨爾也即使滅生俱盡至於無功用處若有自然作自然想此名自然心生生滅心滅亦是戲論亦是狂心亦是生滅何以故以生滅為因緣而以無生滅為自然喻如世間雜和而成一體者名和合性對此和合則以非和合者稱本然性即此本然是對待法非真本然故亦如戲論直至本然非本然和合非和合二俱遠離離與不離二俱雙非方是正句方是無戲論法復恐以解為證故當頭一點云得到這個田地菩提涅槃尚遙遠在得句之時纔是發心正好修行趨向菩提苟非歷劫修證雖持多經妙理亦是祇添戲論與本分事了無交涉此經為見性修行不取多聞知解阿難已悟玅覺明心下乃密請修行理行冥合汝雖談說因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心婬火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫是故阿難汝雖歷劫憶持如來秘密妙嚴不如一日修無漏業遠離世間憎愛二苦如摩登伽宿為婬女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記如何自欺尚留觀聽此下極言多聞之弊激其進修也言汝談說自然因緣決定明了毫無差誤聲聞眾中推汝多聞以為第一用此多聞積劫熏修不能遠離婬術之難若果多聞可脫苦離縛何須神呪冥加之力立使登伽婬火頓歇便證三果不生欲界汝亦得脫則知呪力與多聞力日劫相倍汝雖憶持如來秘密妙嚴不如一日肯修祕密妙嚴便可遠離憎愛二苦以此二苦從投胎異見成憎同想成愛處便有是與生俱生極難除者若肯一日修無漏業即能永斷況其他乎但恐不肯進修耳復舉劣機得益以痛責之一念熏修非徒口說出纏指登伽授記指耶輸耶輸女身已為弱質登伽婬女更是劣機但以一念熏修皆獲大益汝以丈夫為眾知識反自迷悶躭著戲論不肯修無漏業真自欺也阿難及諸大眾聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲淚頂禮佛足長跪合掌而白佛言無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沈冥出於苦海世尊我今雖承如是法音知如來藏妙覺明心徧十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入唯願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇佛慈旨實相無相如來藏體周徧十方本性清淨絕名離相者是也前卷佛責聲聞不達實相許令修大乘者通達實相今重重開釋故惑銷而心悟失性如旅泊見性如華屋見性不修如獲屋不入故請如來本發心路入佛知見也無餘涅槃圓果也本發心路圓因也既已見性又求入佛知見者見方開示修乃悟入要因門入起後一門深入意疇昔攀緣應首卷攀緣心此不復認為自性但未知從何攝伏首卷決擇真妄發明覺性乃至深窮萬法決通疑滯使信解真正為因地心因地既真斯可圓成果地修證以上為見道分下別起修道分爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法眾生發菩提心開無上乘妙修行路宣示阿難及諸大眾汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義發覺從本覺而發始覺也初心最初起修之心也決定義謂決定而不可易者初義令審因地發心為進修基而指五濁為生死根本即虗妄滅生者也令其擇之旋之而依圓湛不生滅性以成功次義令審煩惱根本使知所降伏取如來位而指六根媒賊劫家繼以世界相涉之義備顯六根數量優劣令知所擇也既得無生滅性為因地心又審煩惱根本選擇圓根一門深入則六根俱降伏而可圓成果地覺矣云何初心二義決定阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故則汝身中堅相為地潤濕為水煖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是第一義者即前第一義諦正如來藏心也汝等欲捨小修大入佛知見應當審詳觀察此因地心與果地覺是同是異以末後牢關不離最初一念故阿難向所用者皆是因緣生滅心今欲入佛知見故先令其審察當以不生滅心為大事因緣方能入佛知見發心者謂此覺心本來清淨周徧法界但為二障所纏鬱而不起若得此心開發則於菩提果覺何有若不以此為因地心仍用名言所熏業種所起生滅之心以為本因而欲求佛果覺惡可得哉以是下令其在器界審觀有壞不壞世間可作之法皆有變壞唯是虗空不壞無造作故則知以不生滅為因方得金剛不壞之體若以生滅為因多劫終成敗壞故求佛乘者必審因心也然此不生滅心不離現在生滅識中但為四大六根渾濁而不得見故令其審觀也四纏即四大汝具有湛圓妙覺明心清淨本然一為四大所纏則不周徧裂為六根則不本然翻為五濁則不清淨云何下喻明濁相清水喻淨覺塵土喻四大六根清淨覺心本與四大六根了無交涉由最初一念忽起遂分能所而清淨覺心渾濁不見首卷言各種錯亂修習先辨因地生滅與不生滅已將攀緣心為生死根本作生滅因指出識精元明為菩提涅槃元清淨體作不生滅因則生滅與不生滅因果皎然矣此處云云不重出乎曰識精元明雖屬不生滅性然如第二月真中帶妄真者何即湛圓妙覺明心也真中之妄者何即四纏分此心為視聽覺察始終五濁也必澄去五濁無復真中之妄方名不壞方是得元明覺無生滅性為因地心良由因果明白故未入信前已得無生法忍下文先擇生死根本不是首卷所破緣心所謂旋妄伏元乃澄去識精元明中所帶一分之妄是經末破識陰境界前問從何攝伏攀緣此答以旋妄伏元業識破盡則緣心不求攝伏而自伏矣阿難汝見虗空徧十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名眾生濁汝等見聞元無異性眾塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁初濁依於色陰色陰單言空見者迷妄最初唯有空相因見吸攬結而為色頑空妄見渾合為一曰不分前云縱令虗空亦有名貌是空本有清淨之體今與見相混則空為擾擾之空而亡其空之體前云見非是空是見本有明了之覺今與空相混則見為蒙蒙之見而亡其見之覺所謂土失留礙水亡清潔也二妄生滅不停綿密相纏有織成義梵語劫波此云時分眾生無始自晦昧為空時便是時分不淨故曰劫濁汝身下濁依於受陰受以領納為義摶即受也湛圓性中本無身相摶四大為之性無留礙為四大之壅而有留礙四大無覺知為性所旋而有覺知一旋一壅密織而不可分以見領納故名見濁又汝下濁依於想陰憶過去識現在誦習未然皆想也想念力發知見性此意識性從六根發此意識相在六塵現是則離塵無意識相離根無意識性根塵識三混作一處起貪瞋等煩惱由此生名煩惱濁又汝朝夕下濁依於行陰念念遷流曰行知見是主人業運是善惡此身是主人執受無奈業力推移不能作主欲留者因業力遷而不能常存欲遷者因主人留而不能即去以此業運是眾生同分生基名眾生濁汝等下濁依於識陰性唯一耳六塵不同牽生六識故云眾塵隔越無狀異生也性中相知牒元無異性用中相背牒無狀異生言同則用相背言異則性相知曾無定準以此交織妄成識陰識住命在識去命謝不得自在故名命濁妙覺明心唯一湛圓自晦昧為空之後外被十方器界所渾而為劫濁內被四大身相所渾而為見濁更被六塵緣影所渾而為煩惱濁由是斷續遷流被生死所渾而為眾生濁眾塵結滯六根不復通融而為命濁五疊渾濁全失湛圓性矣欲復湛圓須求澄濁之法阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇死生根本依不生滅圓湛性成以湛旋其虗妄滅生復還元覺得元明覺無生滅性為因地心然後圓成果地修證如澄濁水貯於靜器靜深不動沙土目沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德迷真起妄見聞覺知返妄歸真常樂我淨問審因心而因見聞覺知者何也答由此四纏分汝湛圓妙覺明心為視聽觀察故見聞覺知全是妙覺明心既由見聞覺知而成濁必由見覺聞知而澄濁以凡望聖故曰遠擇者擇去不用也生死根本即五濁業用不生滅圓湛性即二卷圓滿菩提不生滅性圓滿指果依指因以湛旋其虗妄滅生復還元覺是滅除生死因功夫得元明覺無生滅性則菩提圓滿以此為因地心則用果為因即因即果矣二卷見見之時見非是見是照見生相無明時也此處旋妄復真是進斷生相無明時也一切變現俱是淨用故云不為煩惱即用即體故云皆合涅槃如來所責阿難修無漏業意蓋如此第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位諸有為相權小舊修之行發業潤生指煩惱也良以業不發處是真發心生不潤處是真無生故令詳審發業潤生誰作誰受意顯六根自作自受既知業識造業受報則知轉業識方得發心證果阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始眾生世界生纏縛故於器世間不能超越真空無結由六根與世界相涉煩惱纏縛不能超越斯成結矣正虗妄根塵顛倒之處六根非煩惱之根本乎宜解之矣賊必有媒外之六塵內之六識皆由眼等引發和合惱害如來藏性故云六為賊媒自劫家寶則知此六根者實為生死結元阿難云何名為眾生世界世為遷流界為方位汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三一切眾生織妄相成身中貿遷世界相涉而此界性設雖十方定位可明世間祇目東西南北上下無位中無定方四數必明與世相涉三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百界四世三彼此相涉以三乘四以四乘三俱成十二是一疊即此十二一各變十成一百二十是二疊即此一百二十十各變百成一千二百是三疊眾生在世界之中見聞知覺剎那剎那生滅不停麤細之相如許六根能了別處為功德但論凡夫所具耳若六解一亡數當無量阿難汝復於中克定優劣如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼唯八百功德如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德如鼻齅聞通出入息有出有入而闕中交騐於鼻根三分闕一當知鼻唯八百功德如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身唯八百功德如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際當知意根圓滿一千二百功德阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓根日劫相倍我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨上說妄明根結之始此辨優劣使知所選三分之二謂三分中止得二分也動若邇遙靜無邊際者隨彼之動似有遠近在我之靜周聽無邊也闕於中交者如調適之息出盡少停後乃方入舌取能言不論嘗味離一合雙者離中不知是闕一分合時能覺有違有順是具二分意識獨生徧緣諸法故云默容流根即妙湛不動者也決之而出流逸奔境名生死流逆之而入返流全一名不生滅領納塵境為受發作功德為用合謂合中知離謂離中知離則境遠為深合則境近為淺通滿一意用具為圓通用闕為不圓滿選根取離深圓舍合淺闕但云悟圓通語略也日劫相倍功遲速懸也阿難白佛言世尊云何逆流深入一門能令六根一時清淨佛告阿難汝今已得須陀洹果已滅三界眾生世間見所斷惑然猶未知根中積生無如虗習彼習要因修所斷得何況此中生住異滅分劑頭數欲逆生死欲流至不生滅不知何者是生死欲流是我所當逆者六根功德既有優劣則根根不同云何一門深入而六門皆得清淨佛先答所當逆之流相須陀洹此云預流從凡入聖證初果而預入聖流故見所斷惑亦名見流謂意根對法塵起分別見因此見惑流轉三界不能出離故斷此見惑即證初果入見道位根中積生無始虗習即思惑此習要因修所斷者二果三果名修道位三界有九地一地具九品思惑九九八十一品皆修道果人所斷斷盡此惑證四果名阿羅漢稱無學位此中指根中生住異滅即菩薩所斷惑為界外見思也言汝雖已斷見流得證初果尚有界內思惑猶未能盡況界外見思乎此皆汝所當逆者今汝且觀現前六根為一為六阿難若言一者耳何不見目何不聞頭奚不履足奚不語若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六由無始來顛倒淪替故於圓湛一六義生汝須陀洹雖得六銷猶未亡一如太虗空參合羣器由器形異名之異空除器觀空說空為一彼太虗空云何為汝成同不同何況更名是一非一則汝了知六根受用亦復如是雖得六銷猶未亡一只消用本色語經云元依一精明分成六和合茲已銷六和合却守一精明也除器觀空寧欲除空耶蓋不病其空病其執有一空耳執有一精明亦猶是也併一俱亡方證心體虗空無異由器有方圓則器中之空亦有方圓之異因除器而後說一虗空豈有一耶同即一也不同即異也知虗空之同異是非了無所立則一六併亡而圓湛不分矣阿難未明一入六淨之說佛謂積生虗習尚未修斷宜其未知難以一六令知根性本無一六所以一解而六即消也由明暗等二種相形於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲由通塞等二種相發於妙圓中黏湛發齅齅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香由恬變等二種相參於妙圓中黏湛發甞甞精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味由離合等二種相摩於妙圓中黏湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸由生滅等二種相續於妙圓中黏湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法此明根結由塵也湛圓妙心本無黏著猶如明鏡一切影像皆現其中由一念妄動即為明暗二塵黏著而湛性被黏引發見性然未成根結也既而見精復與明暗二塵互相照映混合一處遂攬結二塵為勝義根此根即是最初清淨四大所成然微細難顯唯天眼方始得見故以蒲萄朵顯其體流逸奔色者謂此見精托彼二塵流逸於外也由動下釋耳結也擊者鼓動義清濁不遺曰卷由通下釋鼻結也發謂引發薰蕕皆受曰納界恬下釋舌結也五味相入曰參細嚼其味曰絞由離下釋身結也冷煖相交曰摩摶攬取也由生下釋意結也意以思量為性意之浮根即肉團心中一竅最初吸取父母精血時意即附著於此以奔法然在身中人不可見故用思字以明有思量處即其所在也處明不能見暗處暗則能見明意根處杳冥之地為前五根運籌布䇿故以幽室見狀其知體此即前文由此世界生纏縛故於器世間不能超越所謂結即同結也上文既曰非一非六然則何由而有六根之異故此出其根由見得妙圓性中本非有六但由黏妄發光遂至流逸阿難如是六根由彼覺明有明明覺失彼精了黏妄發光是以汝今離暗離明無有見體離動離靜元無聽質無通無塞齅性不生非變非恬甞無所出不離不合覺觸本無無滅無生了知安寄言此六根皆由性覺湛明之體一動而轉為能明之明覺遂失覺明精了之體由是黏明暗而發見結動靜而成聽等光即指六根精光此即攪塵以成結也離明暗則無見性離動靜則無聽精等此即離塵則無結也然見性聽精等是六根中識性當不得結字結依於識性離塵則識性亡而無黏妄之光而結亡此即三卷見道分中畢竟無體但彼論本體到究竟處此論工夫到究竟處汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫黏內伏伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫不由前塵所起知見明不循根寄根明發由是六根互相為用此下教以離塵則一解六亡本無一六也不循猶不隨也不字是制奔色奔聲之羈靮與前逆字反字旋字同義但字妙甚所謂歇即菩提也言汝欲令六根不隨六塵流轉當選一圓根為下手處併力於此而先拔之若使一根外脫內伏根塵不相偶合則熟處漸生生處漸熟自然還伏元明本覺之體所謂元明覺為因地心也從此更不黏妄發光外不由塵內不循根常光現前即有鑑照不過權托彼根示有照明之相而已雖不易耳目之用而視聽實不用耳目則一根能作諸根用此即入一無妄彼六知根一時清淨也阿難汝豈不知今此會中阿那律陀無目而見䟦難陀龍無耳而聽殑伽神女非鼻聞香驕梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念那律等六人或是凡夫業報或是小聖修得斯皆妄力尚不依根何況圓脫豈無互用阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯消氷應念化成無上知覺阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙真智如湯妄境如氷了妄即真化成知覺前云於器世間不能超越此可謂超越矣阿那律無目能見等示真覺不由於根此示真覺不假於緣知覺是同者暗中知覺與明中所見不殊也凡夫尚不假明緣而能有辨況聖人真覺何藉發緣乎以上解根及下手工夫已盡但未的指何根是門通二義論之前義略示因果全功令懸知究竟極果此義詳示初心方便令切曉下手工夫阿難白佛言世尊如佛說言因地覺心欲求常住要與果位名目相應世尊如果位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果世尊若離明暗見畢竟空如無前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先說湛精圓常違越誠言終成戲論云何如來真實語者唯垂大慈開我蒙恡阿難領第一義內因地果位相應之說復發此難佛有擊鐘夢擣之事驗聞非斷始圓第一義諸佛所得曰菩提寂靜常樂曰涅槃不妄不變曰真如離過絕非曰佛性分別一切而無染著曰菴摩羅識一法不立煩惱蕩盡曰空如來藏洞照萬法而無別曰大圓鏡智七皆果位一成永成無復變者見聽根舉二以該六明暗動靜通塞塵舉六以該十二總謂根離塵無體也念心即六處識心佛前破識心離塵無體今六根亦離塵無體則與緣心無異故曰猶如念心云云若離明暗二句單就見體言者因初卷以見精破緣心故也無我心者無心體也無我心所者無心處也既離塵無見便同攀緣妄心無體無處便同如來先所難言其誰修證無生忍法乃如來先時稱此見精為湛精圓常寧非戲論耶上段疑因果不相應若離明暗下疑佛語前後不相應阿難意謂結可亡六根不可棄如佛所說見聽等離塵無體則六根與攀緣心俱是生滅之物俱當決定棄捐矣世尊又教我於六根中循圓通根深入一門是以生滅之因求不生滅之果得無因果名目不相應耶不知六根黏妄之光有生有滅六根中見聞覺知之性原未嘗生滅也認六根為元明覺固不可謂六根外別有元明覺亦不可世尊擊鐘一段機緣正就六根門頭未有黏妄之光唯一妙覺明心炯炯常存者顯示無生滅之性無生滅性在六根中如金在鑛中見道分恐阿難認鑛為金故就見精中指出二種妄見修道分恐阿難離鑛不見金故就六根中顯出一段聞性所謂旋妄伏元只是銷鑛成金而已佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑即時如來勅羅睺羅擊鐘一聲問阿難言汝今聞不阿難大眾俱言我聞鐘歇無聲佛又問言汝今聞不阿難大眾俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大眾又言俱聞佛問阿難汝云何聞云何不聞阿難大眾俱白佛言鐘聲若擊則我得聞擊久聲銷音響雙絕則名無聞如來又勅羅睺擊鐘問阿難言爾今聲不阿難大眾俱言有聲少選聲銷佛又問言爾今聲不阿難大眾答言無聲有項羅睺更來撞鐘佛又問言爾今聲不阿難大眾俱言有聲佛問阿難汝云何聲云何無聲阿難大眾俱白佛言鐘聲若擊則名有聲擊久聲銷音響雙絕則名無聲佛告阿難及諸大眾汝今云何自語矯亂大眾阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲唯聞與聲報答無定如是云何不名矯亂阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯木鐘聲更擊汝云何知知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無汝尚顛倒惑聲為聞何恠昏迷以常為斷終不應言離諸動靜閉塞開通說聞無性如重睡人眠熟床枕其家有人於彼睡時擣練舂米其人夢中聞舂擣聲別作他物或為擊皷或為撞鐘即於夢時自恠其鐘為木石響於時忽寤遄知杵音自告家人我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏縱汝形銷命光遷謝此性云何為汝銷滅阿難以常為斷如來即目前之事騐根性真常以釋之知有知無一段重知字言既知有知無可見有無是聲塵豈關聞性若聞性實無則知無者又是誰擊鐘有聲騐於動無聲騐於靜又引睡中雙離動靜騐之舂擣誤作鼓鐘但取聞性不昧縱汝形銷四句謂非唯夢中不昧即死後亦不昧也問動靜生死聞性不昏不滅如來何言離動靜原無聽質乎答離塵無質者謂聚聞於耳結滯之質也此質若亡則周徧法界之聞性全彰矣豈番成斷滅乎前言離塵無質後言離塵有體語自不違以諸眾生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺不悟真常而不循之流逸奔塵則雜染流轉苦果無盡矣棄生滅而守真常即旋根返照也常光現前即伏歸元真發本明耀也根塵識心應時銷落正六解之相根塵識心能染汙障翳般若故名塵垢今既遠離則於法明見必成正覺矣
