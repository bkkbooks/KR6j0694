body:
  text: 爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地此耳根法門廣陳功德表殊勝圓通也觀世音者觀世音聲圓悟圓應之號於音言觀者以觀智照之也見六根互用之義所師之佛亦名觀世音者因果相符古今一道也聞字指擊鐘所驗不生不滅之聞性思者非思善思惡之思是用百不思之正思專注聞性究此根從何所來令彼顛倒聞機脫粘內伏為拔根之利器除結之先鋒下入流至現前皆仗此思而得深入修者非造作功行之修但達諸法如幻了無根本不生取著則諸微細塵垢自然銷落覺性現前是名正修入者已到之謂三摩地者即前大陀羅尼門謂拔此一根便得入大羅尼門矣問初卷已斥思惟是妄何故此中復用此思答前所以斥者以阿難認此思惟為真不肯放捨是認賊為子故須斥破欲其識賊而求真子也今復用此思者是知其為賊而借賊以殺賊轉禍為功也且二十四聖所修門雖不同要其用心觀察皆用此思若無此思無下手處故即二十四聖下手功夫皆在觀音一門顯發初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅生滅既滅寂滅現前此敘入觀始終也初於聞中者即指聞性中也謂我初以聞性為所觀之境終以聞性為所入之門流字即欲流之流入字即逆字順則因明立所入則自然亡所亡所功夫只是如幻而已昧如幻而流逸奔塵便是立所識如幻而息機歸寂便是亡所所入即流也寂即亡所也以能入之根逆流故所入之塵得寂不唯動相不生即靜相亦不生此將聞性與塵分開不令織妄相成所謂即明而妙也如是漸增聞所聞盡此根如幻也漸增即如幻三昧更加精明耳聞即聞機所聞即動靜二相由前根塵交結故將顛倒聞機反聞自性不與塵交今外塵雖脫聞機雖伏未得盡淨故次盡內根所謂此根初解先得人空也盡聞不住覺所覺空此覺如幻也盡聞境界可謂本覺湛然矣但住此覺相猶是法執今不住此智則覺與所覺俱空矣所謂空性圓明成法解脫也空覺極圓空所空滅此空如幻也空覺即覺所覺空也此境已斷見行法執然未至極圓之地猶有空相在從此修到極圓滿處併能空與所空者一切滅盡矣所謂解脫法已俱空不生也生滅既滅寂滅現前無功夫言初入流亡所塵空矣尚有根在根即是所根空矣有空根之智在智即是所智空矣有空智之空在空即是所皆不離生滅業識至於空所空滅則生滅盡滅矣諸妄銷亡不真何待大寂滅海自然現前寂非對動之寂滅非對生之滅乃不動之寂無生之滅即如來藏性真如實際清淨本然周遍法界名大寂滅海此理現則前山河大地應念化成無上知覺下面一切勝用皆從此發矣忽然超越世出世間十方圓明獲二殊勝一者上合十方諸佛本妙覺心與佛如來同一慈力二者下合十方一切六道衆生同一悲仰不為界內有縛是超越世間不為界外空縛是超越出世間十方圓明乃寂照含空之意十方不止大千亦可作十法界二乘所不能故曰殊勝心佛衆生三無差別故證自心時即與佛生合也慈能下化故曰慈力六道衆生下應有本妙覺心四字不重標耳悲仰皆屬衆生悲者悲己沉淪仰者仰佛救度衆生悲菩薩與之同悲衆生仰菩薩與之同仰三十二應申同慈力十四無畏申同悲仰世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土萬法虗妄唯是一心聲塵本空聞性常住於常住中一切聲塵及於萬法悉皆如幻以此如幻法門始於聞中熏習終於聞中修證隨緣應用本體如如不動不搖不失不壞此三昧者名如幻聞稟聞修金剛三昧乃三十二應之本也世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為説法令其解脫若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為説法令其解脫若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為説法令其解脫若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為説法令其解脫應出世四聖凡菩薩希成佛身勝解者因行已極所起證悟之智也問等覺菩薩假初住現佛説法何也答聞法得解似不求人復假勝身彌增內慧況觀音上合諸佛其證非淺豈初住能局哉出無佛世觀物變易自覺無生號獨覺樂獨善寂求自然慧故曰寂靜妙明多生受佛小教熏習當歷七生方證無學現同類身先稱本習後令近佛下同稟佛之教觀緣悟道曰緣覺知迷勝性由十二緣一切斷之勝性現矣故曰緣斷勝性勝性則因緣無生之性也亦化城涅槃耳斷四諦惑證生空理名得四諦空斷俱生惑證滅諦理名修道入滅若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為説法令其解脫若諸衆生欲為天主統領諸天我於彼前現帝釋身而為説法令其成就若諸衆生欲身自在遊行十方我於彼前現自在天身而為説法令其成就若諸衆生欲身自在飛行虗空我於彼前現大自在天身而為説法令其成就若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為説法令其成就若諸衆生愛統世界保護衆生我於彼前現四天王身而為説法令其成就若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為説法令其成就應天道欲心欲身二欲字是樂字解謂樂心明悟身清淨以有欲塵則障塞悟門心不明了身亦穢濁故樂不犯欲塵梵天色界天主説法如説出欲論是也解脫離欲生梵也帝釋欲界天主橫有三十二天帝釋主之説法如説十善法也欲天全屬散善菩薩隨順而成就生天之樂下同自在天即欲頂修欲界定者大自在天即色頂修無漏定者遊行十方者六欲四洲之十方也飛行虗空能至他界如法華言能過五百萬億國推尋供佛也天大將軍者帝釋上將統領鬼神救護者摧魔護生也四天王者為帝釋分統四洲世界須彌四面一切國土也四天太子即那吒之類能驅鬼神若諸衆生樂為人主我於彼前現人王身而為説法令其成就若有衆生愛主族姓世間推讓我於彼前現長者身而為説法令其成就若諸衆生愛談名言清淨自居我於彼前現居士身而為説法令其成就若諸衆生愛治國土剖斷邑我於彼前現宰官身而為説法令其成就若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為説法令其成就若有男子好學出家持諸戒律我於彼前現比丘身而為説法令其成就若有女人好學出家持諸禁戒我於彼前現比丘尼身而為説法令其成就若有男子樂持五戒我於彼前現優婆塞身而為説法令其成就若有女子五戒自居我於彼前現優婆夷身而為説法令其成就若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為説法令其成就若有衆生不壞男根我於彼前現童男身而為説法令其成就若有處女愛樂處身不求侵暴我於彼前現童女身而為説法令其成就應人道自金輪至粟散皆人王粟散者國人主散於天下如粟之多具十德為長者姓貴位高大富威猛智深年耆行淨禮備上嘆下歸引淪不仕名居士或談道論德為人師範或著書立言垂教後世愛治國土如立綱常正風化剖斷邑如片言折獄一語解紛三台輔相州牧縣長皆號宰官婆羅門此云淨行四姓之一數術和合占相推步之類攝衛者調護身壽即名醫輩也諸位皆由五戒五常所致心有廣狹報分君臣仁覆一家為一家長仁覆一國為一國長樂為人主乃有德懷仁不忍世亂發願世世為有道主以理國菩薩現身與説生貴之因及帝王德業如修十善為輪王因是也若平人妄志帝王豈亦成就之乎餘倣此比丘戒二百五十尼倍之比丘所持常律而已尼禁加切也優婆塞優婆夷在家五戒近事佛法者天子公卿等掌外政王后妃嬪等掌內政所以修治國家女主即后妃也國夫人君之妻命婦因夫榮受錫命者大家內貴所師若漢惠姬之類各有仁孝溫良之德而致若有諸天樂出天倫我現天身而為説法令其成就若有諸龍樂出龍倫我現龍身而為説法令其成就若有藥叉樂度本倫我於彼前現藥叉身而為説法令其成就若乾闥婆樂脫其倫我於彼前現乾闥婆身而為説法令其成就若阿修羅樂脫其倫我於彼前現阿修羅身而為説法令其成就若緊那羅樂脫其倫我於彼前現緊那羅身而為説法令其成就若摩呼羅伽樂脫其倫我於彼前現摩呼羅伽身而為説法令其成就若諸衆生樂人修人我現人身而為説法令其成就若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為説法令其成就應八部雜類天即欲界初天天報唯樂何以求出以耽欲沉迷報謝復苦也前天欲求得此天欲求度現龍身者如龍樹化五百龍衆俱受具戒之類藥叉此云輕捷有三種一在地一在虗空一在天乾闥婆此云尋香陰帝釋樂神阿修羅此云非天無天行故緊那羅形似人而頭有角名為疑神帝釋絲竹樂神摩呼羅伽大蟒神如迦毗尊者為蟒受三歸聽訖現老人身素服而去藥叉等七趣皆具神通福德威權各有苦惱均名惡趣故欲脫去之也經云諸天嘗自思我等當得人身生釋迦如來法中受比丘戒上言脫去未委樂生何所今曰樂人蓋樂生人道而欲修之也諸非人者有形如休咎精明等無形如空散銷沉等有想如鬼神精靈等無想如精神化為土本金石等六凡不舉地獄者方沉幽昏未能聞法別以施無畏力拔之凡説法一説超勝善法令修之即超出彼類二説本行業令斷之不入彼類天斷求有之心龍斷嗔藥義斷殺乾闥婆斷戲修羅斷諍緊那羅斷諂摩呼羅斷癡雜行斷邪見是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就心如海諸身如海之印紋緣至而現來無所從緣盡而沒去無所止無礙無滯稱妙淨之應依無作為起大神用名無作妙力世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德十四無畏本前聞熏等三昧故曰復獨言方世六凡不兼四聖者上善不與惡難也無畏者遭難怖畏蒙救得脫也一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫觀菩薩音聲者衆苦逼急急稱菩薩名號即此一聲稱性而發全體現前則苦不期脫而自脫八難此為總下七為別自猶獨也凡人聽音只觀其音今不獨觀音復觀其能觀音者如是旋倒聞機反觀自性則了無諸妄唯是一真覓樂尚不可得有何苦惱所謂照見五蘊皆空度一切苦厄也以此神力加被衆生故衆生聞菩薩聖號之音而一心觀之專注不舍皆於苦惱而得解脫觀者持念之謂而有二義但以事觀專持名號解脫世間苦惱而獲安穩兼以理觀反聞自性解脫三界苦惱而得涅槃此與法華不同彼屬菩薩觀此屬衆生觀也衆生脫苦有因有緣衆生自肯為因菩薩大悲為緣因緣合處即能脫苦菩薩同一大悲充周法界恆與衆生作增上緣衆生但能一念相應直下離苦今有稱名不蒙解脫者未得一念相應耳二者知見旋復令諸衆生設入大火火不能燒三者觀聽旋復令諸衆生大水所漂水不能溺四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害五者熏聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥義羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫內外四大常相交感見覺屬火聞聽屬水見業交則見猛火聞業交則見波濤今知見旋倒則無見業觀聽旋復則無聞業故水火不能燒溺也於聽言觀猶音言觀也本由四大分湛今既旋復一元則了無塵相故水火不能害問旋見旋聽者菩薩何與衆生而能令脫水火之難答自利餘力加以悲願威神不可思議然須稱名念切改過遷善菩薩方尋聲而拔濟之下同妄想生滅能殺法身能害慧命既能斷滅真性無傷故令衆生鬼不能害殺害為其有身熏妄聞以成真聞形銷同聲無塵可對了無可觸矣故如割水而水不痕吹光而光不動反聞功極發明本耀明能破暗鬼神幽氣亦何能侵羅剎可畏鬼鳩槃茶厭魅鬼毗舍遮噉精氣鬼富單那熱病鬼塵纍相縈如禁繫六根質礙如枷鎖根塵兩銷則內無所纍外無所縛音滅脫聲塵也圓聞證根性也內外融通同為一體故遍一切處生慈力無復惡心相向以上八難無畏九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗貪欲以塵之順忿恨以塵之違愚癡以塵之蔽離塵無對違順兩忘銷塵旋明身心朗徹則三毒永祛矣阿顛迦此云無善心癡最重者十業悉壞法身淫瞋癡為甚舉三以該餘八難畏其現是苦果三毒畏其必成苦因故並求出離十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令法界無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女此令衆生得二求無畏也融形則礙滅復聞則性真故涉入世間而無動無壞能遍十方供微塵佛稟承其法各為法子供佛足福承法足慧具男子德故能以福慧之男應其求也圓故明照通故含界明照則大圓智之質含界則空如來藏之體故能承順法門受領無失承順即坤儀柔德受領即閨門能事故能以柔順之女應其求也十四者此三千大千世界百億日月現住世間諸法王子有六十二恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通是名十四施無畏力福備衆生此令衆生稱名無畏也此方衆生耳根利所以觀音化勝諸聖行位雖齊對機異耳總彼恆沙但敵觀音一人持名二福正等已密揀圓通矣世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德現衆多容誦一一呪攝化衆生圓應所求理出於無為神應於不測名不思議無作妙德前亦現形應求此獨名不思議者前則略顯此復深明一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆生妙容能説無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在此明一身多身不思議也初獲即初於聞中所得妙妙聞心者初亡根塵心固已妙繼而境智雙亡能所俱寂故云妙妙由是心精遺聞六根不隔一覺圓融應現無滯首總六用臂表提接目表照了各依本數至八萬四千表依根智用泛應塵勞也爍迦羅云堅固母陀羅云印清淨寶目即金剛正眼慈護善根威救惡性定護散亂慧救迷淪一體之中萬法咸備繼二十四聖示現者明彼各現一端圓會於此也問八萬四千特表法耳一身何所施答此以有思惟心測度圓通境界也身含十虗毛端現剎空剎不啻首臂猶人八萬四千毛孔耳二者由我聞思脫出六塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者此明各身各形不思議也衆生機器不同故對機現形亦不同衆生習氣不同故對機説呪亦不同三者由我修習本妙圓通清淨本根所遊世界皆令衆生捨身珍寶求我哀愍此明過化不思議也由我得清淨本根於六塵境毫無貪著悉能捨施故所遊世界亦無慳吝能捨所珍求我哀受而為施作佛事四者我得佛心證於究竟能以珍寶種種供養十方如來傍及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃此明供養不思議也我得佛心者初獲如來藏心也證於究竟者畢獲如來藏心也始終得此如來藏心無量佛法寶藏悉現在前矣故能運出家珍廣作佛事既以種種法寶供佛復以種種財法無畏等施衆生以菩薩觀法界衆生全是佛體故妻子長壽是世間樂三昧涅槃是出世樂佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩提成就菩提斯為第一世尊彼佛如來嘆我善得圓通法門於大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界此結圓通也從耳根一門深入彼六知根應拔圓脫故上同諸佛下合衆生隨緣設施無不自在也入法性流而得三摩提結因心也成就菩提結果覺也世尊下兼明得記得名皆由此門也爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯紛糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合我一界梵唄詠歌自然敷奏諸聖各述圓通華屋諸門悉啓佛復以瑞應之是諸聖以言顯如來以相顯啓衆生開悟也五體同放寶光以顯渾身是大光明藏也諸佛交會灌頂以顯十方如來同證頂法也併灌菩薩阿羅漢印其修證無優劣也林木演音交光相羅以顯根塵既銷無情有情皆成佛道非若織妄相成世界相涉也大衆普獲金剛三昧以顯首楞嚴王即是金剛寶覺平等法界也十方國土合成一界以顯寶明空覺自然發現有為習漏當不復生衆塵廓然無復隔越也梵唄詠歌自然敷奏以顯法界皆離衆苦常得妙樂也真實圓通其妙如此於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各説最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就此敕文殊選擇圓通也無差別是説所修之門亦各平等諸聖散在十方根隨方利各有多生熟習順其種性各有多分煩惱對治所宜皆妙修門實無差別也當根對此方之機耳對機則易成就矣文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神説偈對佛覺海性澄圓圓澄覺元妙元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃衆生空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫此明從真起妄故有返妄歸真由返妄歸真路有遲速故須選根也妙覺性海本來澄清圓滿而圓澄覺性本來自妙不假作為亦無方所良由元明性體忽起照用遂落方所所既妄立而照用之本性遂亡此即依本覺而成業識也既迷性覺而成業識遂迷性空而成頑空由是空晦暗中結暗為色復立無情有情二種世界以取一分浮虗亂想凝結而無知者成器界一分浮虗妄想凝結而有知者成根身此即依無明業識生起相見二分也殊不知虗空生乎大覺性中不異一漚之發大海空尚如此況有漏微塵國土悉依虗空建立者渺小可知矣若了漚滅則空亦本無況從虗空所生三有而獨存耶若得歸元覺性固無有二但欲入此無二覺性則方便有多門聖人全證此性則法法圓融事事無礙或憎或愛或苦或樂皆是入理之門不須揀擇初發心人欲入三昧而得圓根則定有遲速故必用選根也遲速者謂聞法有一念便得無心者有至十地乃得無心者覺海二句即性覺妙明本覺明妙也元明二句即因明立所所既妄立生汝妄能也迷妄八句即引起塵勞起為世界靜成虗空也漚滅二句即三緣斷故三因不生狂性自歇歇即菩提也色想結成塵精了不能徹如何不明徹於是獲圓通音聲雜語言但伊名句味一非含一切云何獲圓通香以合中知離則元無有不恆其所覺云何獲圓通味性非本然要以味時有其覺不恆有云何獲圓通觸以所觸明無所不明觸合離性非定云何獲圓通法稱為內塵憑塵必有所能所非遍涉云何獲圓通此揀六塵塵乃無情之物於心最疏又具障蔽染汙二義疏則難轉蔽則難圓染則難通故並揀去揀非揀聖乃揀法也亦非揀法乃揀機也云何獲圓通就阿難及此方大衆之機言耳若諸聖各依彼法畢獲圓通佛謂其無優劣矣沙陀因觀不淨析色明空妙色密圓今揀色塵由妄想結成塵質留礙初心之人縱見精了了不能通徹如何不明徹法而取圓通陳那悟四諦空聲妙音密圓今揀音聲不離諸雜語言即是名句味耳一非含一切者理圓言偏一言非能遍該一切理也問此與觀音耳根何異答聲是佛語根乃自心認塵則著他語言觀根則了己心性香嚴因香入鼻觀香無生塵氣倐滅妙香密圓今揀香之一法合有離無覺既不恆未為圓觀藥王藥上因嘗衆味了味無生由味覺明登菩薩位今揀味性本無待根方覺無根無味故非圓通跋陀忽悟水因得無所有妙觸宣明成佛子住今揀此觸因所觸身而得顯無所則不顯矣性非常定故不圓通迦葉觀塵變壞修於滅盡妙法開明銷滅諸漏今揀雖稱妙法乃是內塵憑伏此修豈非能所故非圓通法塵非外五塵之實質乃五塵影子意中獨緣故曰內塵必有所者緣一境必捨一境能所皆局不能遍涉見性雖洞然明前不明後四維虧一半云何獲圓通鼻息出入通現前無交氣支離匪涉入云何獲圓通舌非入無端因味生覺了味亡了無有云何獲圓通身與所觸同各非圓覺觀涯量不冥會云何獲圓通知根雜亂思湛了終無見想念不可脫云何獲圓通此揀五根根能旋反轉之即性勝彼塵識然圓缺不齊故並揀去律陀因修樂見照明三昧旋見循元由斯得證今揀見性雖能照了而前方全明後方全暗明前之二維不明後之二維故曰虧一半槃陀調出入息反息循空因是得道今揀鼻息雖通出入而不相交支分既離豈成圓觀鉢提觀味之知非體非物還味旋知我無學果今揀之何故舌有説法嘗味二種之用論説法則無礙辨才所謂入無端也猶與圓通相近若非能入無端祗論嘗味境合方覺境滅知亡何謂圓通畢陵觀覺覺痛覺清淨心無痛痛覺純覺遺身獲無學果今揀身與觸塵皆合而知離則不知非圓覺觀所觸指觸塵各非圓覺以涯量不冥會也涯量猶云邊際會知也各有邊際不能冥中有知如耳之於聲也須菩提曠劫空寂空性圓明入寶明海同佛知見今揀意知雜亂難於制伏於湛了性終不能見圓通乃無分別之勝果亂想不脫豈能得此果哉識見雜三和詰本稱非相自體先無定云何獲圓通心聞洞十方生於大因力初心不能入云何獲圓通鼻想本權機祗令攝心住住成心所住云何獲圓通説法弄音文開悟先成者名句非無漏云何獲圓通持犯但束身非身無所束元非遍一切云何獲圓通神通本宿因何關法分別念緣非離物云何獲圓通此揀六識經首破六處識心是生死根本不可依之錯亂修習諸聖自陳仍備此六門者聖性無不通也若初心用此成聲聞魔外者極多故須揀舍利弗曠劫清淨見覺明圓光極知見今揀眼識雜在三合之內窮其本性無相可得自體不常如何圓遍識見即眼識也眼色和合識生其中故云雜三和和合則有不合則無故曰無定普賢用心聞能知沙界外事得大自在今揀此由修法界行大因所生非耳識自妙初心即能成此果也孫陀羅心常散動觀鼻端白息久發明明圓滅漏今揀本為對治散亂權假攝住其心真心無住若心果有住則成心所住之處偏局一處不圓通矣富樓那助佛轉輪説法無上降伏魔怨銷滅諸漏今揀説法不離音聲文字而能開悟須由曠劫辨才之力先世成熟方得如此非一時舌識所能所説名句非無漏法豈成圓通優波離持戒清淨身心寂滅成阿羅漢今揀持戒之法不過檢束此身覺海元明本非身量將何所束耶既有所束便非周遍目連修定旋湛意識心光發宣得大神用今揀神通乃宿因所得意識乃法塵上分別性也此念緣物則有離物則無故非圓通若以地性觀堅礙非通達有為非聖性云何獲圓通若以水性觀想念非真實如如非覺觀云何獲圓通若以火性觀厭有非真離非初心方便云何獲圓通若以風性觀動寂非無對對非無上覺云何獲圓通若以空性觀昏鈍先非覺無覺異菩提云何獲圓通若以識性觀觀識非常住存心乃虗妄云何獲圓通諸行是無常念性元生滅因果今殊感云何獲圓通此揀七大前五同塵第六同識第七同根但加廣大之相持地平心地見塵無性不相觸摩悟無生忍今揀地性堅礙平填尚屬有為不成聖心故非圓通遇佛平心已歸空性此揀就初心説耳月光作水觀身水香水性合真空得無生忍今揀此觀未離想念難契如如蓋如如離念不動之法離覺觀法火頭觀多淫心成智慧火生大寶𦦨今揀聞説欲火而生厭離是厭有也身心俱斷斷性亦無方為真離厭離非真離也初心不皆多欲非一定方便琉璃光觀心身世界皆妄緣風力所轉於動見不動即證實相今揀動與寂對對即非真豈同圓觀入流亡所問反聞法門亦從動靜而入答彼漸脫動靜二塵取無動靜之聞性為入門此取有動寂之風性為入門所以不同虗空藏觀四大無依妄想生滅虗空無二佛國本同得無生忍今揀虗空本以冥頑為相與菩提覺性相反就昏鈍而取明靈之果固難應矣彌勒修唯識觀識性圓明入圓成實得無生忍今揀識性念念生滅理非常住若但亡境不亡其心還成虗妄豈是圓通大勢至念佛三昧都攝六根淨念相繼入無生忍今揀諸行遷流皆墮無常念性生滅正無常也如何以無常因獲常住果二十四法或偏而不圓或礙而非通或滯而不明或頑而非覺或生滅而非常或虗妄而非真或深不該淺不宜初心或淺不通深難臻奧域正顯耳根聞性諸過皆離衆德咸備我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住此下獨選耳根為圓通也如來設教隨方不同此方耳根偏利皆由聞性遍達無量故佛對此方機宜以音聲作佛事逗彼聞根之利是則合音與聞乃為此方清淨教體然聲教但為弄引聞性實為妙心故領悟雖雙托音聞而修定宜單取聞性離苦下讚自利利他之德也離苦者離生死苦得解脫者得人法二種解脫言從聞性而得離繫自在者唯觀音為能也舉沙劫則時為極長舉塵剎則處為極廣得大自在方者嘆三十二應隨緣説法也無畏施衆生者嘆十四無畏尋聲救苦也三十二應隨類説法曰妙音三途八難齊觀並救曰觀世音本根清淨而無染著曰梵音遍赴其求而不失時曰海潮音具此四音故救世間在苦難者悉得安寧復令出世者得常住之果也我今啓如來如觀音所説譬如人靜居十方俱擊鼓十處一時聞此則圓真實目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既非滅聲有亦非生生滅二圓離是則常真實縱令在夢想不為不思無覺觀出思惟身心不能及此顯耳根功德之勝也俱擊俱聞顯其圓也逈異五根顯其通也寤寐恆一顯其常也以聞性遍一切處十方聲塵應時而有無有前後同時周遍靜居非多事擾心之時若當擾時則聞雖常圓殊不覺知欲其於靜中驗取耳根之利目非觀障外者如隔紙膜不見外邊隔皮膚不見五臟也如器中之食爐中之香若以物蓋則口鼻不能取故云口鼻亦復然意根雖通而散亂不常若耳根者即隔垣聽之亦遐邇俱聞然則耳根之用不問障與不障合與不合念與不念而聞性常通異於五根音聲有動靜在聞性中或有或無顛倒者以寂然無聲惑為無聞然非聞性實無以此聞性不隨聲生聲滅即在夢想中猶聞舂搗聲其為覺觀出於思議之外勝餘根矣三種真實是凡夫現具不待證而後有若就此更修是順風行船何難之有今此娑婆國聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄阿難汝諦聽我承佛威力宣説金剛王如幻不思議佛母真三昧汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞此明耳根最便初心也言此方之機耳根明利必須語言方得明了故對此方偏利之根廣宣一切經論而經論所詮無非發明圓湛妙性當借聲論而反聞自性若因指而見月衆生不達如來本意反迷自己本有聞性循聲逐響不顧本聞何異執指為月哉不獨世俗之聲循之必至流轉縱能強記十方如來十二部經尚不免落於邪思溺於淫舍豈非隨彼聲塵不能自反而被淪溺耶隨所即循聲淪溺即流轉若知循聲流轉則知旋流必獲無妄矣阿難下專囑當機必依此門而修也言我今日選根皆是承佛威力即前金剛王寶覺如幻三摩提可見如幻實三昧之本名以此三昧能出生諸佛故稱佛母從聞思修思此修此而已五卷解結以來俱是發明此義此卷專指耳根而以觀世音作一榜樣金剛王與初卷首楞嚴王相應俱是究竟堅固之意不出如幻三昧耳汝聞下出其循聲流轉之過言汝記持佛法已為極多然唯樂多聞不除欲漏故所蓄愈多而愛根愈深無益於道徒增過誤不免摩登之難將聞二句激其反聞也言汝將此聞機以記持佛之佛何不旋此聞機而自聞其聞性乎上聞能聞之智下聞所聞之理自聞聞只是反照本性非真注於耳根也聞非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空却來觀世間猶如夢中事摩登伽在夢誰能留汝形此正宗如幻工夫也聞無自體但因與聲相應而有卷葉之名是不但塵如幻而根亦如幻矣認為真則相織不解達幻無性則聞根歸元不與聲粘此時能所俱脫前文見非是見指本體到極真處故見之名不存此指工夫到極真處故聞之名亦不立若此一根既脫則六根應時圓脫矣有翳故有空華有根故有三界目翳除則華亡而淨眼現聞根復則塵銷而覺圓淨淨眼發現則眼前諸境不能礙淨覺發光則世間諸境不能礙覺圓淨應前覺海性澄圓光通達應前圓澄覺元妙寂照番前所立照性亡含虗空應前空生大覺中及漚滅空本無却來以下應前況復諸三有此常寂光通達世界即虗空雖大如大海一漚況依虗空所立器界根身耶果能到此境界却來反觀世間諸事真如在夢以在迷時未曾證此如幻境界認以為實覺而後知為夢也摩登伽以邪呪方攝人淫席亦是在夢安能以夢事而繫汝身由汝見聞未除幻翳故為空華所眩為彼流轉耳如世巧幻師幻作諸男女雖見諸根動要以一機抽息機歸寂然諸幻成無性六根亦如是元依一精明分成六和合一處成休復六用皆不成塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來此言一根解而六根拔也首六句舉喻以明六根幻成六根五句法合上喻六根合諸男女一精明合一機一處休復合息機歸寂六用不成合諸幻無性一精明即識精明元那陀微細識也六根為能依一精明為所依由一精明而攬塵成結各各不同遂分為六在眼名見在耳名聽等故曰元依一精明分成六和合和合即前黏字與脫字相反休即息機也復即歸寂然也塵垢即前想相為塵識情為垢是業識中微細無明也六解之後聞所聞盡已證人空若從此進頓空法執則塵垢應念皆銷而識精轉為圓融清淨寶覺若塵垢有餘而未盡尚居學位未得畢功明相精純到至極處即是如來所證圓成極果是則法門既妙成佛無難當選此一根為入門之路也大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓明未來修學人當依如是法我亦從中證非唯觀世音此復廣舉所證發其欣慕之心普勸進修也言反聞之功效驗之速如此汝等當旋汝顛倒聞機不循外而循內果能反汝聞如來祕密之聞而聞自己本有之聞性得此性為因地心可成無上覺道故圓通之門雖有多種若真實圓通可當此方之機治多聞之病者唯此一門以此一門是微塵佛到菩提家一條大路入涅槃海一重大門所以過去諸佛由此而入現在菩薩亦由此入有許多榜樣在前故未來學人當依此法門而入也不唯諸佛菩薩從此門入即我亦從此門而入豈特觀音為然哉阿難前問將誰立因求無上覺故確指聞性明其不誤也問念佛法門三根普被何故亦揀之耶答念佛雖被淺深之根亦須從耳根流入阿彌陀佛名號然後意根念念不忘是則念佛法門亦必因於耳根故即念佛亦揀之也誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事捨塵勞非是長修學淺深同説法此報復尊敕也誠如佛世尊詢我諸方便牒前所問二十四聖誰當其根也以救諸末劫牒前兼我滅度後此界衆生也求出世間人牒前入菩薩乘也成就涅槃心牒前成無上道也觀世音為最言唯觀音反聞一門為第一也自餘二十四聖所入之門皆是佛之威神加被偶觸一事而捨塵勞非是通長可修淺深同説之法極欲其專修也頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是此頂禮求加也謂此耳根一門即前所説三如來藏即前所説無漏業即前所説如幻不思議佛母真三昧也願佛以神力加被未來進修者皆從此門直入不令一念生疑將此法門為最初方便則易成就故堪以此法教阿難併度末劫沉淪也但用此一門不用餘門者依此一門進修可超二十四聖之圓通以真實心唯此一事更無他法也於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路普會大衆天龍八部有學二乘及諸一切新發心菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨性比丘尼聞説偈已成阿羅漢無量衆生皆發無等等阿耨多羅三藐三菩提心此敘悟也五卷云身心皎然是知身心結解次第尚未知何門得入今已確知從耳門入更無疑惑故身心了然也菩提涅槃皆指極果故喻之如家耳根喻如道路久為窮子逃逝他鄉即欲歸家路頭不識今日指出一條還家道路若使直往向前決不復遭枝岐矣前曰路曰門至此則曰家者謂了悟耳根是到菩提家之路入菩提家之門也最初方便至此方結普會下大衆獲益皆得本心者即初信所得因心也遠塵離垢者即所斷之惑也獲法眼淨者即徹證圓通以果地覺為因地心即十住初心也發菩提心者即初入信心也阿難整衣服於大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛大悲世尊我今已悟成佛法門是中修行得無疑惑常聞如來説如是言自未得度先度人者菩薩發心自覺已圓能覺他者如來應世我雖未度願度末劫一切衆生世尊此諸衆生去佛漸遠邪師説法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈此請安立道場為末世攝心之軌則也心迹圓明者先悟不生滅心是大佛頂首楞嚴王心圓明也又悟耳根是入不生滅之門路迹圓明也悲曠劫之沉迷欣今日之頓悟因久迷而忽悟故悲欣交集也欲益未來者自疾既除復愍他疾也是中修行得無疑惑者已悟成佛法門決定從耳根入而無疑也常聞下引佛言以自勵自未度而思度人者為菩薩自度已畢而專於度生者為如來諸佛菩薩皆以度生為事而我所急者願學菩薩也世尊下言我遇佛説法已知修行之路從聞中入但恐末世衆生去佛漸遠而邪師説法岐路復多令修進者心無適從欲攝其心入三摩提云何令彼安立入道之場地則邪説不得傾動於菩提心方得無退屈乎此後漸説向戒律上去矣世尊懸知末法之中邪師熾盛非撥律儀疑誤衆生故於此經始終以戒為本阿難示墮發端至是阿難已得開悟特為未來衆生代請安立道場世尊苦口叮嚀首揭戒為決定明誨曰我滅度後多諸魔民云云重重結以不如此説即波旬説如老人遺囑既沉痛又斬截使人淚墮使人心寒爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救獲衆生末劫沉溺汝今諦聽當為汝説阿難大衆唯然奉教佛告阿難汝常聞我毗奈耶中宣説修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學毗奈耶律藏也大小乘戒之通稱小乘稟法為戒但制其身大乘攝心為戒并淨其本能攝心則定由是生慧由是發三者圓明諸漏永盡故名三無漏學三決定者決定戒為最先決定定依戒生決定慧依定生也律中宣明是義故曰所謂下殺盜淫妄是戒中四決定明誨各不相混問何故下文但説四戒而不説定慧答前文忘前塵盡內根等皆是發揮定慧但未曾説戒故特明之耳阿難云何攝心我名為戒若諸世界六道衆生其心不淫則不隨其生死相續汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨是故阿難若不斷淫修禪定者如蒸砂石欲其成飯經百千劫祗名熱砂何以故此非飯本砂石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證必使淫機身心俱斷斷性亦無於佛菩提斯可希冀如我此説名為佛説不如此説即波旬説淫心不除定慧必不可得縱發定慧只是邪定邪慧修力深者為上修力淺者為中下暫生魔宮終當備歷三塗諸經戒首不殺此以斷淫為第一清淨明誨者真修必先離欲蓋欲氣粗濁染汙妙明欲習狂迷易失正受觀阿難起教示遭邪染而厥初發心先厭欲濁至於三漸次中一一首懲然後身心妙圓獲大安隱十信初心由欲愛乾枯圓慧性而階等妙諸世間人由心不流逸澄瑩生明漸乎六天槩可思矣機者淫心所自發斷性不無則欲之圓影猶在觸機即發矣阿難又諸世界六道衆生其心不殺則不隨其生死相續汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沈生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大呌求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食若諸比丘不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸衆生若身身分身心二塗不服不食我説是人真解脫者如我此説名為佛説不如此説即波旬説大力鬼如嶽瀆諸神鬼帥等為大力部從未免血食易墜難升行人入之謂之墮落自謂得無上道認己是而不知其非食肉得菩提路如言酒肉不礙菩提之類律開三淨不見為我殺不聞為我殺不疑為我殺加自死鳥殘合稱五淨乃小乘權宜若真慈真脫皆在所斷矣西域五天通稱婆羅門國神力所化本無命根末季現前無佛所化無由乃食衆生肉矣心開者禪定得力然食肉障深似而非實身分者指裘毳等亦彼身之一分服之即與成緣劫初之人體有飛光足若御雲後食地肥啖香稻即與地為緣其體堅重不離地矣阿難又復世界六道衆生其心不偷則不隨其生死相續汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魔所著彼等羣邪亦有徒衆各各自謂成無上道我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我説是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異汝教世人修三摩地後斷偷盜是名如來先佛世尊等三決定清淨明誨是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同於稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義説回為己解以誤初學佛印是人得真三昧如我所説名為佛説不如此説即波旬説心不偷者利欲念不起也厭塵方可出塵貪世豈能越世不但取人之財即假設形儀邀人恭敬利養皆偷也偷心回邪故墮邪類妖言恐人令人改心易志敬如神明傾財奉之販賣也裨助也裨助偷心販賣佛法也稱造業為佛法非法説法也非具戒為小乘法説非法也盜者取他依報資於己身今損己正報以供上聖故能翻破無始盜業又一切難捨無過己身難捨能捨則餘貪愛決能棄捨故曰是人於法已決定心苟能捨身而心不決捨則徒增業苦無益於道佛宿世詬比丘可食馬麥證果後毗蘭邑食之示宿債必酬也惡言尚酬況逋負有不酬者哉不畜施人視毀如讚利害二途身心俱捨也身與衆共捨之至也行能至此其心不偷可知阿含稱所蓄物可以資身進道薩婆多許百物各蓄一是方便説皆不了義觀此行令人慚愧墮淚可見末法祖師立為叢林亦因時慈悲曲就利生非得已也處此者每愧不能取證不萌一毫利養志僅免罪戾或遇人引斯經為難實言末法未能不可巧言無礙阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩提不得清淨成愛見魔失如來種所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養是一顛迦銷滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學唯除命終陰有遺付云何是人惑亂衆生成大妄語汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨是故阿難若不斷其大妄語者如刻人糞為栴檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就若諸比丘心如直弦一切真實入三摩地永無魔事我印是人成就菩薩無上知覺如我所説名為佛説不如此説即波旬説四果十地未得謂得名大妄語貪其供養求己尊勝名愛魔妄起邪見謂己齊聖名見魔皆大妄也顛迦即闡提此云信不具多羅此云岸形樹名也刀斷其本永不發生以妄語斷佛種如刀斷木也示現同形同事令易信受或作四句是順行事如是四句是逆行事稱讚二句通上順逆讚佛弘法令人得入正定雖現形同事終不自言聖迹泄漏密機於初學人前唯命終時略露消息泄則不住住則不泄四威儀行住坐臥也果招紆曲三途報也以妄語求正覺猶以自口噬自臍莫能及也
