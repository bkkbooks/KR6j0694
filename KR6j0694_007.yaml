靈也阿難我今為汝更說此呪救護世間得大無畏成就衆生出世間智若我滅後末世衆生有能自誦若教他誦當知如是持誦衆生火不能燒水不能溺大毒小毒所不能害如是乃至天龍鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑此總說誦持功德火不能燒等所謂救護世間得大無畏也精心陰速發彼神識等所謂成就衆生出世間智也下種種別說不出此二項誦呪利彼故諸惡鬼王皆領深恩金剛隨侍者此呪即是金剛寶覺故同聲相應陰暗處也決定菩提心者不但常隨而已復能在冥冥中以神力加被速令開發神識使得無疑以金剛慧能斷人之疑故從第一劫乃至後身生生不生藥叉羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處是善男子若讀若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處此明不隨惡趣以此呪心是白淨法是最上善故第一劫即初發菩提心時後身即最後成佛時中間修行永無諸委曲相藥叉等皆是委曲相是善男下明不生下賤以此呪心是至尊至貴之法故讀誦書寫者皆如太子處胎貴壓羣臣也此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可說不可說劫常與諸佛同生一處無量功德如惡叉聚同處熏修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齊戒自成齊戒此明現獲功德如來功德悉與此人者由此呪心即如來頂法而如來頂法即行者本具藏心能持呪者即持自己藏心藏心具足萬行何福不備哉諸佛同生一處者與諸佛氣分交接心精通䐇佛不離心心不離佛故惡叉聚喻戒定慧同修無散者以行人之所修即諸佛之所證打成一片故破戒之人戒根清淨者靈丹一粒點鐵成金故未戒得戒者具戒根故未進得進者具進根故無慧得慧者具慧根故不淨自淨者具清淨根故阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆滅除更無毫髮阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪有上帶持若安住處莊宅園館如是積業猶湯銷雪不久皆得悟無生忍此能滅現在業未受時謂未持呪時也持呪後不可更犯矣著不淨衣清貧不備也壇法極難全備故許無壇誦呪勿疑功德差別比丘四棄即殺盜淫妄四根本罪犯此四者永棄佛法海外不與共坐不入僧數比丘尼復加四棄第五名觸謂與男子觸著起染心故第六名八有八事故謂與男子捉手捉衣同入屏處屏處共坐共語共行相倚相期第七名覆謂尼聞大僧說法時遮覆他罪不肯對衆陳首第八名隨謂尼於大衆中未與作共住法即隨共住故通上四棄故名八棄阿難下能消過去業如千年暗室一燈能破悟無生忍即二漸次所獲無生忍也尚在十信前復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形此能隨諸願海寶千般先求如意呪心是如意珠取之不窮用之不匱故生時隨心自在而命終時亦得隨願往生不生下賤者以此呪心是無比法是至貴物故獨往獨來處處稱尊阿難若諸國土州縣聚落饑荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五穀豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入此能消災難種種災難起於逆理今順法性永離諸過故一切不能入支提此云可供養處即淨剎通稱脫闍即城臺也一心供養謂專心致敬始得靈驗惡星八萬四千由衆生八萬四千煩惱所感二十八宿各有所主之事隨人心善惡而變善則福應惡則災應八大惡星即五行及羅計孛也今舉逆處言故總名惡星由旬此云限量一由旬四十里祥吉兆也何以却之意以平順為福是故如來宣示此呪於未來世保護初學諸修行者入三摩提身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語結歸道場修持父母身者現身即證也心通如前不起於座得須陀洹決定自知成佛不謬應時心能記憶八萬四千恆河沙劫等說是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所說我當誠心保護如是修菩提者爾時梵王并天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願復有無量藥叉大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事此衆神護呪也金剛力士衆梵王下諸天衆無色天當在此藥叉下八部衆日月下天神衆山神下地祇衆此呪是如來心印故凡所有處百靈守護爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願此菩薩護呪也華嚴十地品藏王為說法主位在上地示金剛身常護此呪世尊下明護心之切縱令下驅斥外魔大自在以統世之心深耽固執成大慢天是魔之甚者亦不得其便餘小鬼神自當遠去發心修禪者親住如來座下可得近傍也護持行人而言寶杵碎首者折攝並行以殺為慈也修行有正有助若利根人從耳根一門正修足矣若根器稍劣必須持呪為助行方得成就四卷請入華屋至此名修道分下別起證果分阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益世尊如是修證佛三摩提未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈旨瞪瞢瞻仰此請修證位次也涅槃指極果乾慧指因心信住行向及四加行名四十四心三漸次是修行目初地至等覺名證入阿難但問修證位次如來先明覺性次辨迷妄後示漸次者妙性圓明本絶聖凡亦無修證因有迷妄滅妄明真始有修證位次耳爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩提求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝說阿難大衆合掌刳心默然受教前云遠契如來常樂我淨此云懸示如來正修行路自三漸次以至妙覺中歷五十五位然後至菩提法性之家豈不遠乎言汝今未得入預為汝揭而示之則從始至終直趨寶所更無委曲矣刳者剜也虗心受教也佛言阿難當知妙性圓明離諸名相本來無有世界衆生因妄有生因生有滅生滅名妄滅妄名真是稱如來無上菩提及大涅槃二轉依號阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地先明所依真如離一切相也妙性者直指真如之體統衆德而大備之謂圓爍羣昏而獨照之謂明離諸名相者真如界內絶生佛之假名平等性中無自他之形相不但無世界衆生亦無菩提涅槃因妄三句因染緣而有衆生世界之名也妙性離名絶相本無諸妄由最初一念不覺妄動遂有生相無明因生相而復起住異滅相唯其有生有滅所以稱之為妄遂有二種顛倒所謂依本覺故而有不覺也滅妄五句因淨緣而有菩提涅槃之名也轉世界顛倒依菩提轉衆生顛倒依涅槃所謂依不覺故而有始覺也阿難下直示二種轉依果當在二種顛倒因中求也以此二種顛倒不生處即是如來真三摩地前云狂心自歇歇即菩提是也故知聖凡二途皆由生滅迷悟而立真如門中實無是事此下發明二顛倒衆生依世界而居世界因衆生而起兩不相離文亦互見阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生此總標無明熏真如成其染用為二種顛倒因也衆生二字是二種兩字之訛性明心即本覺體圓謂通妄通真因明發性者明指無明言發性謂無明所發之性即業識也妄見即見分究竟有即相分從本覺體一念妄動而有無明因無明而成業識因業識而有見分因見分而有根身器界所謂無同異中熾然成異也能有之無明與所有衆生世界本非有因為彼所生之因亦非有住為彼所住之處如空中花如睡時夢詰之無根覓之無本即本此無住之無明建立世界衆生二種顛倒迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒此明衆生顛倒由見思而起也妙性明圓迷之乃生虗妄迷真起妄妄性元空實無體也凡夫顛倒如此無論矣將欲下指外道顛倒言妄性既空了妄無體妄自無依乃無端欲求復真謂妄之外別有一真即此欲真一念已非真真如性矣真真如性不離妄故既知非真猶自求復如知是幻猶自求幻終竟無有故曰非相非生二句正明非相非生即非因計因妄計邪修為生果之因非住即非果計果妄計諸無常處為常住之果非心即邪智總攝一切邪妄見解各自謂明本來心非法即邪境總攝一切邪妄修證各自謂得無上法展轉發生六句俱指外道此輩自謂不造現業不受後有與凡夫異豈知邪因邪果邪智邪境互相引發生出邪力造作發明現在熏成業種將來定感業果生滅無已何時得出耶凡夫從非有成有外道從非真求真凡外不同顛倒則一阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想此釋世界顛倒由根塵而起也世界本來清淨何有顛倒悉由衆生顛倒識妄相成成十二類故世界亦成顛倒耳是有所有者指無明所起之衆生因有分段根身建立有情界限此界之名所由立也本無有因為彼所生之因亦無有處為彼所住之處皆由念念遷流遂成三世此世之名所由立也以世涉方以方涉世俱成十二所以變化衆生亦應其數而成十二類是故下約一念妄動而內根外境一時具足也塵來應心聲必先至以聲最通達耳又遍利也循聲必至覓色近色必至聞香聞香必至覺觸覺觸必至嘗味嘗味必至知法知法則想緣不捨矣由疏轉親漸成取著之相一切衆生顛倒趣生皆由此也業者習也性者不可改轉之意所謂習以成性也業性廣之八萬四千總為十二區分聲香味觸舉四以該十二根塵窮十二變為一周旋往復乘此下謂能造根塵既具十二故所造衆生亦具十二類也阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞首三句所作之因也末數句所受之果也和合至亂想指因果之間中陰托生時也下同卵唯想生虗妄即想也虗妄輪回是好大喜高不肯素位之人自作自受因必招果故曰輪回動顛倒者不動真心全體躁動也和合者中陰身與生緣和合也氣謂以氣交即托生之緣也因中好高使氣故托氣為生緣遂成亂想當受鳥身作輕舉想當受魚身作遊泳想因此妄想然後傳命羯羅藍此云凝滑世界輪轉變化衆生故十二類生皆言由因世界類各八萬四千者各由八萬四千煩惱變成也由因世界雜染輪回欲顛倒故和合滋成八萬四千橫竪亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞胎因情有雜染即情也情生於欲名欲顛倒滋指父母交媾之緣也夫婦為正淫外色為邪淫情有邪正故所感之果亦有橫竪當受人身作竪行想當受畜身作橫行想遏蒲曇此云皰由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞濕以合感執著即合也合由愛滯觸境趨附名趣顛倒濕以陽生名和合暖成所趣無定名翻覆亂想蔽尸此云軟肉濕生初相也愚鈍之情為蠢柔弱之形唯見其動狀不可別名蠕如醯雞之類唯其生平不配道義無丈夫氣故感此無知之報由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞化以離應變易即離也離此托彼名假顛倒觸類而變名和合觸成厭故趨新名新故亂想羯南此云硬肉下皆稱羯南者諸類通稱也脫故趨新為蛻如蟲為蝶轉行為飛如為蛤脫飛為潛凡不同形而相禪皆轉蛻也是謂化相唯其生平毫無操守觸處生變故感此無定之報由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞有等外道以日月為父母知水去垢之能知火作熱之義事日月水火和合光明堅執不捨障隔不通故名留礙名障顛倒精明顯著因此受生故名色相日月星辰之類吉者為休凶者為咎乃至爝火蚌光皆精耀也此人棄自己大智慧光而認昭昭者為極則事故一遇顯著之境便托為生緣由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沉其類充塞厭有著空滅身歸無名銷散輪回迷漏無聞名惑顛倒依晦昧空名和合暗成陰隱亂想即無色界外道類有想無色不成業體亦稱羯南者有義繫也此人不知有相身中無相身故將此身心銷磨沉沒散入於空因中已成昏暗一遇暗境便托為緣已上二種是情之變由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞似有若無倣佛不真名為罔象影即陰影有影無形也外道凡夫祠禱神明皆從憶想所生故曰和合憶成神鬼相不可見衆生邪慕靈通逐影憶相恍惚見之久之憶成境界又將幻心和合所憶之境以為生緣隱隱躍躍結成相貌故曰潛結亂想生當墮其類神鬼精靈如天魔精怪等皆由錯亂修習得其影而不得其真即有五通未得漏盡由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞外道不知性本圓活勉強抑伏心隨境變遇物成形如華表生精黃頭化石之類問枯稿則無想何云枯稿亂想精神化為土木金石為有輪回為無輪回答枯稿如草乍枯根本未絶時至復生以頑定力而成頑物遇緣生情依舊流轉已上二種是想之變合計四種皆是修行而不得其真者由因世界相待輪回僞顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞相待者倚靠泰山資藉名勢也僞者認物為己也不知自性卓然立於物先而恃他人為己力非顛倒乎因中自無肺腸隨人所染故染緣和合認為可因依之境不覺身墮水母等類水母以水沫為體以蝦為目本非有色待物成色故曰非有色由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由是故有非無色相無色羯南流轉國土呪詛厭生其類充塞相引者邪語邪業誘引他人也性顛倒者使乖弄巧全是業性用事忽乘呪詛之力惹起故業種子將謂彼此呼召不覺身墮呪詛厭生反被他人役使呼召者書符捻訣之類世有邪神邪鬼聽人役使如樟柳神及撒豆成兵之類不由生理則本自無色既感成質非無色也已上二種是合之變由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲盧等異質相成其類充塞合妄者本非真心相合但為財勢之故妄相附合也因中欺罔他人回取他物互為己有故生緣到時和合異質之物亦作回互之想不知身墮蒲盧等中反被他物回為彼有蒲盧詩作蜾裸即土蜂也取桑蟲負於木空中七日化為己子以異質故非有想相以相成故成想羯南由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞怨害非止尋常之怨蓋施恩負恩恨入骨髓也殺顛倒者向來施恩因緣至此全成殺機怪謂怪異之境冤恨既深故觸著怪境托為生緣遂起父母可食之想不覺身入塊果中矣本有食父母想故曰非無想相托生在塊果中故曰無想此何等事而有是想窮其起處只是怨害為因而已吾輩慎勿怨人亦慎勿令人怨已上二種是離之變是名衆生十二種類以皆不了妙覺明心迷陷情欲積妄發生妄隨輪轉非正修行莫能免脫故下卷示除妄修正之法
