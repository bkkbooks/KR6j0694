body:
  text: 阿難汝問攝心我今先說入三摩地修學妙門求菩薩道要先持此四種律儀皎如氷霜自不能生一切枝葉心三口四生必無因阿難如是四事若不遺失心尚不緣色香味觸一切魔事云何發生四種為根本餘為枝葉身口意三意乃其主今心與口同名枝葉者論生起則內起意業外發身口論罪垢則四種為根本而餘悉輕耳四種律儀已戒妄語此小妄語也色香味觸舉四該六塵依念住念絶而塵何依魔托塵入塵忘而魔何托若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所說心呪且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險現業易制自行可違宿習難除必假神力行人好正而固邪欲潔而偏染隱然有馳策而不能已宿習之使也德隆而福鄙行善而身凶多障多冤數病數惱若有機緘而不能自釋宿習之召也摩訶此云大薩怛多般怛囉此云白傘蓋即如來藏心量廓沙界曰大體絶妄染曰白用覆一切曰傘蓋神呪從此流演故名心呪亦名呪心無見頂相者華嚴九地知識為佛乳母初生親捧持諦觀不見頂示頂法不可見見也學人不同淫女發無上心不同無心修行塵喻宿習風喻神呪若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著新淨衣然香閒居誦此心佛所說神呪一百八遍然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟道場得道之場即誦呪處也坐是禪坐意在壇中坐進此道故云坐道場以戒禁邪故名禁戒師者人之模範邪正所由出故不遇真僧律儀不得成就誦呪百八表滅百八煩惱也求如來放光灌頂者因戒求定也問阿難見相發心世尊斥之為妄何故行人求如來灌頂答阿難目見如來不肯進修故令其反觀今行人既反觀故欲求灌頂晝夜十二時六時行道六時靜坐行中坐中所習皆反聞自性入流亡所而已不寐有二意一除昏睡不覺二戒忘失反聞前求佛灌頂今佛現身名為感應既得感應心必開悟因定發慧也諸佛法身平等遍一切處但依衆生之心譬之鏡然無垢則法象隨現有垢則法象不現阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法修行建立道場云何結界合佛世尊清淨軌則前說入道場未說何如建立故特請之自知攝心遠魔呪力冥資可成無學結壇軌則代末法請耳佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沉水蘇合薰陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香罏間華鋪設莊嚴香罏鈍燒沉水無令見火此壇場清淨軌則壇儀之設取其藉境攝心祈禱諸聖來格務用嚴潔法王法言即事即理法不孤起事非唐設山為高土雪山表純淨上信也大力白牛表純淨大根也香草淨水表妙善淨智也茹退表充實遺餘也栴檀為十香之首表十度之總萬行之冠也原為平土表中信也地皮未淨故穿去五數之中黃色之中取中中淨信也十香表十波羅蜜法香也細羅為粉表微妙萬行也壇表寂滅坦實之體體具八正故為八角能攝八邪故方丈六壇心蓮華表中道妙行也鉢為應器表隨量應物也水中華葉表仁覆之行隨澤所施也圓鏡表大圓鏡智也各安八方圍繞華鉢者表智行相依隨方圓應也鏡外蓮華香罏十六間設者華表妙行香表妙德鏡外表正智之外方便建立使邪正相攝德行相熏久而俱化兩忘邪正也純燒沉水無令見火者表反德藏用滅覺觀契寂場也取白牛乳置十六器乳為煎餅并諸砂糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩每以食時若在中夜取蜜半升用酥三合壇前別安一小火罏以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎罏內燒令煙盡享佛菩薩此亨獻清淨軌則權教開許乳酪實教遮禁取以享佛者白牛瑞物雪山不恆有意在融權實同邪正故八味各十六圍繞華外者表融權攝邪之法喜隨行設施也佛以日中受食是謂食時中夜例日中蜜成於華表和融法行也酥成於乳表和融法味也小火罏表方寸覺心也以香浴炭使無餘臭表發覺之法也然令猛熾投酥蜜於炎罏燒令煙盡必有釜也今文闕略表行法既成不可終滯當於覺心勇猛煅煉使習氣鑠絶緣影銷亡豁然如紅罏點雪是名真法供養然後為佛所享令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉此像設清淨軌則四外幡華外行嚴飾也當陽即室中央盧舍那釋迦寂場真主彌勒當來真主阿閦東方佛彌陀西方佛智悲真主諸大變化觀音形像上同下合真主金剛藏伏魔斷障真主安左右者以方便度衆生故以上法王法臣為內主伴釋梵等衆乃外護也烏芻火頭金剛藍地迦青面金剛軍利茶金剛異號毗俱胝是三目持鬟髻頻那是猪頭夜迦是象鼻二使者名壇中之鏡混物而有依表行人之智空中之鏡離物而無依表諸佛之智混物有依者方能照物未能照己必得離物無依住智交相為用然後佛我互照心境雙融諸佛衆生身土相入法法周遍事事無礙於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩薩願心無間斷我毗奈耶先有願教第三七中於十二時一向持佛般怛囉呪至第七日十方如來一時出現鏡交光處承佛摩頂即於道場修三摩地能令如是末世修學身心明淨猶如琉璃阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就從三七後端坐安居經一百日有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬汝問道場建立如是此禮誦清淨軌則凡所祈嚮以皈依三寶為最初方便初七日至誠頂禮如來菩薩羅漢名號假其不思議力以助道也於一時間行道誦呪俱一百八遍呪文甚長一時何能誦百八遍意祗誦唵字下八句然非願力無以持之故二七日依毗尼教專心發願願教指梵網經十大願也行願至強得大勇猛故三七日時無間歇呪無遍限精誠感格進力克功也前以鏡表智今佛智與行者智交相熏發因果通㳷即摩頂意事理互融心境冥會即十方佛現意即凡心見佛心也身心明淨謂宿習緣障纖悉蕩盡一切密圓淨密悉現其中因定發慧也故知顯修密持功德無異若此下反顯道場成就必由於師也從三下明證果利根者惑障俱薄慧性明悟者也得須陀洹謂入聖流非指小果至此了見佛性信得本來是佛不復向外馳求阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞唯願大慈重為宣說悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫於是會中一切大衆普皆作禮佇聞如來祕密章句爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀祐一心聽佛無見頂相放光如來宣說神呪阿難冥獲呪力實未親聞請重宣說意在悲救此會及當來也肉髻即無見相髻中湧百寶光者表無相見相即大智光明也從光湧出寶蓮者表從智起行也有化如來坐寶華中者表諸佛皆從智行流出也化佛頂放寶光光中復現密迹者化復作化密中之密金剛從喻說護法心堅固密迹是實中現權不可思議位在上地迹現金剛此十恆沙衆各現威神大衆既畏其威復愛其慈兼於懷抱祕呪是聖賢祕密之語非唯凡人不知即下位聖賢不達上位之呪諸經神呪例皆翻字不翻音古師多有異說天台會之不出四悉檀一云呪者鬼神王名稱其王名部落敬主不敢為非此生喜益世界悉檀也二云呪者如軍中密號唱號相應無所呵問不相應者即執治之此生善益為人悉檀也三云呪者密默遮惡餘無識者如賤人逃異國訛稱王子多瞋難事有人從本國來語異國曰若當瞋時應說偈云無親遊他國欺誑一切人粗食是常食何勞復作瞋說是偈時默然瞋歇此破惡益對治悉檀也四云呪者諸佛密語唯聖乃知如王索仙陀婆一名而具四實謂鹽水器馬羣下莫曉唯智臣解之祗一法語遍有諸力病愈罪除生善合道此入理益第一義悉檀也本有異同則前後翻譯小差但依一誦持無得揀擇亦不必求解既出佛頂是如來全身精神所現救護末劫不惜髻中之珠必須先遵四清淨明誨修習三決定義三漸次力不敵魔然後一心觀佛持誦此呪乃有大益非徒出口入耳而已南無薩怛他蘇伽多耶阿囉訶帝三藐三菩陀寫一薩怛他佛陀俱知瑟尼釤二南無薩婆勃陀勃地薩跢弊三南無薩多南三藐三菩陀俱知南四娑舍囉婆迦僧伽喃五南無盧雞阿羅漢跢喃六南無蘇盧多波那喃七南無娑羯唎陀伽彌喃八南無盧雞三藐伽跢喃九三藐伽波囉底波多那喃十南無提婆離瑟𧹞十一南無悉陀耶毗地耶陀囉離瑟𧹞十二舍波奴揭囉訶娑訶娑囉摩他喃十三南無跋囉訶摩泥十四南無因陀囉耶十五南無婆伽婆帝十六嚧陀囉耶十七烏摩般帝十八娑醯夜耶十九南無婆伽婆帝二十那囉野拏耶二十一槃遮摩訶三慕陀囉二十二南無悉羯唎多耶二十三南無婆伽婆帝二十四摩訶迦羅耶二十五地唎般剌那伽囉二十六毗陀囉波拏迦囉耶二十七阿地目帝二十八尸摩舍那泥婆悉泥二十九摩怛唎伽拏三十南無悉羯唎多耶三十一南無婆伽婆帝三十二多他伽跢俱囉耶三十三南無般頭摩俱囉耶三十四南無跋闍囉俱囉耶三十五南無摩尼俱囉耶三十六南無伽闍俱囉耶三十七南無婆伽婆帝三十八帝唎茶輸囉西那三十九波囉訶囉拏囉闍耶四十跢他伽多耶四十一南無婆伽婆帝四十二南無阿彌多婆耶四十三跢他伽多耶四十四阿囉訶帝四十五三藐三菩陀耶四十六南無婆伽婆帝四十七阿芻耶四十八跢他伽多耶四十九阿囉訶帝五十三藐三菩陀耶五十一南無婆伽婆帝五十二沙闍耶俱嚧吠柱唎耶五十三般囉婆囉闍耶五十四跢他伽多耶五十五南無婆伽婆帝五十六三補師毖多五十七薩憐捺囉剌闍耶五十八跢他伽多耶五十九阿囉訶帝六十三藐三菩陀耶六十一南無婆伽婆帝六十二舍雞野母那曳六十三跢他伽多耶六十四阿囉訶帝六十五三藐三菩陀耶六十六南無婆伽婆帝六十七剌怛那雞都囉闍耶六十八跢他伽多耶六十九阿囉訶帝七十三藐三菩陀耶七十一帝瓢南無薩羯唎多