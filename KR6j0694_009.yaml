body:
  text: 阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天欲習既除離欲心現於諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵天阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪欲天但十善感生色天兼禪定感生然特有漏禪觀六事行耳六行者厭欲界是苦是粗是障欣色界是淨是妙是離也粗惑不染淨報現前應念而生梵世唯戒而已離欲心現愛順律儀則定戒相應矣行梵德者弘揚梵化也梵輔則天臣矣身心雙攝妙圓清淨加以明悟智出梵衆故能統之為大梵王背染趣淨故名勝流執身伏欲曰苦惱不逼心離散亂曰諸漏不動禪即禪那定也從初之四皆有漏禪禪以三昧得名此非真三摩地何以名為初禪謂彼已離穢濁欲心已離散動欲習故得初禪之名自此以上絶無女人心迹俱離無所交接兼無飲食睡眠稍覺飢倦即入禪定出定則飽滿精明是但以禪悅為食息阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天吸持圓光成就教體發化清淨應用無盡如是一類名光音天阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪澄心不動因戒生定也寂湛生光因定發慧也指身量光明非指慧照其光尚劣名少光定力轉明妙光迭發境隨先發遍成琉璃名無量光納境於心曰吸躡前圓先吸納保持不致離散令人觀光修梵故曰成就教體不假言語曰清淨隨機受益曰無盡以光代音名光音初禪定力尚假戒扶此天不假戒扶而自不動定勝發光以光之勝劣為次初禪漏心不動而未能伏此天已伏粗漏懸不安也憂懸較苦惱為輕苦屬身憂屬心阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天阿難此三勝流具大隨順身心安隱得無量樂雖非正得真三摩地安隱心中歡喜畢具名為三禪由圓光教體披露妙理故得發成精行而生淨樂樂非境也出於淨性淡泊寂淨名寂滅樂但通而未成名少淨淨久發空漸次虗豁至無邊際初但心通次身心廓然安樂廣大故曰成無量乃身心之無量次但身心後加世界通成虗寂故曰圓淨曰淨德成就天中妙樂至此已極便認此為清淨極樂之鄉終身歸托之地故曰托曰歸身心世界依正咸淨方名遍淨初禪隨順律儀此隨順淨業至無量周遍乃大隨順安隱者自在受用也界內以三禪為極樂處故曰無量樂此名離喜妙樂喜是動心所發樂是淨心所融二禪心有喜受分別散亂尚未安隱至此始得輕安穩貼阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天阿難從是天中有二岐路若於先心無量淨光福德圓明修證而住如是一類名廣果天若於先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪初禪俱名梵者持戒精潔故二禪俱名光者生光發化故三禪俱名淨者能伏六識染汙故四禪苦樂俱捨任運自在乃世間真福故曰福生曰福愛清淨之福與下界濁福不同故曰淨福方初捨時尚存捨相久之圓熟渾融漸近自然矣初以捨為勝解僅得淨除粗重至此不作勝想則勝解之念亦清淨矣初時捨心有礙故福亦有礙至此捨心已融故福無遮礙盡未來際隨心順意也從福愛分二岐路趣廣果是直往道趣無想是迂僻道一增進一斷滅也不取苦樂亦不厭苦藥但以四無量心熏修福德證廣大果若以苦樂為可厭而執著捨心精研不斷身心一切皆捨獲受灰心之果即無想定也所謂苦樂心滅厭捨心生猶然生滅之因八地菩薩方是真不動地此但不為苦樂所動非無為真境而有為功用則純熟矣阿難此中復有五不還天於下界中九品習氣俱時滅盡苦樂雙亡下無卜居故於捨心衆同分中安立居處阿難苦樂兩滅鬬心不交如是一類名無煩天機括獨行研交無地如是一類名無熱天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天精見現前陶鑄無礙如是一類名善現天究竟羣幾窮色性性入無邊際如是一類名色究竟天阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見阿難是十八天獨行無交未盡形纍自此以還名為色界不復欲界受生曰不還亦名五淨居習氣與現行皆滅曰俱盡苦亡則不居五趣樂亡則不居三禪非同分也獨捨念清淨地乃其同分可卜安居希阿羅漢果鬬心指苦樂交戰之心此時內無能交之心尚覺外有所交之地至於機括獨行則往來自由研窮所交之地了不可得上專就心説此兼指境説二種依稀塵既不緣根無所偶矣塵象指境界言沉垢指煩惱言至此依稀十方國土皎然清淨矣陶鑄無礙者鎔鍊諸惑不作障礙能起十四變化自在如陶人範土治人鑄金隨心轉變也至此依稀一切變現不為煩惱矣羣幾即衆微也小乘以色法為衆微和合所成今研究衆微窮諸色性悉歸於空從有色之邊際入無色之邊際所謂柝色明空也前天修有漏凡定此天修無漏聖定粗細懸如故但仰嘉名不能見也如今五句是喻初禪二禪三禪各三天四禪四天復有五不還天為十八天純是禪定善想所感無情欲故云獨行無交有色礙故云未盡形纍總名色界復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢此標聖獨出也究竟居色頂故曰有頂與無色鄰故曰色邊際三果根有利鈍故於捨心復分二路其利根者研窮色性徹見真空發無漏慧慧光圓通橫出無色向大乘不局天趣矣若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處諸礙既銷無礙無滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處識性不動以滅窮研於無盡中發宣盡性如存不存若盡非盡如是一類名為非想非非想處此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉此下四天不悟性色真空而勤於銷礙也厭患色如牢獄心欲出離覺有身為質礙而不自在即修空觀而滅身歸無名空處定患厭虗空無邊緣多則散能破於定諸礙即銷而無則不依於色無礙之無亦滅則不依於空賴耶即第八識末那即第七識全於末那謂第七識全在也全分之中有半分漸漸微細末那名恆審思量起我法二執此天以伏惑之力故末那雖全而見分思量之相任運輕細名識處定識心即半分末那都滅者憑深定力伏其現行不行逈無所有者滅識定中所證境界名無所有處定識性不動指第八湛不搖處見此境界即以滅盡之念深加研窮并滅無所有想求至湛入合湛之境於無盡中發宣盡性謂於本非寂滅之境見為真寂滅性也前七已銷無明未破故曰如存不存若盡非盡超過有無二想也此等指前四天人初天窮色而歸空次天窮空而歸識三天窮識以歸無四天窮無以歸盡如此窮空豈唯不達圓頓性色真空之旨即人法二空之理皆所不了妄欲銷之空之滅之盡之豈知終不能銷空滅盡也故自五不還天窮空而入此天者根本尚正俟八萬劫滿斷盡思惑而出三界名鈍根羅漢對前有頂之回心者故曰鈍也從無想窮空而入此天者根本原邪以彼迷有漏天作無為解故八萬劫受報已滿無所歸托便入淪墜矣阿難是諸天上各各天人則是凡夫業果酬答答盡入淪彼之天王即是菩薩遊三摩提漸次增進回向聖倫所修行路通結三界天人天主凡聖各別也天人即天之臣民是凡夫攝業果酬答者因中修十善八定而以六欲四禪酬之故報盡入輪天王即是菩薩等者寄位進修不落輪回者也此段當在無色界下各天原非正修然漸次增進即是菩薩遊三摩提自劣而向勝也聲聞緣覺已得正果然得少為足遂入識陰十種邪見之末自勝而向劣也阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界此結屬無色也前二天色空俱無是身滅盡後二天伏識現行是心滅盡由身心俱滅故定性現前也無業果色者非若欲色二界業報所感根身器界以有勝定故隨化依正自在受用所謂定果色也空處至非想統名無色此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沈溺補特迦羅各從其類此總結三界也自六欲至非想皆由不能了達本有妙覺明心從迷積迷妄生三界諸天人隨業報盡不免又隨七趣淪溺不得休息補特迦羅此云數取趣即中有身也以能數數受生取諸趣故復次阿難是三界中復有四種阿修羅類若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝若於天中降德貶墜其所卜居鄰於日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝阿難別有一分下劣修羅生大海心沉水穴口旦遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝此明四種修羅也言鬼道者顯其前因從鬼道發心也如護戒護定護經護呪等皆名護法謂從鬼道藉護法力而生此趣能乘神通而入居空界者約其現果是卵生以卵從想生故約其因或是三夜叉親往如來座下轉生者當是鬼趣攝也言天中者指其前因降德者在天中有損德而下謫也卜居鄰日月者以不離人間固是胎生人趣所攝也執持世界者謂能驅役鬼神興災興福力洞無畏者言其力量廣大通貫天人故心無怖畏帝釋四天常與鬬戰今言梵王亦爭者或帝釋不勝則梵王以下俱助力也若力不能勝則身入藕絲孔中約可大可小知是化生力與天等是天趣攝也生海水心口者經稱毗摩質多阿修羅王以居海底是濕生以下劣故是畜生攝阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業於妙圓明無作本心皆如空華元無所著但一虗妄更無根緒阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故反此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究精研者升沉往復百千萬回不知出要也七趣皆由妄想於圓妙中了無根緒故如空華前問妙心遍圓何有獄鬼人畜等道此結示由殺盜淫三為根本有是業則墜為鬼倫無是業則升為天趣七趣舉二通攝因有而墜因無而升故有無相傾起輪回性若得妙發真三摩提則可免耳二無者有無俱無也有無既無亦無無有無之念曰無二亦滅此則不但超生死更超小乘涅槃上云皆由隨順殺盜淫故已揭出受病元由恐人疑云天趣持此三戒何以不免輪回故云此非持戒之過乃以有漏心持戒之過也無漏學中纖塵不起尚無持戒何況毀戒此正痛絶三業之語不斷三句言造業私而受報則有定處原是自妄之所招感既所生是妄實無有因故不可究其起處汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落於魔道雖欲除妄倍加虗偽如來説為可哀憐者汝妄自造非菩提咎作是説者名為正説若他説者即魔王説三惡三善總是業不達此為繫縛之本障智之端名三惑不但除有三亦除無三蓋伏現行而不除種子遇緣復起終落魔道倍加虗偽者如各自謂得無上道實皆假世智以妄研乘神通而造業違遠圓通背涅槃城故如來憫之前問佛體真實云何復有諸趣故答云汝妄自造非佛體有咎菩提即佛體也復警云若使末世勸人離此三種者即是佛説若讚此三種為無礙者即是魔説映下五陰魔事魔之惱人先破戒故即時如來將罷法座於師子牀攬七寶几回紫金山再來憑倚普告大衆及阿難言汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已説真修行法汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄汝應諦聽吾今為汝子細分別阿難起立并其會中同有學者歡喜頂禮伏聽慈誨真修行路阿難等尚未親歷不知途中艱阻世尊是過來人故將罷座而回身復留指明途中所遇令其自識預備不虞真修行法即指反聞一門也魔事最為微細忽爾現前能契合人心不識其為邪為正若胸中一毫未淨彼即乘此一毫之隙勾入邪見矣陰魔即色陰中初心自現不從外來天魔鬼神魑魅皆受想二陰所現若道眼不明為彼所轉遂認賊為子立使家寶劫盡矣心見二魔皆行陰識陰中自心邪見得少為足之過如第下舉一為例無聞者無多聞慧但勤小行得生四禪便謂已證阿羅漢及天報將畢見有生處遂謗佛妄説阿羅漢不受後有因此墜墮乃邪誤之咎也佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裏況諸世界在虗空耶汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂本覺湛然纖塵不立由迷妄有頑空由頑空成漏界為魔所依斷迷妄而發真心則虗空銷殞而國土振裂魔自無依問古今發真者衆矣而空界依然何也答世界是衆生共業所感衆生不可盡世界不可盡一人發真但能銷殞一人世界彼衆同分暫雖震動旋復凝結若使同能發真則山河器界化成無上知覺為淨妙佛土矣汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾凡夫昏暗不覺遷訛彼等咸得五種神通唯除漏盡戀此塵勞如何令汝摧裂其處是故鬼神及諸天魔魍魎妖精於三昧時僉來惱汝飾嚴護也禪力相應與佛菩薩大阿羅漢心精通㳷將出魔界故大地震動魔宮為摧魔戀塵勞久依漏界寧肯捐棄故來惱害水陸飛騰指魔衆水居陸居者遷訛即震裂意凡夫不知行人定力之遷訛謬言地震唯除漏盡者六通中未證漏盡一通也五通既具知汝定力所為決不相容然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸鄰不日銷殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰銷入明則彼群邪咸受幽氣明能破暗近自銷殞如何敢留擾亂禪定若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼唯呪汝破佛律儀八萬行中祗毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽遭藉沒宛轉零落無可哀救此言悟則無咎迷則致亂也成就三昧破亂三昧不在於客悉由主人主人真心也覺悟無惑者一心不動於彼善惡境界不欣不怖魔力雖強不能動汝由汝陰氣已銷得大光明藏彼則咸受幽氣住於昏冥之鄉彼若鄰近光明幽氣自然銷殞安敢擾汝之禪定若被陰所迷反墮彼類矣宰臣藉沒喻幾登寶位而淪惡趣阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩提如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁觀其所由堅固妄想以為其本坐道場不必土壇鏡像端坐其中一切時四威儀反聞正定便是銷落諸念者功深念盡等虗空界也一切精明者常不昧也靜時精明動亦不移忘時精明憶亦如之此禪那得力處依之進趣正定可入矣明目處暗狀其將開未開之境精性妙淨定心顯也合明目之喻心未發光慧未生也合處暗之喻陰以覆蔽為義區局真性此色陰未破之相若使心光發越障礙皆通即肉眼所見十方洞開而前之黑暗皆化成光明內徹五臟外徹山河天上人間悉如指掌此色陰已破之相劫者時也劫濁因色陰而有色陰一破則三際斷除故能超越堅固妄想於外四大堅執為心外實有於內四大堅執為心所住處乃色陰根本若不執著色何由為陰乎前決定義中歷指重疊五濁即今五陰也次云如澄濁水貯於淨器即今銷除五陰也但未及詳示此處辨析魔事却亦了前公案阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流溢前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此下十種皆色陰將破未破之相先明外徹此中者定中也妙明即聞性反聞精研則四大虗融如雲如影不復密織堅實故身能出礙豁然透過墻壁此特定力所逼使精妙流溢暫得前境虗融隨得隨失不同證果聖人一得永得若行人無見識輒起證聖之解則魔得其便矣阿難復以此心精研妙明其身內徹是人忽然於其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明內徹心光忽照五臟開明如揭蓋覆親見蟯蛔以手拾出身無傷毀流溢同前內融形體為異又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽於空中聞説法聲或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明內外俱徹魂藏於肝魄藏於肺意藏於脾志藏於膽精藏於腎神藏於心定力精研四大既空主無所依流出於外唯第八執受身安然不遷彼六交相涉入一為主而五為賓也離合者離本位而合他位也夙昔聞六根互用熏成善種故於定中偶一發露非若聖人證入圓通又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來於時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明現佛境界淨穢二境隨心所感此心澄徹靈悟濬發佛境現前無情遍成金界有情盡作如來靈悟所染者先所熏染圓頓慧覺衆生本來是佛此之種子因定激發暫現殊勝又以此心精研妙明觀察不停抑按降伏制止超越於時忽然十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此明空成寶色觀察者審究妄心起處抑按者於起處遏捺之降伏者隨抑從順制止者恐後跳梁更加防範重重處分超越過甚故妙明逼極煥散發現致虗空成寶色也虗空寶色即自己心光又以此心研究澄徹精光不亂忽於夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此言暗中見物心光密澄物不能遁暗物不除言實境也研究澄徹之功暫時發露非真得常光又以此心圓入虗融四體忽然同於草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪此身同草木也定力虗融則五塵併消四大排遣純覺遺身故無傷觸暫時發露未得性色真空又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪此覩佛覩界也欣厭凝想未入定前欣淨厭穢熏習成種今反聞逼極心光所灼悉發現耳雖説化成亦非虗境雖是實境仍同幻化又以此心研究深遠忽於中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪此遙見遙聞也用心研究到深遠處遂令心光逼極飛出故障隔處皆能見聞中夜心境俱靜之時此亦暫時光景非實證無邊海剎不隔毫端也又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腹無端説法通達妙義非為聖證不作聖心魔事銷歇若作聖解即受羣邪上九境皆定心逼極所發善境非魔所為要須作證方成招魔之端此是大定中竭力窮研到至精至極之地與諸聖心精通吻而色陰將破故魔心震驚魔擾於是發端見善下發其妄見也見善知識者行人靜中自見也形體變遷者變現佛菩薩天龍諸像也邪心含受者行人防心不密領受妄境故鬼物眩惑現此虗影非真實見聖也或遭下發其狂慧也天魔入心者魔入行人身中持其心神也説法達妙指行人自説魔力持之使然非真實心開也行人用功自淺而深魔魅肆擾由微而著此節與下受陰十境皆暗中入心令自發亂至想陰中方飛附旁人顯然誑惑阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後於末法中宣示斯義無令天魔得其方便保持覆護成無上道交互者禪觀心與各陰妄想交戰互為勝負也如色中每一善境乃觀力暫勝故得心光發露隨開隨閉即是妄想復勝此魔之所以乘間而入也阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇若魘咎歇其心離身返觀其面去住自由無復留礙名受陰盡是人則能超越見濁觀其所由虗明妄想以為其本諸佛心即我妙覺明心色陰盡者四大已銷無復留礙故心開而得見之雖得親見本體未能發自在用者受陰未破也受以領納為義納境於心能陰真空妙性手足二句喻若有所得心觸二句喻不得其用魘咎歇喻受陰盡也心本不在身中受陰妄為領納受陰盡則心能出礙故能離身返觀去住自在與黃冠出陽神相似而實不同彼有心求之此無心得之妄起見覺汩亂湛性名為見濁即受陰之體盡則超之矣因違順之幻境生損益之妄受受陰無體虗有所明故名虗明妄想阿難彼善男子當在此中得大光耀其心發明內抑過分忽於其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失於正受當從淪墜此抑己生悲也既破色陰無復幽黯故得大光耀知受陰為咎故內自抑伏而破之抑伏太過失於柔慈故多悲愍以致悲魔附焉阿難又彼定中諸善男子見色陰銷受陰明白勝相現前感激過分忽於其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越悟則無咎非為聖證覺了不迷久自銷歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失於正受當從淪墜此揚己如佛也勝相現前者色陰盡而見諸佛心也感激過分者向聞即心是佛未曾親見今始見本來佛性故奮發大勇自謂不歷僧祇立地成佛不知理雖頓悟事要漸除此由陵蔑輕率越分自僭故作斯語若自反知非復歸無咎若迷而不反則有狂魔入心生大我慢上無諸佛下無衆生自謂惟我獨尊其失正受淪墜無疑又彼定中諸善男子見色陰銷受陰明白前無新證歸失故居智力衰微入中隳地逈無所見心中忽然生大枯渴於一切時沉憶不散將此以為勤精進相此名修心無慧自失悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失於正受當從淪墜此無慧沉憶也前無新證者受陰未破也退失故居者色陰已破也當以慧力照破受陰本空自可證入若智力衰微則墜在兩楹無所依倚入中隳地則前後皆迷逈無所見矣由無慧水灌溉故忽生枯渴由前後雙脫進退無地故時刻沉憶不敢走作復將沉憶不散以為勤精進相而欲破受陰不亦過乎此名無慧而自失也若知非速改即得無咎若以沉憶不散為聖證則憶魔乘間而入日夜撮心懸挂一處失正受而從淪墜矣又彼定中諸善男子見色陰銷受陰明白慧力過定失於猛利以諸勝性懷於心中自心已疑是盧舍那得少為足此名用心亡失恆審溺於知見悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失於正受當從淪墜此慧偏發狂也色盡受明定之勝性忘懷可也乃得少為足自疑為佛致下劣易足之魔附焉前謂佛可速成念越多劫修之無難此見自性即是不假修證過更甚矣問宗門本來是佛不待修證何耶答為人唯執修成孤負己靈抑揚之耳竿頭進步何嘗恃己靈撥修證哉又彼定中諸善男子見色陰銷受陰明白新證未獲故心已亡歷覽二際自生艱險於心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求於人令害其命早取解脫此各修行失於方便悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劍自割其肉欣其捨壽或常憂愁走入山林不耐見人失於正受當從淪墜此覺險思憂也歷覽二際者觀色受二邊際也心生艱險慮遭退失也本是勤修警懼太甚無智慧方便以自解遂致患害又彼定中諸善男子見色陰銷受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑於衢路傍自歌自舞自謂已得無礙解脫失於正受當從淪墜此覺安多喜也此名無慧自禁而生若以慧眼觀察何足深喜則喜風自息仍歸無咎又彼定中諸善男子見色陰銷受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發心中尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是㲲華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失於正受當從淪墜此見勝生慢也慢有七恃己陵他名我慢同德相傲名慢於同中爭勝名過慢於勝爭勝名慢過慢未得謂得名增上慢以劣自甘名卑劣慢經缺邪慢不禮塔廟是我慢亦為七慢之總勝者因見殊勝勝氣所使也有慧則悟平等不見一衆生可慢敢慢諸聖哉問臨濟不禮祖塔丹霞燒木佛巖頭説祖師言句是破草鞋非大我慢乎答此為執外求而不達自心執言教而不肯進修故假此激之一片慈心也若使稍有慢心質之於經當入阿鼻又彼定中諸善男子見色陰銷受陰明白於精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失於正受當從淪墜此慧安自足也以色銷為精明以精明為圓悟遂謂得大隨順輕安自在得少為足無聞之儔也比上過似輕但自足不進非更慢他又彼定中諸善男子見色陰銷受陰明白於明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常於信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失於正受當從淪墜此著空毀戒也前圓悟此明悟特受陰中之悟耳因得虗明誤執斷空成諸邪咎此空魔也近有説大虗空為本性一切佛事皆著相一切俗事為無礙者即此類自誤誤人不可勝紀急宜聞經悔悟又彼定中諸善男子見色陰銷受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲悟則無咎非為聖證若作聖解則有欲魔入其心腑一向説欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故於末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷於王難疑誤衆生入無間獄失於正受當從淪墜此著有行淫也愛因順起空境順心邪愛成咎蓋禪定中自有妙觸輕安之境隨順入心當用慧觀察一切不受方為正受耽著不捨引起淫欲魔阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道此十種魔事已成非前十為引發之端然但暗入人心令其不覺自顛不同後十就人惱亂陷害阿難彼善男子修三摩提受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇若動念盡浮想銷除於覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁觀其所由融通妄想以為其本真心周遍本不局身非局而局受陰之為也受陰一盡從凡身歷聖位隨意現身矣想者心慮浮相能覆妙明而障聖道故有熟寐寱言之喻音韻倫次喻有聖位分也不寐者咸悟其語喻證聖之人知其有聖位分也然以想陰尚在未能即證聖位三漸次乾慧十信十住十行十向四加十地等妙通六十位雖有賢有聖總是聖位之塗路故均稱聖位覺明如鏡浮想如塵塵銷鏡朗想盡心明倫類也三界異生雖分十二而生死大同故曰一倫首尾即始終生死各有始終想盡則無生死故曰首尾圓照煩惱因想而生想盡則超之想能融變使心隨境使境隨心故名融通妄想阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善幻爾時天魔候得其便飛精附人口説經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座説法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言災祥變異或言如來某處出世或言劫火或説刀兵恐怖於人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求善巧也受陰虗妙者謂能離身反觀作用自在也不遭邪慮者不為十境惑動也圓定發明者由受陰一破見惑已銷於諸前塵不起分別成一精明也心愛圓明者心生愛樂欲令妄想盡而覺心圓明無不了知善巧方便無不成就將欲度生以行教化故發憤鋭思而貪求善巧只此一貪便是動魔之本天魔乘一念之隙飛精附人説法以惑之受盡之人邪魔不能入其心腑故遣精靈附旁人以煽惑令其自壞定心此人不知為魔著身故因説經法自謂得證涅槃向求巧人前投其所好説法變形作諸善巧蠱惑其念是求巧人傾心受教於是昔日之定心今已搖蕩昔日之律儀今已破壞墮其術中不能出矣好言災祥等者是指魔附之人發言詭異惑亂人心此名下指名示害怪鬼是貪習遇物成形至老方為魔使厭足心生去彼人體者謂久之魔鬼生厭去彼所附人之體弟子即求巧之人師即説法之師先覺者謂凡有毀戒誘淫者便知是魔不隨彼轉阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷爾時天魔候得其便飛精附人口説經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座説法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智銷滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求經歷也無邊剎海不隔毫端果熟因圓自然發現若一貪求天魔即遣精靈附人不自變形而變他形現生成佛者由彼貪求經歷佛土故現佛國以投其好也是人指行人也淫逸其心化定心而縱蕩不拘也魔口所出皆指目前是佛土者以彼好遊蕩故以此誘之既見諸佛復聞其説故傾心渴仰捨己從他也魃鬼是淫習遇風成形之鬼物今為魔使也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合爾時天鬼候得其便飛精附人口説經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座説法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口説偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求契合也綿密也㳷合也以此心上契諸佛下合衆生也功夫到寂滅現前時自然上同下合不必貪求由行人有貪契之心故魔亦現默契之事念念移易者謂心開之人念念不同如下所云也或得宿命者是己尋常不知者今忽知也或得他心者是彼尋常所念者今亦知其所念也乃至説偈誦經皆是現密契之事以惑其心也綿愛其心者行人被惑亦密愛之欲遂其心之所求也而魔口復以妖言竦動行人既見密契之人又聞妖異之語由是將昔日正定之心洗滌無餘轉入邪知邪解矣魅鬼是誑習遇畜成形之鬼又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析爾時天魔候得其便飛精附人口説經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座説法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受忘失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求辨析也愛根本者求萬物之本也欲使物化一一洞徹根柢毫無疑滯使心豁神爽故貪求辨析由此一念即是招魔之端故魔乘間而入也身有威神摧伏求者以魔力攝服人心也諸人領魔法以遞相開化蠱惑人心者也由行人貪求化元故指目前斷滅者為常住本穢汙者為清淨根以投其欲行人既信受其言遂將辨析之心一一棄去即信目前父父子子遞代相生者為物化本日將魔心魔語推究以為至理遂入其黨彼魔精者既令魔黨宣穢言以煽惑己復出穢言以印證安有不被惑者哉蠱鬼即恨習遇蟲成形者也又善男豫受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感爾時天魔候得其便飛精附人口説經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座説法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛黏如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我於前世於某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛於中住一切如來所休居地彼無知者信是虗誑遺失本心此名厲鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求感應也愛懸應求冥感者欲以定心求諸佛之感應也感應之道如水清月現豈可以意求一有此心遂有邪魔乘間而應之矣暫見其身如百千歲者魔現老人之相也因見其年老令座中人知是先世之師前生知識故別生法愛如膠漆之固結此皆詐現冥感之事行人為彼迷惑日日親近不知不覺遂將佛子轉為魔眷其魔既詐現冥感之事復詐陳冥感之語人安得不信哉厲鬼即瞋習遇衰成形者也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入尅己辛勤樂處陰寂貪求靜謐爾時天魔候得其便飛精附人口説經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座説法令其聽人各知本業或於其處語一人言汝今未死已作畜生敕使一人於後踏尾頓令其人起不能得於是一衆傾心欽服有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求宿命也心愛四句當與下章心愛三句換過則前後相應矣愛知見貪宿命者欲盡知三世之境欲盡見他人之心知見立而邪魔人矣汝今未死已作畜生者由愛宿命通故詐現宿命通也有人起心已知其肇者由愛他心通故詐現他心通也佛律儀外重加精苦者詐現精進以惑人心也誹謗二句指正人為邪人也訐露二句攻發人之陰私而欲人信伏也口中四句詐現天眼天耳也此上五通是空行大力鬼所詐現者也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命爾時天魔候得其便飛精附人口説經法其人殊不覺知魔著亦言自得無上涅槃來彼求知善男子處敷座設法是人無端於説法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡策符牘諸奇異物先授彼人後著其體或誘聽人藏於地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求靜謐也靜謐是禪定極境餘人不知唯佛能知一有愛心魔則乘愛現陰寂之事以惑之矣是人無端得大寶珠者即行人從説法處得珠也或先銜珠投人以附體或先藏珠地下以誘人或食藥草麻麥而充肥此皆詐現陰寂不可知之事以投其好也魔既現陰事以動入復説陰事以惑衆此皆陸地之鬼神久而成魔使者也或有下魔黨成羣結隊以擾亂行人也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力爾時天魔候得其便飛精附人口説經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座説法是人或復手執火光手撮其光分於所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或於空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙唯於刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常説神通自在或復令人傍見佛土鬼力惑人非有真實贊嘆行淫不毀粗行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為魅或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求神力也神通神力但得六根互用自然具足豈可貪求一著貪求便招魔事是人下詐現十八神變以惑人也唯畏刀兵足知邪魅口中下説神通以亂人也讚淫而不毀粗行足徵魔説此皆水居陸居諸精靈類詐現神通也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空爾時天魔候得其便飛精附人口説經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座説法於大衆內其形忽空衆無所見還從虗空突然而出存沒自在或現其身洞如琉璃或垂手足作栴檀氣或大小便如厚石蜜誹謗戒律輕賤出家口中常説無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難汝當先覺不入輪回迷惑不知墮無間獄此貪求深空也真空不妨妙有有而性常自空所以具修萬行了無所著若欲杜絶衆行以為深空即同外道斷見便有魔擾矣於大衆下因貪空而現空以投其欲也誹謗二句因空而謗法輕僧也口中下説斷滅空以撥無因果也雖得空寂潛行貪欲者談空而心著有也受其欲而得空心者魔力攝持與之俱化也此名下令人識名而嚴防也又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住爾時天魔候得其便飛精附人口説經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座説法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或於一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前口中常説十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞汝當先覺不入輪回迷惑不知墮無間獄此貪求永歲也分段生死三界惑盡方始得離二乘無學登地菩薩皆得變易今未離染欲於分段身上變粗作細易短為長故曰棄分段生頓希變易瞬息而萬里再來急行而纍月不到詐現時之可延可促以投其欲也口中下説長壽以竦聽也自在天即欲界魔王第六天攝使其眷屬者魔王不自現身是飛精附人也遮文茶此云嫉妬女即役使鬼也毗舍遮此云啖精氣皆屬四天已發心者則護人未發心者則啖人由行人定力虗明食其精氣以害之也或不因師者魔不附人説法而親現身令行人自見也稱金剛現美女者害人之巧計也獨言者即美女也不詳其意受其説而行猥媟者多陷王難雖未行刑精神先枯竭而死矣阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚嘆淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精昧其心腑近則九生多踰百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩此囑當機留願度生也前十種魔唯第十自現形餘皆附人昔佛住世諸魔壞法佛神力故皆不能壞魔作誓言如來滅後依教出家破壞佛法是知壞法比丘皆魔侶也阿難前云願今得果成寶王還度如是恆沙衆此復叮嚀留願人間流通教法也前云將此深心奉塵剎是則名為報佛恩故又囑其遵佛語而傳法度生即是報佛恩也阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道此十魔破佛律儀更甚於四陰諸魔故如來至此囑付阿難叮嚀倍切阿難結集諸經受佛囑也即今教法流通孰非愍世之心悲救之力耶
