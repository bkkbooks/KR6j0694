body:
  text: 阿難彼善男子修三摩提想陰盡者是人平常夢想銷滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑒明來無所黏過無蹤迹虗受照應了罔陳習唯一精真生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁觀其所由幽隱妄想以為其本浮動陳習晝明則想夜瞢則夢汩擾真性想陰盡者夢想銷滅而覺明之體常虗常靜矣粗重塵影即法塵依想為體想盡則塵盡由是觀諸世間如鏡鑒物無黏無迹鏡有四種妙用虗者能含萬象受者物來不拒照者隨物大小現形應者研醜無所取捨唯一精真明極如此故幽隱行陰於是披露行陰是生滅根元以遷流造作故十二衆生該盡天上人間畢殫其類者盡此十二類生皆從此出以行是業體故各命由緒者類生各命之因由根緒即識也同生基者類生同以為生之基本即行也野馬者陽焰也春晴遊氣狀如水光如𦦨熠熠閃爍貌清擾動之微細也喻生滅浮根塵肉身也門簨曰樞門臼曰穴轉動要處根塵生滅皆以行陰為樞穴此行陰未盡之相想陰如大流行陰如細流想陰盡如大流息行陰現如細流生若將此細流元習之性反入無波元澄之體則元習澄矣此行陰已盡之相生滅不停業運常遷名衆生濁行盡則超之行陰生滅微細難覺故名幽隱阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本於本類中生元露者觀彼幽清圓擾動元於圓元中起計度者是人墜入二無因論一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有衆生業流灣環死此生彼祗見衆生輪回其處八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有由此計度亡正遍知墮落外道惑菩提性二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本竪畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因由此計度亡正遍知墮落外道惑菩提性是則名為第一外道立無因論正知奢摩他凝明正心皆想盡之相外魔皆因心召想盡則天魔不至唯修禪失趣狂解妄計所謂心魔也生類本即同生基也於本類中生元露者於同生基見己行元也幽清動元即行元也窮究生類之本但見行陰幽清圓擾為生之元而不窮識陰本末遂墜二無因論外道有一種無因論師行人於奢摩他中謬生計度不覺便墮其中非自立無因論也本無因者前際無因也生機全破者行陰披露也由行陰披露六用不行故乘定中眼根功德見八萬劫中衆生隨業波流灣是旋轉環是循環八萬劫前冥然不見妄計冥無所觀處為冥諦為自然不知己之見量有限謂諸衆生本無而有由計本無則亡却正遍知性墮落邪見中末無因者後際無因也謬執生根不達化理以人竟為人乃至黑竟為黑無復改移因而例我本不見道末亦無成是末無因也結文本字合是末字蓋執本無因故執末亦無因也一切無因謂一切本來自然而然此由未見識陰不知十二類生各命由緒也此種正所謂自然外道計一切法自體本然不藉因緣蓋謂無因自有非謂一切斷滅也阿難是三摩中諸善男子凝明正心魔不得便窮生類本觀彼幽清常擾動元於圓常中起計度者是人墜入四遍常論一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計以為常由此計常亡正遍知墮落外道惑菩提性是則名為第二外道立圓常論此單計遷流不住者為遍常而起常見也行陰生滅相續不失故名常由計四種遍一切法故名圓遍即圓也故首標遍常後結圓常四種者一心境二四大三八識四行陰由妄計行陰為生滅圓元遂於心境四大等皆計為常一者計心境常想破行現乘此心開窮研內心外境本元何自而有窮之不遠但見二萬劫前無因自有二萬劫內生滅不斷不計劫外斷滅唯計劫內相續為常二者計四大常萬法皆從四大和合而成作意窮之見四大性常故計衆生體常四萬劫者所窮之法稍廣故劫數倍前三者計八識常根指根中之識六識也末那即第七識執受即第八識集起名心思量名意了別名識六根及末那執受通舉八識也心意識中本元即識性也謂其恆常衆生依之循環而住不曾散失此認識神而妄計也所窮八識法門深廣倍前四大故所知劫數亦倍於前四者計行陰常據想元盡處認為五陰俱盡據行陰露處認為圓明精心唯佛眼觀之乃知此為行陰耳想元想陰也生理行陰也妄謂流轉生滅皆屬想心今已永滅則不生滅理自然屬行不知行陰即生滅根元也但見行陰生理無彼粗重流轉遂謂生滅已滅不知流注生滅宛然全在非遍圓而計遍圓非真常而計真常故墮邪覺而失正覺又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於自他中起計度者是人墜入四顛倒見一分無常一分常論一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常由此計度一分無常一分常故墮落外道惑菩提性是則名為第三外道一分常論想盡行現研究自他而起邪妄分別首楞嚴定中了一切事究竟堅固方為正覺常與無常分計故成顛倒此與四遍常俱執動元為真常但彼計一切皆常此計自他之中止有一分真常一者在自他處計常無常妙明圓湛離我我所行者於此妄立神我從是計我遍凝不動而諸衆生於中生死遂計自為常計他無常二者計三災及不及處為常無常不觀自心但觀國土三禪以下終為三災所壞名無常種性四禪以上三災不能壞名究竟常三者計自己身心為常無常心性微密難見故如微塵非謂其小也此執微細心性為我我者自在主宰為義故能流轉性無移改却能令此粗蘊色身有生有滅以此粗蘊皆從我心所流出故所流出者名為無常能流出者名為常性四者觀四陰而雙計也計行陰之流者為常色受想之盡者為無常由此下總結四計之誤又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於分位中生計度者是人墜入四有邊論一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊由是計度有邊無邊墮落外道惑菩提性是則名為第四外道立有邊論分位有四謂三際見聞彼我生滅也雙計有邊無邊但名有邊者以有邊非勝法也邊者限際也前四種計真常此計廣大也空生大覺中如海一漚發豈有分位此人但知法性無邊未嘗親見法性遂妄立分位取著一分以為無邊其餘皆謂之有邊故曰四有邊論一者約三際以計有邊無邊生元流用行陰也因遷流計三際過者已滅來者未見名有邊現在相續名無邊此在無邊際中妄立邊際豈知菩提之道無去來者哉二者約見聞以計有邊無邊劫內有見聞處為有邊以限於八萬劫數也劫外無見聞處為無邊無窮極而不可測也三者計彼我為有邊無邊我能遍知一切衆生計我得無邊性但見其人不見其人之性遍計彼性有邊不知我自不見非彼性有邊也四者約生滅以計有邊無邊此人窮此行陰始有而後空先生而後滅據自己識見妄計衆生身中一半屬生一半屬滅遂判生為有邊滅為無邊此四有邊初唯約自二單約他三具自他四重計他一切依正斯則前狹後廣以成其次又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論一者是人觀變化元見遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減於一切時皆亂其語令彼前人遺失章句二者是人諦觀其心互互無處因無得證有人來問唯答一字但言其無除無之餘無所言説三者是人諦觀其心各各有處因有得證有人來問唯答一字但言其是除是之餘無所言説四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰由此計度矯亂虗無墮落外道惑菩提性是則名為第五外道四顛倒性不死矯亂遍計虗論知見生計者據彼定中所知所見而倒計也外道自有四種不死矯亂議論與此不同世尊因此四種人知見立知妄生計度故斥其墜入外道四種生滅行陰分為八義別見謂異見即變恆生滅增減有無也答中略舉六義不能定其道理但兩楹而答令彼前人於章句中不得義理互互無即念念滅也因無得證謂一切法皆無也各各有即念念生也不言有而言是者計法法皆有即隨所問莫不皆是作如是答枝者如木一本而分二枝從二至四於前八中有無分出也有即是無如氷是水也無不是有如水非氷也見有生而忽滅滅而不生者故計有即無無不是有問一者以八義並陳可名矯亂二者單計有無而以一字答何故亦名矯亂答執物而不順理為矯中無主正為亂今觀第一第四言皆兩可亂意為多而終非順理亦兼於矯第三第四言唯一偏矯意為多而終非主正同歸於亂故總名矯亂虗無謂虗妄非實又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於無盡流生計度者是人墜入死後有相發心顛倒或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸由此計度死後有故墮落外道惑菩提性是則名為第六外道立五陰中死後有相心顛倒論無盡流即行陰也由計無盡故計死後有相真悟無生了知生即有滅生前尚空無相何況死後豈可妄計有相耶此後五種與上不死矯亂俱從有無起見但四種矯亂只是虗見此四種竟是邪見四或字乃四計自固身者堅持護養也云色是我者初計我與色一也我體遍圓色為我有二計我大色小色在我中也前緣目前之色也回復者運用也前緣隨我云色屬我三計我與色異也行相續一色也我依行中云我在色四計色大我小我在色中也此以現在之生有推未來之死亦有故曰死後有相色陰既爾受想行皆然故稱十六相不言識陰者行陰未破識不當情耳由計陰與我死後有故轉計煩惱菩提皆後後有染淨並驅不相侵滅計諸陰為煩惱計我體為菩提二法俱有故言兩性並驅言五陰者通結五陰又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於先除滅色受想中生計度者是人墜入死後無相發心顛倒見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性銷散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相從此或計涅槃因果一切皆空徒有名字究竟斷滅由此計度死後無故墮落外道惑菩提性是則名為第七外道立五陰中死後無相心顛倒論此與上計敵體相番變有成無上覩未滅之行陰見其無盡因計前三并萬法皆當無盡此覩已滅之前三見其無相因計行陰并萬法皆當無相形因色有故色滅則形無所因心因想繫故想滅則心無所繫有受則連持色心故無受則無綴三陰既銷縱有行陰亦歸斷滅生理行陰也此約四陰現在因亡未來果滅因果合論成八無相即有而空本自無生前後一際是佛正教前有今無今滅後無是生滅顛倒計上由前三而推行陰同滅為無此轉計諸法皆然涅槃因果依現陰而修後陰而證陰既叵測修證何有惑菩提性者以菩提性不立一塵不捨一法真空妙有非斷滅故又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相又計諸行性遷訛故心發通悟有無俱非虗實失措由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性是則名為第八外道立五陰中死後俱非心顛倒論於行存中者見行陰未滅區宇宛在也兼受想滅者見前三已滅體相全空也雙計有無者於存計有於滅計無也自體相破者以行陰之有破前三之無以前三之無破行陰之有也墜俱非者破無則非無破有則非有也色受想三陰先雖是有而今破盡故云非有例行亦爾四非有也行陰例前為無而現今念念遷流此又非無行既非無前三亦爾四非無也循環四陰而窮盡之成八非相矣隨得一緣者每於一陰計此二非也諸行指萬法上但雙觀已滅未滅之四陰而正計八非此更轉計一切法無不雙非性遷訛者死後有無交相破奪也心發通悟者增廣邪見解也虗實失措者以非無故不可言虗以非有故不可言實也死後俱非者以生存例死後後際即死後盡未來際也昏瞢猶言杳冥無可道者言有不有言無不無不覺不知何可道耶未得真知灼見揣摩倣佛而創為此論若真得見諦者道有道無皆成妙論又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後無生計度者是人墜入七斷滅論或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前銷滅滅已無復由此計度死後斷滅墮落外道惑菩提性是則名為第九外道立五陰中死後斷滅心顛倒論見行陰念念滅處名後後無由是妄計設生人天七處後皆斷滅此與第七死後無相異者彼計現在無故死後亦無此單計死後斷滅為無耳身即欲界人天二處也欲盡初禪也苦盡二禪也極樂三禪也極捨四禪及無色也是名七際現前滅者指因滅也滅已無復生者指果滅也惑菩提性者以菩提性常住不滅故又三摩中諸善男子堅凝正心魔不得便窮生類本觀彼幽清常擾動元於後後有生計度者是人墜入五涅槃論或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟由此計度五現涅槃墮落外道惑菩提性是則名為第十外道立五陰中五現涅槃心顛倒論行陰滅而復生故云後後有前於行陰念念滅處起計此於行陰念念生處起計蓋見行陰念念相續新新成有謂其當有實果必不滅無也此與第六死後有相異者彼計現在有故死後亦有此單計現在即是涅槃或者不定之辭各隨所見而計一處非一人遍計五處也轉依者轉生死依涅槃也觀見圓明生愛慕故妄計之由也蓋以無憂無苦悅隨二亡之故妄計即正轉依也見下界之穢濁遂計五處為勝淨是為五現涅槃以現在受樂不待來生故不知此皆屬有漏非無為果非究竟處惑菩提性者以菩提涅槃尚在遙遠故阿難如是十種禪那狂解皆是行陰用心交互故現斯悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來語於我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見教其身心開覺真義於無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄計皆是狂解是謂心魔十種狂解皆誤認行陰為妙真如性故有此異見第一無因論誤認精覺妙明非因非緣也第二第三遍常及一分常論誤認湛然常住也第四邊無邊論誤認清淨本然周遍法界也後六種誤認如來藏生空有二見如第七死後無及第九斷滅誤認空如來藏也第六死後有及第十現涅槃誤認不空如來藏也第五矯亂第八死後俱非論誤認如來藏離一切相即一切法也心魔者以心見顛倒即是魔故深孽者孽是妖孽即魔孽也枝岐者言此十種如木之枝而非本如路之岐而非正也心祈者心之所求遭枝岐即墮於外道得少為足即墮於二乘標指者如標月之指阿難彼善男子修三摩提行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特迦羅酬業深脈感應懸絶於涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召於十方界已獲其同精色不沉發現幽祕此則名為識陰區宇若於羣召已獲同中銷磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁觀其所由罔象虗無顛倒妄想以為其本行性擾動乃同分生機之綱紐補特酬業之深脈補特伽羅此云數取趣數數取諸趣而受生也受生所以酬答宿業而脈絡深潛乃行陰之所感懸絶者分段生死因亡果息也涅槃性天為五陰所覆昏如長夜前三陰盡如雞初鳴雖為曙兆猶沉二陰精色未分此行陰盡如雞後鳴唯餘一陰故云將大明悟內根外塵化為湛明之境內不見能入之根外不見所入之塵受命元由識陰也今觀識陰既是類生元由不起煩惱不作新業由是執持不令趣果無受生分故云諸類不召遂了十方依正皆識所變同一識體故云已獲其同性天精色雖未明徹而幽祕之相已漸發現此識陰未盡之相幽清擾動與粗重塵影相應向滅六識今滅七識矣同分生機數句與見同生基相應向能見不能破今始破矣內外湛明二句與性入元澄相應向熠熠元性今化為澄水矣深達十方數句與見諸十方十二類生相應向能見不能通其由緒今則受命元由可觀可執矣羣召同中即十二類命元識陰也若於此中以定慧力銷磨六門如氷已銷而無質礙鏡已磨而無垢類使根合而不分界開而不隔則見聞覺知如鄰之相通可以互用而世界身心無復留礙此識陰已盡之相吠琉璃寶名色青體堅刀不能壞火不能鎔唯鬼神有神通者能攻之為器亦云即金翅鳥卵清瑩明徹故借以為喻命濁依識而生識盡則超之識乃妄覺影明元無自體由顛倒起故名罔象虗無妄想阿難當知是善男子窮諸行空於識還元已滅生滅而於寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元若於所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥歸成其伴侶迷佛菩提亡失知見是名第一立所得心成所歸果違遠圓通背涅槃城生外道種窮諸行空照見行陰空也行從識海騰躍轉生行相泯然沒入識海是為還元既空行陰是已滅生滅也尚依識元是寂滅未圓也寂滅即如來藏妙真如性識陰即見精明元也蓋阿賴耶識已近妙真如性但有同別二種妄見故曰未圓不帶纖毫生滅曰精唯餘一味寂常曰妙此而未圓乃識陰未破尚為所覆似一似常未精未妙根隔合開銷六入一也諸類通覺者我及衆生同一覺性如千燈共室光通無二也圓元即識陰也圓表諸類遍含元影萬化托始能入者四陰蕩盡歸宿於斯如諸浪已停消落於海也此定中殊勝之相功用暫得如是若認為真常便立為因能性一切為究竟之處則墮因所因執蓋真因非所有所皆妄也外道立二十五諦計冥諦是常能生諸法正同此計以因有所得果有所歸即因即果皆墮所妄是以違圓通失因地心背涅槃亡果地證前云因地發心須與果位名目相應今立所得心則非以無生滅性為因地心矣故所證之果亦與邪因相應非常住不生滅之果本擬證果為歸寧地種現俱斷今反生起外道種子不但果非真果抑且妄果復成妄因所謂因地不真果招紆曲也阿難又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種上計所此計能執識元為自體而為一切衆生自此流出遂執我能生彼而實不能故曰能非能執摩醯首羅即色頂魔王天妄計我能現起無量衆生亦能非能類能為心能事果者計我能為彼依能成彼事也大慢天即摩醯不能為能名大慢遍圓者計我體圓遍空界也此誤認十方唯識及識性流出無量如來等也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所歸有所歸依自疑身心從彼流出十方虗空咸其生起即於都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷生滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種以識元為所歸疑彼能生我及一切法遂計生起流出之處為真常無生之體此與上執皆從識起而所計不同上謂識即是我能生萬物此謂我從識生彼是真常在生滅中妄計常住既惑真不生性又迷現生滅法以非常為常名常非常執計彼能生我與計自在天能生一切者同由依識元妄計常住故曰立因依心成妄計果前計我圓生物此計彼圓生我名到圓此誤認色身外洎山河虗空大地咸是妙明真心中物也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種所知即所現識陰也謂識有知一切法由知變起因計知體圓遍諸法遂立異解謂無情遍皆有知無所揀擇以無知為知名知無知執婆吒霰尼兩外道號執一切覺謂一切有知也謬計圓知以為因心則果中虗謬矣無知為知曰倒知問萬法唯識是如來正説云何此中皆墜外種答內教萬法唯識從緣變起悉如夢幻不是實生故不立知見不生法執今曰立所得心立依因心立能為心皆是知見立知故總墮外道此與第五俱誤認浮塵及器世間諸變化相應念化成無上知覺也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融根互用中已得隨順便於圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此群塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見是名第五計著崇事迷心從物立妄求因求妄冀果違遠圓通背涅槃城生顛化種識陰盡者銷磨六門諸根互用今未盡才得隨順隨心順意圓融變化如身上出水身下出火等一根暫得圓化於是計一切法皆能圓化發生勝果謂火能顯發光明乃至塵能成就器界遂邪求邪觀勤心崇事執為能生常住之果而實不能名生無生執即三迦葉波諸外道之儔也既迷真心從物求冀因果皆妄顛倒化理名顛化種此誤認七大皆如來藏妙真如性也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓明計明中虗非滅羣化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種觀識性圓明妄計虗無非者毀也非滅羣化者灰心滅智纖毫不立也永滅依即外道之涅槃歸於永滅而不知其非名歸無歸執舜若多此云空無想天中執斷空者以圓虗無為之因心成空亡之斷果名生斷滅種此誤認空與三有一切本無也又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓常固身常住同於精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見是名第七執著命元立固妄因趣長勞果違遠圓通背涅槃城生妄延種圓常精圓皆識元也以精圓常不傾逝欲固保幻身與之並存即此方性命雙修形神俱妙之説也於不可貪處而生貪著名貪非貪執諸阿斯陀即長壽天終歸壞滅空長勞耳此誤認六根為安樂妙常也上著空此與第八俱著有元表諸法統歸融表萬化含蓄明表徹體虗朗常表究竟堅牢各與本文關涉同是識海周遍故皆稱圓識陰似一似常不達似之非真各墮所見而起異執又善男子窮諸行空已滅生滅而於寂滅精妙未圓觀命互通却留塵勞恐其銷盡便於此際坐蓮華宮廣化七珍多增寶媛縱恣其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種以識陰為十二類生之命元今觀見各命由緒皆以識為主彼我互通識陰若盡衆生命盡我亦命盡誰證真常便於定中化諸欲境以留塵勞依此邪思欲證真常名真無真執吒枳迦羅即欲頂自在天類因其邪思感生天魔漸見衆生與己同體欲學菩薩自利利他唯恐煩惱消盡即入涅槃故留惑潤生以為度衆之地與阿難如一衆生未成佛終不於此取泥洹同一願力但菩薩留惑不斷何常廣化多增可謂毫釐有差天淵懸隔此誤認一切變現不為煩惱皆合涅槃清淨妙德也又善男子窮諸行空已滅生滅而於寂滅精妙未圓於命明中分別精粗疏決真偽因果相酬唯求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種前八皆誤入岐路此二則止息化城命明即識也於識陰圓明中忽發小見因此分別苦集是粗是偽滅道是精是真又知苦果酬集因滅果酬道因於是見苦斷集唯求道滅感應既發小見乃背圓融常樂我淨之道無聞僧妄執小道以為究竟又善男子窮諸行空已滅生滅而於寂滅精妙未圓若於圓融清淨覺明登研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種圓融即上文能令己身根隔合開也清淨即六根虗淨無復馳逸也覺明即精色不沉發現幽祕也此正識陰精明湛不搖處若以為深妙立為果證則定性緣覺獨覺之倫而已覺㳷僅與正覺通㳷證識覺之圓明無悲化之妙用故曰不化圓種阿難如是十種禪那中塗成狂因依迷惑於未足中生滿足證皆是識陰用心交互故生斯位衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄聲聞緣覺不成增進汝等存心秉如來道將此法門於我滅後傳示末世普令衆生覺了斯義無令見魔自作沉孽保綏哀救銷息邪緣令其身心入佛知見從始成就不遭岐路中途成狂前八意多未足生證後二意多因依迷惑意兼前後所愛先習無始習氣也今於定中境界相以者投彼病根發其痼疾即欣取因止妄為究竟極證前八通名外道邪魔亦可別指前七外道第八邪魔俱未斷惑故云墮獄二乘異此故云不進總名見魔見以違理為名前八違真中二理後二違中道理總屬邪見以二乘智即無明故如是法門先過去世恆沙劫中微塵如來乘此心開得無上道識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心於中發化如淨琉璃內含寶月如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入於如來妙莊嚴海圓滿菩提歸無所得五陰辨魔法門諸佛乘此心開者每於一陰中未開之時依此辨之不為所惑方得破除也單舉識盡以後該前於圓明精心中發化者以清淨禪那照徹諸位也琉璃喻圓明精心含月喻於中發化超越四十四心直至等覺後心則圓明發化已極妙莊嚴海者具足萬德之果海前稱首楞嚴萬行為妙莊嚴路者趨此而已歸無所得與將為畢竟所歸寧地相應蓋無所得處乃是真歸寧地從前五十種邪境總為有所得故因地法門千佛所同故最初必從五陰次第銷盡乃可謂之因心至於果地修證則根性有利鈍習氣有厚薄各各不一前云從是漸修安立聖位此平常根性分破無明所謂圓漸者也此處一超直入等覺則上根利知頓斷在相無明即證無上菩提所謂圓圓者也或頓或漸原無定局但發軔之途斷不可差耳此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔摧碎大力鬼神褫魄逃逝魑魅魍魎無復出生直至菩提無諸少乏下劣增進於大涅槃心不迷悶若諸末世愚鈍衆生未識禪那不知説法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫於禪堂或帶身上一切諸魔所不能動汝當恭欽十方如來究竟修進最後垂範總結五陰辨魔之端奢摩他中毗婆舍那者即定而慧也覺明分析者謂依定慧觀智分析諸魔以授末學也害定者魔而致魔者實由五陰主人若主人心淨則魔不復出褫音池猶喪也下劣聲聞滯迹化城不趨寶所者由此增進不別修禪次第故云未識禪那未學智慧方便故云不知説法定慧不習而樂安禪魔境現前孰分邪正當勸持呪安其正解防其邪慮即不墮魔是諸如來究竟了義之説又是出世最後時説故云最後垂範阿難即從座起聞佛示誨頂禮欽奉憶持無失於大衆中重復白佛如佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界唯願如來發宣大慈為此大衆清淨心目以為末世一切衆生作將來眼世尊尋常但説五陰托因緣而生未曾説五陰皆本妄想生如色名堅固妄想等首問此五陰何故通名妄想又此二句問斷除頓漸併銷是頓意次第是漸意如是二句問盡其邊際歷觀五陰邪魔皆生於各陰將盡未盡交接處所謂邊際也求佛示我三意令我等心目清明堪為末世之正眼佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明真精妄以發生諸器世間如演若多迷頭認影妄元無因於妄想中立因緣性迷因緣者稱為自然彼虗空性猶實幻生因緣自然皆是衆生妄心計度阿難知妄所起説妄因緣若妄元無説妄因緣元無所有何況不知推自然者是故如來與汝發明五陰本因同是妄想此經凡明起妄先標無妄之真以立其本本覺是發體此體不雜有為曰精不涉諸妄曰真了無形礙曰妙遠離頑昧曰明淨德滿足曰圓永絶染惡曰淨非留死生塵垢本來一法不立也色空因妄想生而即本覺精真之妄以發生也故一切諸法狂癡有如認影妄本無因於妄想中立因緣性妄矣迷因緣者稱為自然更妄矣彼虗空性從清淨覺中一念晦昧而起尚非實有況因緣自然皆是妄想計度生起乃實有耶萬法皆從妄起若此妄者知有所起可説因緣若妄元無誰説因緣因緣尚是妄中建立何況不知是妄推為自然耶所以必斥二計者五陰始從妄想而生雖有恆無終依倒計而住雖無恆有二計不忘五陰牢不可破故如來斥妄想必斥所依之計開卷指人病根在用諸妄想此處將五重妄想一一發明全經大起結汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想父母與汝三想成就而結胎中命根故曰想中傳命酢梅等説驗體因妄結也若非妄倫妄不能感諸妄凝結以成色陰名堅固色陰兼根塵今單言內身若外身何關三想色受想三相依成命而總由一識識動為想我心之想合當生父母之想而成胎則前陰之命轉為後陰之命嗣續不絶所謂想中傳命也妄想盡則生死盡矣即此所説臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想色受想三陰妄想相因而起必不相離故躡前想亦躡前喻汝今現前下受想也順益即樂受違損即苦受臨高空想而酸澀真發違順皆妄而損益現馳則受陰無體虗有所明由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想念慮虗情也色身實質也虗實不倫而能相使者由想融之也心生虗想形取實物心形異用而能相應者由想通之也至於寤寐搖變使心隨境如説酢思崖使境隨心如足酸水出皆融通妄想也化理不住運運密移甲長髮生氣銷容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想行識二陰漸向微細更難覺其為妄故此從形體密移上指點下從種子受熏上指點化理變化之理即行陰以遷流為相曰不住運運者變之又變也密移者密密推移人不覺知也甲長髮生生也氣銷容皺滅也生滅日夜相代而無一人能覺悟者正見其密移也若此下示行陰虗妄也行陰若非汝體何得相代不停若實是汝身何不知覺生滅非汝不可是汝無憑故名幽隱妄想受想行三皆屬心而與色身通貫受能令身領納想能驅使於身行能遷變乎體見身為念倫而非實有又汝精明湛不搖處名恆常者於身不出見聞覺知若實精真不容習妄何因汝等曾於昔年覩一奇物經歷年歲憶忘俱無於後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用開合此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想此識乃第八識精湛不搖似恆常而非恆常真即常也若實精常不容妄習如精金不混沙也今能藏者宛不遺失則湛不搖中受熏容妄何可籌算言其習妄之深湛非真湛幽湛不覺譬無波平流之急水幽湛流注不可測知此憶想之元容妄之體也直須消磨六門使妄習無寄然後可滅也今汝現在六根之中串音貫連綿不斷之意習是習氣幾是幾微此精了湛不搖者元從一念無明而有故似有如無而非真無此識陰所以名顛倒微細精想二乘不知八識認湛不搖處以為妙真如性所不必言即地上菩薩所破止住相無明能除轉現二識猶未離湛不搖中湛不搖中所帶和合之妄為生死根者即生相無明也唯佛能照見而直指之如急流水四句盡情描出此即四纏所分之湛但彼槩指識陰此專指識陰邊際湛入合湛之時伏似無形熏則復起必至六根互用識陰已盡此之妄想方得滅除即佛境界也阿難是五受陰五妄想成汝今欲知因界淺深唯色與空是色邊際唯觸及離是受邊際唯記與忘是想邊際唯滅與生是行邊際湛入合湛歸識邊際此五陰元重疊生起生因識有滅從色除理則頓悟乘悟併銷事非頓除因次第盡我已示汝劫波巾結何所不明再此詢問汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界受以領納為義領納色心諸法五陰皆然故總名受妄想成非真心本有矣二句結前下答詣何為界色陰最淺識陰最深色陰有相為色無相為空受陰取著為觸厭捨為離想陰有念為記無念為忘行陰散心粗行為生定心細行為滅識陰有入為湛無入為合湛若盡色而不盡空盡觸而不盡離盡記而不盡忘盡生而不盡滅盡湛入而不盡合湛猶未出乎色受想行識之邊際也上湛字是功夫下湛字是本體謂以澄湛之功入流旋元與圓湛之體倣佛相合也人知流逸奔塵分汝湛圓為識不知湛入合湛亦是識之邊際以湛了內微細流注未斷故此之不盡暗長潛滋由微而著依舊輪回此五下答頓除漸盡真譬劫波巾識譬初結色譬最後結生因識有者如後結依初結生滅從色除者如解從後結解五陰生起從細至粗由迷真有識有識而後有行乃至有色滅則從粗至細初悟時滅色滅色而後滅受乃至滅識五陰之滅有可頓有不可頓可頓者理也不可頓者事也理無二致人自迷源乘此一悟合併銷盡事有萬殊勢難兼舉從淺至深次第而盡若頓悟而不漸除則有解無行執理迷事終非正修真三摩地汝應下令以此義自覺覺他永斷妄元齊歸正果知有涅槃一聞見之知聞説涅槃為皈依處念念趨之何戀三界如窮子知有故鄉自不久戀異鄉一了悟之知已得涅槃真樂在我何戀三界如窮子既返故鄉豈復追戀異鄉今人口誦三界火宅之文心實耽著不捨不知有涅槃耳正宗大分文終阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度於意云何是人以此施佛因緣得福多不阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充遍皆施珍寶窮劫思議尚不能及是福云何更有邊際佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門於末劫中開示未學是人罪障應念銷滅變其所受地獄苦因成安樂國得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及阿難若有衆生能誦此經能持此呪如我廣説窮劫不盡依我教言如教行道直至菩提無復魔業此下流通分以財施之勝較量法施之尤勝四重殺盜淫妄也十波羅夷即梵網經所説十重罪是極惡因也十方阿鼻是極惡果也一念者暫時發心亦必專心此法門指大定圓通深入之門末劫聖遠魔強之日未學難進易退之人應念消滅即應弘經之念皆得消滅也一念微功便能脫極苦生極樂者由萬法唯心轉迷為悟悟不復迷令聞者信解無謬展轉利樂無有窮盡故能獲福超前輕罪無罪弘經果報殊勝可知若有下勸誦持及依教修行上利他得福此自利成道佛説是經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去此明法會欣慶聖仙童子是居仙趣而修內教希獲童真妙果者發心大力是具神通得無畏回心護教住如來座下者皆大歡喜謂預聞大法隨所證量得大饒益故慶快非常也重刻楞嚴經如説跋世尊所説諸法或山頭滾浪或海底飛塵唯佛與佛乃能究盡淺根小器不可測也獨楞嚴經謂一切事究竟堅固蓋衆生不知常住真心故流轉諸趣若知妄本無因則根塵周遍法界至慶喜悟後請示華屋之門世尊委曲垂慈精詳開示如大長者在逆旅與往來諸子説貧富較苦樂示以本有之業與以無盡之糧各如其量而止佛之大旨不離戒定慧者是古今諸師箋注五十餘家士大夫中譜希聲之韻暢無舌人之語高遠乎平易乎撫掌大笑乎潛心不捨乎不能枚舉周子訥公儒也每詢因果余告以楞嚴經儒佛同歸因果全了遂取伯敬鍾公如説讀之嘆曰善哉怡然獨得悠然各得因願流通謀諸山野相與校閲而增刪之售産重梓猶護如意珠也普願見者聞者空諸塵想共識真心因戒得定因定得慧庶幾一切事究竟堅固乎他年與伯敬先生把臂如來藏中入世出世俱得歸元矣余安用多語哉皇清康熙己未蓮月東塔淨範謹題伏聞楞嚴寶經上可見性成佛次可遠離魔障顯密神功不可思議世出世間悉當頂禮即如杜祈公但知儒書不信釋典從張文定遂讀是經嘆為聖書悔其見晚王介甫生平強拗豈識圓通晚年屏居鍾山與潘興嗣談禪自悔從前舛謬爰作是經注解始迷終悟不可殫述德最愚陋妄擬逃禪首祈薦先兼圖自轍初閲是經猶如望洋幸得伯敬鍾公如説心悅手録請正為則大師示云是本天如師會解一雨師合轍可謂青出於藍豈非後來居上但多魚魯之誤所以流通不廣欲廣流通必須訂字若義未精慎簡諸注僅可刪易不可妄增寧或闕略不宜煩冗勿列其師如出一口蓋謂助佛宣化無取分別因經闡教務期簡亮德承開示代為操筆每成一卷即請鑒定與衆共梓願入大藏是皆鍾公善集為師妙裁先達標指諸賢贊修得成暗室慧燈迷津寶筏德僅管窺不贊一辭聊述訂梓本末專冀寶典流通仗佛慈光遍照濁水普祈善根因經證果康熙己未蓮月擕李弟子周真德謹識
