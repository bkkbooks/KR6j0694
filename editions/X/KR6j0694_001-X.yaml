body:
  text: 如來果體其體本然何假密因菩薩道用其用無作孰為萬行無因無行無修無證無了不了大小名相一切不立此真首楞嚴畢竟堅固者也特以眾生如來隱於藏心非密因不顯眾生菩薩淪於七趣非萬行不修覺皇於是示之以大法使不迷於小道而默得乎無外之體喻之以佛頂使不滯於相見而妙極乎無上之致指如來密因使明本妙心知三世諸佛皆依此為初因明修證了義使悟究竟法知一切聖人皆依此而證果乃至具足菩薩清淨萬行一切事法無不究竟至於實相堅固不壞故名大佛頂如來密因修證了義諸菩薩萬行首楞嚴經此經始於無見頂相放光說呪如來首標有三摩提名大佛頂是指菩提涅槃元清淨體如來藏心言也由此心體含吐十虗彌綸萬有五目不能覩其形四辯莫能談其狀唯我大覺覩明星時開佛知見直覰其頂故名此法為最尊之頂法也如來密因修證了義者顯此法所以為大佛頂也不變名如隨緣為來小乘如而不來凡夫來而不如唯我大覺亦如亦來故名如來獨知獨見之謂密出生聖果之謂因謂大覺依此頂法為因而興萬行也練磨治習之謂修忘心默契之謂證謂大覺依此頂法而斷惑證真也無不究盡之謂了不落言思之謂義謂大覺為此第一義諦大事因緣出現於世今已究盡無餘故曰了義也良以眾生業識茫茫全無知覺流轉生死無有了期小乘坐守化城耽寂滅樂自止中途亦未能了即使菩薩至等覺位前程有路未至圓極終是不了唯是大覺障盡惑空因窮果滿能事已畢更無餘事一義皆了更無餘義方始得了成無上覺諸菩薩萬行首楞嚴者謂從乾慧以至等覺皆以此頂法為因而修六度分斷無明分證真理上歷菩薩聖位故能步步踏佛階梯事事得成堅固如是我聞一時佛在室羅筏城祇桓精舍與大比丘眾千二百五十人俱皆是無漏大阿羅漢佛子住持善超諸有能於國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫眾生拔濟未來越諸塵累其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓那彌多羅尼子須菩提優波尼沙陀等而為上首如是經教我從佛聞一時猶云彼時佛在某處與某等俱云何問答乃至信受奉行結集通例也比丘曰大簡小千二百五十人常隨之眾漏有三謂欲漏有漏無明漏無此三種滲漏曰無漏阿羅漢聲聞極果諸菩薩內祕大行外示聲聞故以大名之而具列其行堪紹佛法曰佛子住法王家護持法輪曰住持超者不為所縛不離三界而能超曰善超諸有謂欲有色有無色有總指三界受生處威儀軌則也具足威儀能自成就亦成就人有戒行意在內轉輪佛法能摧破惑障運出生死之喻雖受遺囑實忘彼我能所之相說法如幻度生同空故稱妙堪毗尼戒律也在身曰嚴在心曰淨六卷之四清淨明誨七卷之安立道場總攝於此見善超諸有及弘範三界數句皆以此為根本此經以戒為重也舍利此云鶖鳥母名弗即子也連母為名智慧第一目犍連姓也名拘律陀神通第一拘絺羅即長爪梵志博學第一富樓那此云滿父名彌多羅尼此云慈母名連父母名故云滿慈子說法第一須菩提此云空生亦名善現解空第一優波尼沙陀此云塵性空于六塵中悟色性故法華言授記成佛却從二乘說來而卒歸於一乘故開經嘆德先言聲聞而後及於菩薩楞嚴言最初方便揀却二乘聲聞緣覺直斥之為錯亂修習列於十種邪見之末葢楞嚴終始止談上乘不及其餘故嘆德處直從無漏大阿羅漢說起已是極頂之談舍利弗等六人俱列圓通二十五聖之中開卷明揭圓通作一榜樣復有無量辟支無學并其初心同來佛所屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷座宴安為諸會中宣示深奧法筵清眾得未曾有迦陵仙音徧十方界恆沙菩薩來聚道場文殊師利而為上首辟支此云獨覺亦云緣覺其根比聲聞稍利以能侵斷習氣故無學即真窮惑盡者初心即研真斷惑者比丘當初夏時即結制禁足安居不令乞食名休夏自恣期滿解制之日七月十四十五十六日也自知有過恣其自陳自不知過恣任僧舉正是嚴淨毗尼之義益顯戒為重矣將求密義言所以欽承者不獨求決通疑滯且欲求密修密證之了義即時下順機說法也迦陵仙禽也其音微妙佛音如之徧界之音如目犍連逞其神通極西方恆沙世界聽佛音聲猶如對面時波斯匿王為其父王諱日營齋請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齋主佛敕四句明是方行等慈開闡無遮念頭行徑唯有阿難先受別請遠遊未還不遑僧次既無上座及阿闍黎途中獨歸其日無供即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齋主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切眾生無量功德阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗經彼城隍徐步郭門嚴整威儀肅恭齋法爾時阿難因乞食次經歷婬室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入婬席婬躬撫摩將毀戒體此誤墮之由也阿難不隨如來應王者之供則不及上座倫次不與大眾應諸齋主之家則不及阿闍黎倫次阿闍黎此云軌範師能糾正弟子者剎利王族旃陀羅婬酒屠殺之類心中初求至無量功德是阿難發心最好處後云五濁惡世誓先入與心中初求一段同一念頭但此時在緣心中茫無主持後悟真心已具資糧前後見地力量不能強同須菩提舍貧從富為其易施大迦葉舍富從貧為彼植因二人地步儘高阿難以佛訶其心不均平欲求無遮此大願力也竟緣此遭摩登伽之難以求無遮故誤墮以誤墮故卒得大定畢竟是願力所至而機緣亦妙心未融化不能事事無礙者可入淨而不可入穢可入佛而不可入魔如來知彼婬術所加齋畢旋歸王及大臣長者居士俱來隨佛願聞法要於時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪敕文殊師利將呪往護惡呪消滅提獎阿難及摩登伽歸來佛所無善不具故曰百寶無惡不摧故曰無畏本佛示默而化佛說者意表佛法本然無說無示以無相現相無說示說一真湛寂萬化冥通提獎阿難及摩登伽一見世尊慈力普度一見眾生皆有佛性阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啟請十方如來得成菩提妙奢摩他三摩禪那最初方便於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨上文將毀戒體乃登伽欲毀之若阿難自有本領見佛之時非以戒體將毀而後頂禮悲泣正以行人到此猶不能免惡境相惱即是道方未全故怨艾悲悔而求大定阿難自恨多聞不免誤墮不知多聞之病從耳根起下即選耳根為最初方便葢以循聲流轉而成其病則使倒聞旋機以復其湛藥病相因自是妙手菩提是果海之終妙奢摩他三摩禪那是因乃菩提路之中間最初方便是因中先務即發菩提之始下文應以終始地位中間永無委曲相者明皆常住真心無生法忍為因地心也後文單說三摩者直以三摩為大定也單舉奢摩他者例亦如是葢奢摩他等三在此經為定之總名殊勝之定也冠以妙字乃妙奢摩他妙三摩妙禪那也妙則舉一即三矣佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難白佛我見如來三十二相勝妙殊絕形體映徹猶如瑠璃常自思惟此相非是欲愛所生何以故欲氣麤濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落佛言善哉見何勝相見字便含下文指點見性之意不然只當云以何因緣頓捨世間云云矣見相發心亦無大過佛曰善哉尚未深求阿難差處不在此段世尊此處不過借一問頭徵彼心之所在而已阿難汝等當知一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉初發常住真心妄想二種全經大旨揭于此矣阿難慕佛妙定而此妙定非識心所修必令先悟此識非心別尋真心故下文由淺入深漸次開示自此至三卷末總是破妄顯真然有畢竟破如說鍮石非金破盡不用也有不畢竟破如說鑛中有沙欲其銷出真金因顯而破也經中於識全破其妄於根多顯其真少破其妄於陰入處界一一破妄顯真於七大全顯其真妄想有三種非真眾生因之以成三重迷執一者本非是心而似是心故迷執以為是心二者本非有體而似有體故迷執以為有體三者本非有處而似有處故迷執以為有處今不直破非心無體先奪其所執心處令其一一審察顯其了無住處欲彼自覺其妄必待七處情盡終不自悟然後訶其非心明其無體汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相自始至終中間永無諸委曲相者言由不生滅因取不生滅果直證菩提不歷外道小乘諸境也阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死此承見相發心出心目二字以為談經之柄阿難直云由目觀見全是眾生知見下文重重開示不過翻眾生知見為佛知見耳佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在唯心與目今何所在所謂徵心也下更無如是徵辭何云七徵若云七番破處則可耳國王為賊所侵發兵討除要當知賊所在之譬莫輕看過下文七處破心所在正窮追之使賊無所容也明言使汝輪轉心目為咎故問唯心與目今何所在則如來所徵之心乃賊也非心也妄心也非真心也阿難若知妄心為賊自然答以不知所在而直請真心矣唯其受用妄心極力護庇見如來指之為賊口雖不言心却不信歷指七處所在若云既有所在豈可遽謂之賊乎觀後阿難云行諸一切難行法事皆用此心又云我悟佛所說法者現以緣心𠃔所瞻仰則曲護妄心認賊為子之本情乃始招出佛歷言無有是處而後直斥云此非汝心言此心之為賊而非子不必求其所在也若常住真心則在七處可不在七處亦可無在無不在亦可阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵祇在我面如是識心實居身內心在身內乃一切眾生尋常所執所謂昏擾擾相以為心性一迷為心決定惑為色身之內是也餘六因佛一時破奪逼成轉計耳佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外阿難汝今堂中先何所見世尊我在堂中先見如來次觀大眾如是外望方矚林園就眼前景定內外境先後見伏下案世尊七處多以見發難端亦含見性是心非眼意阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見爾時世尊在大眾中舒金色臂摩阿難頂告示阿難及諸大眾有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨阿難啟請大定佛先破其緣心首次破心問答未竟急示以有三摩提云云葢以鎮定其乍復之魂安慰其初問之意如窮子見父先告以家寶使預知衣食有地驚定氣平徐徐推問以終七破之文後詳大定一門超出妙莊嚴路與後一門深入相應一門深入因也即最初方便一門超出即真菩提妙莊嚴海佛之極果也由大定趨入故謂路佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有眾生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有眾生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脈搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無有是處頗猶可問以決其不能也心肝脾胃深處也爪生髮長筋轉脈搖較淺亦膚中生處總屬在內一破心不在內也只此一破聞者即當驚悟絕倒試檢世典有說心不在內者乎真獅子吼也阿難稽首而白佛言我聞如來如是法音悟知我心實居身外所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切眾生不見身中獨見身外亦如燈光居在室外不能照室是義必明將無所惑同佛了義得無妄耶奪內執外常情皆然燈光之喻躡前心在身內必知內身譬燈光在室乃能照室今在室外喻心在身外不能見內佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齋汝觀比丘一人食時諸人飽不阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令眾飽佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處彼食不能飽此外心焉能知身二破心不在外也汝眼見時心分別不亦含是心非眼意阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃椀合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故因不見內而能見外思忖此心伏在眼根眼根不礙心見猶瑠璃不礙眼見也佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處琉璃籠眼眼見琉璃眼根籠心心不見眼設許見眼眼乃成境夫境豈復能見境乎汝言彼根隨見隨即分別義不成也三破心不在根也阿難白佛言世尊我今又作如是思惟是眾生身腑臟在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何由有竅則明故開眼見明由有藏則暗故合眼見暗見明即名見外不必責其身心相外見暗即名見內不必見心肝脾胃等雖內外並列乃借見外形見內仍歸最初在內之執故佛唯破在內佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若不對者云何成見焦腑三焦臟腑也暗在眼前前豈成內若即暗為內則眼前暗室可稱焦腑豈理也哉若此暗相不與眼對則應此眼不與暗合云何眼前又見黑暗如是則眼與暗對與不對皆不成內若離外見內對所成合眼見暗名為身中開眼見明何不見面若不見面內對不成見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛是故應知汝言見暗名見內者無有是處眼前之境名外身內之境名內前以對眼為外不得成內今縱離外而成內對是眼能返觀矣合能返觀身中則開應返觀己面若不爾者義不成也見面若成則能見者乃在虗空在空則離體矣若復執為自體則如來亦離汝體而見汝面將亦是汝身乎不許佛身是汝汝之心眼亦非是汝汝眼在空空中已知身合非覺若執兩皆有知則汝一身應有二知一在虗空一在汝身今日為兩阿難他日應成兩佛矣展轉辨明無返觀理見暗不得為見內也四破心不在內也阿難言我常聞佛開示四眾由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處由心生故種種法生法不自生也由法生故種種心生心不自生也謂互倚妄現俱無生體心法皆空也阿難引之以證心隨合隨有者隨其攀緣何法即心在之處也中間即前根裏阿難非謂心必有體正謂心無體而能合合即心之所在下辨有合必有體無體則不能合無合則無所在佛告阿難汝今說言由法生故種種心生隨所合處心隨有者是心無體則無所合若無有體而能合者則十九界因七塵合是義不然若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面合者如葢合函必彼此有體然後可合今汝思惟之心元是浮想實無自體則無合處世間祇有十八界六塵十九與七特空名耳空不可合故曰是義不然唯其心必有體方能合也心若有體當何所在令挃身而騐不見身中不從內出也不先見面不從外入也是心畢竟無體豈隨合隨有乎隨合隨有奔逸昏擾乃猶認作真心曲盡世人迷態阿難言見是其眼心知非眼為見非義佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死上並以心不見處說心不在故辯云見是眼知非眼責之以見非義也豈知能見在心徒眼不見不但能知者非眼即能見者亦非眼若眼能見即如門有竅穴亦應有見何故不能且觀諸已死可驗徒眼不能見見必屬於心矣亦含是心非眼意阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復徧體為不徧體若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若徧體者同前所挃若不徧者當汝觸頭亦觸其足頭有所覺足應無知今汝不然是故應知隨所合處心則隨有無有是處當知心體非一非多非徧不徧則知心無定體安得有合五破心不隨合也阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間世尊所言不在內外正言心無定在非謂心在中間也阿難復執為中不知纔喚作中即有定在故下審其在身在境也以為在內則不見腑臟以為在外則身不相知二義不成當在根境之中佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身若在身者在邊非中在中同內若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂先審定中間在身在境而後兩破其中俱無定在若在身下謂在身有中邊二義在邊不得為中在中同前在內應當見內若在處下謂在處有表不表二義標物以顯中曰表謂無表則無中表則中無定在今表體尚無定則心寧有一定之中阿難言我所說中非此二種如世尊言眼色為緣生於眼識眼有分別色塵無知識生其中則為心在佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中兼二不成非知不知即無體性中何為相是故應知當在中間無有見處阿難所引是佛隨順世諦之談求奢摩他而仍執之是多聞人循名昧義之狀眼有分別有知屬內色塵無知屬外內外相對識在中間指心在之處兼二者雙挾根塵而生其中也不兼二者兩離根塵而孤然中立也物指色塵體指眼根若言兼二物與體雜亂矣何也物非若體之有知云何得半有知半無知兼根塵而生其中耶是兼二不成也不兼根非知矣不兼塵非不知矣非知非不知心尚無有將何所指而為在中之相耶阿難執言眼有分別故從其所執破之六破心不在中間也阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不一切無著名之為心阿難自釋非佛本旨葢三不在即無著而以無著名心又著於無著矣佛之徵處固顯無處佛顯無處令悟無體今以無著為心是雖無處而執有體故尚煩破佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同於龜毛兔角云何不著有不著者不可名無無相則無非無則相相有則在云何無著是故應知一切無著名覺知心無有是處為在為無徵心體也無相則無非無則相相字即體字相有則在在即著也一切物象心不著者有而不著耶無而不著耶無則以何者為不著有不著則非無矣非無則有有則必著云何無著七破心之無著也七番確定成處者四一內二外三根裏六根塵之中四亦內五無定處七併處亦無夫此緣心因緣而生本自無體故謂之妄無體則無處矣七破顯其了無住處下方明其無體是妄非真七徵之處堅銳難攻者在乎首尾葢在內久為世人所守無著又為學佛初機所宗也爾時阿難在大眾中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺於婬舍當由不知真際所詣唯願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大眾傾渴翹佇欽聞示誨阿難初咎多聞此明其咎不在多聞而在不知真際所詣詣字與路字相應闡提云信不具彌戾車云惡見不信自己有大佛頂首楞嚴王而向外馳求皆惡見也得此路詣此際方能生信壞惡見爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽佛光全是心量所放其光晃耀至末明明將一為無量無量為一大中現小小中現大不動道場徧十方界身含十方無盡虗空於一毛端見寶王剎和盤托出不與他說且與他看從其面門示六根聞見即菩提路也遇宗門明眼人便直下領當矣佛告阿難一切眾生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煑沙欲成嘉饌縱經塵劫終不能得云何二種阿難一者無始生死根本則汝今者與諸眾生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸眾生遺此本明雖終日行而不自覺枉入諸趣此下將前性淨明體用諸妄想復開二種根本為一經之宗也心知眼見是顛倒本下文若干顛倒皆由此中發出迷此覺心忽起無明轉成業識造種種業熏成種子名為業種種必有果子子相生則輪轉生死無有斷絕故惑業苦生必同條如惡叉果惡叉毒樹生子必三同一蒂下文別業同業循業發業皆從業種流出此為廣明七趣之張本聲聞緣覺背大心而證小果者外道外正道而趣邪道者諸天修十善而欣樂果者魔羅耽欲境而亂正修者此等皆由不識真妄二途認沙為米盲修瞎鍊故至如此此為詳辯魔境之張本生死根本即根本無明也此生死本即汝現今用東攀西緣以為自性者即是別成聲聞緣覺天魔外道七趣之根本也菩提涅槃覺果也元清淨體因心也此清淨體即汝現前第八微細精想名為識精本來具足元明根身器界一切緣法依此而生而人認緣失真故曰緣所遺者由遺此故無明不覺枉入諸趣用攀緣心遺此本明一用一遺即顛倒之實識精元明取識精內本來妙明之體非即以識精為元清淨體也專言識精便是阿黎耶識專言精明猶是識陰邊際故加一元字見非因明立所之明阿難初請大定佛說皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉開出兩條生滅不生滅大路夫常住真心即如來藏妙真如性及七處破心妄想已伏緣心欲逃何不直指真心使歸如來藏性而以識精元明為不生滅心耶非唯阿難緣心未捨真心卒難舉似亦謂識精屬第八真中帶妄為生死根故拈出以教初學修習旋妄伏真得元明覺為因地心張本葢曰精曰元明與如來藏性無異唯一落識中故不直曰精而曰識精識去精存則全體如來藏性矣下手功夫全在四卷以後旋妄伏真入流亡所等處阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳耀我心目佛言汝將誰見阿難言我與大眾同將眼見佛告阿難汝今答我如來屈指為光明拳耀汝心目汝目可見以何為心當我拳耀阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心佛言咄阿難此非汝心阿難矍然避座合掌起立白佛此非我心當名何等佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉奢摩他路問答意別阿難以求知心處為路如來則以了此妄識無體無處別覓真心為路也能推之心所謂攀緣心也前七破破處此非汝心直破心矣阿難既聞非心索要本名前塵虗妄相想指本名以答也前塵者現前所對六塵虗妄相想者此想必帶塵相乃虗妄暫現耳豈有實體哉認賊為子者非心而錯認為心也失元常者不認取真心也既認賊為子更不覓真子矣阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至徧歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大眾無大疑惑惟垂大悲開示未悟此戀妄不捨而驚疑也歷敘平生作善作惡許多功能皆用此心除此心外更無有心即成斷滅而同土木無知之物殊不知作善作惡是屬發業無明名曰妄想不思善不思惡是本來面目也爾時世尊開示阿難及諸大眾欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生唯心所現一切因果世界微塵因心成體阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體若汝執恡分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽閒猶為法塵分別影事我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅其誰修證無生法忍即時阿難與諸大眾默然自失佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果首示真心有體以釋無心土木之疑心入無生法忍悟實相不生滅心也華嚴等覺後方名無生忍此經未入十信即獲無生忍所謂理須頓悟也忍非著力之謂是如如不動矣三界唯心萬法唯識故曰諸所法生唯心所現一切三句申諸法二句縷結絲麻之類舉小況大虗空二字即名豁虗無礙為貌舉無體況有體性一切心者即常住真心也所現之物尚皆有體豈能現之心反無體乎若汝下令阿難揣摩能推是妄去其戀妄之心執而不捨曰執恡汝執分別覺了為心即應離塵有體則可因聲分別則托塵始有耳不但汝有六識現行分別不得為真縱汝將六識現行種子一切滅盡若使內守幽閒耽寂滅樂不肯放捨即此守幽閒者尚屬意根猶為影事亦不為真我非四句暫縱之辭非顯真也六塵如形分別如影影由形有故無自體心因塵有豈有體耶默然自失平日恃為心者一旦奪破又未審何者為心如人失其所寶四禪四空及滅受想名九定此內守幽閒之極功猶為法塵影事故不成聖果執妄想為真實非但指外道六識攀緣者言并二乘認識精為元明而業識未破亦在其中破妄已竟自此至三科七大乃顯示所遺真性令見如來藏體阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性唯願如來哀愍窮露發妙明心開我道眼重復悲淚悟深而後發悲二障煩惱所知也煩惱障事即我執也所知障理即法執也發妙明心者言我雖有妙心一向隱覆誤認能推為真實不知別有涅槃妙心願佛發其覆而出之開我道眼者言我雖有道眼一向蒙蔽但認肉眼為能見不知別有正法眼藏願佛刮其胸而開之即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周徧徧灌十方所有寶剎諸如來頂旋至阿難及諸大眾告阿難言吾今為汝建大法幢亦令十方一切眾生獲妙微密性淨明心得清淨眼前度放光表破妄之相此處放光表顯真之相卍音漫如來胸前萬德吉祥紋從卍字放光者表由寶明妙心發正知見也光徧佛界者示清淨本然也徧灌佛頂者表極果所同也旋及大眾者示群靈共有也此即妙心道眼之真光在聖不增在凡不減但隨量應現耳建法幢者有摧邪樹正之義心眼二字應阿難所乞心眼獲字應上發字得字應上開字妙微密性淨明心承上妙明心三字而加詳耳猶云至妙至妙至密本來淨明之心也阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試於途詢問盲人汝何所見彼諸盲人必來答汝我今眼前唯見黑暗更無他矚以是義觀前塵自暗見何虧損須彌山南有檀樹汁流入水成金此金一粒置常金中悉皆無色佛身金色如之絕音逸赤𦦨也手外無拳故手無拳滅眼見各體故眼滅見存汝將誰見四字世尊三問矣初云將何所見阿難答言由目觀見次云汝將誰見阿難答以同將眼見可謂孤負婆心矣世尊不即破者因阿難妄執方堅未可驟語故初番且窮其妄心所在二番且破其妄心無體至此阿難悲悔捨妄求真然後重理前語以汝將誰見喚醒之阿難不悟仍執眼觀於是詳辯點出是心非眼從前公案一語了結阿難言諸盲眼前唯覩黑暗云何成見佛告阿難諸盲無眼唯觀黑暗與有眼人處於暗室二黑有別為無有別如是世尊此暗中人與彼群盲二黑較量曾無有異阿難若無眼人全見前黑忽得眼光還於前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼阿難雖復得聞是言與諸大眾口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨盲人得眼而見若名眼見暗人得燈而見應名燈見知燈不名見則知見不屬眼矣前呵眼識非心此指見性是心見性與眼識何別照色之時一如鏡中無別分析即是見性起念分別即屬於識是言者是心非眼之言也向但知見唯是眼不名為心今觀無眼得眼有眼得燈皆但顯色始知見乃是心而此見精離彼肉眼別有自體異於前心離塵無體矣心未開悟者雖知能見在心不悟此心是真是妄若曰是真有似潛根前已被破若曰是妄佛已許獲妙微密性淨明心得清淨眼爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大眾我初成道於鹿園中為阿若多五比丘等及汝四眾言一切眾生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果時憍陳那起立白佛我今長老於大眾中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食宿食事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義佛言如是佛手細軟如綿交光相羅如網指有千輻輪文阿若多此云已知即憍陳那之名客塵喻見思生滅主空喻真心寂然見聞中有動靜者屬客塵所以為妄即前生死根本是也見聞中無動靜者是主空所以為真即前菩提涅槃元清淨體是也即時如來於大眾中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌眾中開合佛告阿難汝見我手眾中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手眾中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是不住無住即動也尚無有靜者靜必因動而顯原不曾動今亦無靜動靜雙離乃自性之本定非由攝伏而得既知佛手開合與見性無干則一切萬相任其昏亂動止皆與見性無干矣若人於萬相中悟此不動之性常恆不昧何至為境所轉如來於是從輪掌中飛一寶光在阿難右即時阿難迴首右盼又放一光在阿難左阿難又則迴首左盼佛告阿難汝頭今日因何搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盼佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是外境動而見性不動人猶易知自頭動而見性不動人實難辨阿難因上說見不屬眼已覺此見離眼獨立湛然滿前自試頭之動搖何干於見是以直答頭動而見不動也既知頭動而見不動凡此身行住坐臥往來世界及死此生彼此性常如虗空無所動矣世尊欲阿難知真心所在阿難重重迷悶若在世典中憤悱之極當代為啟發世尊雖反覆開引却不全為舉似待其自為托出而以佛言如是證之所謂衣珠自覓也於是如來普告大眾若復眾生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪迴是中自取流轉動搖開合客也塵也見無動也汝今既知動為身動為境便合了悟身境全是客塵不應隨逐而失主空也始終者遠則無始為始今生為終近則生為始死為終顛倒非惟世間事業種種修行皆名顛倒以其動執身境靜依法塵依法塵者還同身境不知本有不動之真性是中者身境之中也此卷阿難多聞示墮婬室啟請菩提道果修因最初方便佛首揭眾生不知常住真心用諸妄想故有輪轉大旨具矣次就見相發心一事詰其愛樂由於心目徵心目所在而反覆破之至七處都無所在見阿難所認之心緣境暫有無處無體謂之影事謂之妄想不當隨逐之也心緣目故帶之唯破心不破目緣心六根俱有舉一例餘因聲分別亦就耳根說矣阿難既知妄想不真遂求寂常心性佛舉拳為喻謂手無拳滅眼滅見存其義不同葢於眼根中指出見性使認常性真心也阿難尚疑盲眼觀暗云何成見猶以見專屬眼豈知眼特能顯色耳見性是心非眼乎猶未開悟乃舉鹿園問答表客塵之義觀佛手開合阿難見性無開合阿難頭自動搖見性不動搖開合動搖者客塵耳不開合動搖者非常住真心乎何認妄遺真自取輪迴耶通卷大意如此
