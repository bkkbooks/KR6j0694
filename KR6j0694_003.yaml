body:
  text: 復次阿難云何六入本如來藏妙真如性此下顯如來藏不離六根也入即根照下吸字能吸入所對之塵也阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入是故當知眼入虗妄本非因緣非自然性曰即彼者承前色陰中喻說也空華固目睛瞪發之勞相此目與勞相又同是菩提之瞪發菩提即真如瞪乃真如中所生無明勞即業識前喻以瞪為勞相目為淨相此并淨目亦為勞相兼目與勞即影見俱眚見與見緣也因於明暗三句即後文粘湛發見也吸此塵象二句即見精映色結色成根也根攬塵而得名離塵畢竟無體根出為正計明暗空生防轉計也無有實體故虗無所從來故妄無有實體者以其體即真如不從三處者以其出自藏性從真起妄妄元無體全體即真一節大意如此餘五例知前取根性離塵有體異彼緣心今曰無體者前因不見真心乃就根中指性令識真心所以表離塵有體之真今已領真性尚執六根別有體相水融一性所以破離塵無體之妄前顯性而此破相所以異耳離相即妙真如性則同為顯性矣以見性對緣心則緣心為妄以如來藏對見性則見性亦帶妄妄無自體總歸於真阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入是故當知耳入虗妄本非因緣非自然性動即有聲靜即無聲此唯有聞成性即非虗空與歸當見根之文小異餘並準上瞪乃眼之妄相而耳鼻舌身意皆借用之觀音證圓通時發軔工夫亦從是聞非動靜來非於根出畢竟在甚麼處如是思惟如是修習得入此門阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相因於通塞二種妄塵發聞居中吸此塵象名齅聞性此聞離彼通塞二塵畢竟無體當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入是故當知鼻入虗妄本非因緣非自然性畜縮氣也冷因畜有不畜本無鼻入之妄類如是矣虗實亦通塞之義故惟以通塞致辨香臭又通時所齅阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體如是阿難當知如是甞苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜即知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入是故當知舌入虗妄本非因緣非自然性䑛以舌取味也熟䑛令勞甚言取著之狀甜苦動味也淡靜味也三味約動靜二塵阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入是故當知身入虗妄本非因緣非自然性觸有合觸有離觸然無合不能顯離必因冷熱相渉時覺其為合然後兩不相涉時知其為離故曰以此合覺之觸顯於離知合離二覺皆因涉顯然涉勢因何而成只因兩手相摩之勞相而已阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪發勞相因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入是故當知意入虗妄本非因緣非自然性入根惟一眼但名見耳但名聞塵皆分二色分明暗聲分動靜則意當名知法當分生滅今寤寐憶忘生住異滅參互成文實惟生滅二義眠寤亦假設以例憶忘憶之則生忘之則滅所謂二種妄塵也住異即生滅中細相顛倒首尾循環之意吸習此相中歸意根前滅後起剎那不停次第相續曰不相踰越五根流逸奔塵意乃旋其見聞逆流而緣五塵所謂吸撮內塵也流至於此雖有見聞之相然此見聞乃所謂集知居中却非見聞用力所及故名覺知性不名見聞也復次阿難云何十二處本如來藏妙真如性六根六塵名十二處處者方所也又定在也眼對色耳對聲一內一外似有方所定在下反覆顯其無方所定在融歸一性阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性汝說一切法仗因緣而生即今開眼見祇陀林還是因祇陀林生汝眼中之見見祇陀林乎抑亦因汝眼中之見生祇陀林而汝得見之乎若謂汝眼根生祇陀林而汝得見者則汝眼根見空之時不見祇林而祇林便應銷滅若所生之色性既銷則能生之見性亦滅更有何物顯其空質若謂祇陀林生汝眼見而令汝見祇陀林者則汝眼觀空時非是觀色既無所生之色自無能生之見見既銷亡而見空見色者更是何物眼不生色色無處所也色不生眼見無處所也虗妄無體也無處則無體無體而以真如為體阿難汝更聽此祇陀園中食辦擊皷眾集撞鐘鐘皷音聲前後相續於意云何此等為是聲來耳邊耳往聲處阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞皷聲其耳已往擊皷之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性前我字喻聲城喻阿難耳祇園喻目連迦葉耳一聲豈能徧至多耳破聲來耳邊後我字喻耳祇園喻擊皷處城喻擊鐘處一耳豈能徧往多聲破耳往聲邊若謂聲來阿難耳邊則應餘人耳邊悉皆無聲不合諸人齊聽若謂耳往皷處則鐘處無耳不合更聞鐘聲故知聲塵生滅動靜皆空聲不至於耳根根不往於聲處既無往來則心境俱虗能聞與所聞畢竟從何出乎阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中阿難若復此味生於汝舌在汝口中祇有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺醎必無所知云何名味是故當知味舌與嘗俱無處所即甞與味二俱虗妄本非因緣非自然性若謂此味生於汝舌則汝一舌應知一味不應變移更知別味若不變移而獨知一味則不名知味若變移而知別味云何一舌而知多味是則不生於舌明矣若謂此味生於食中食非有識云何自知為甜為苦縱使食能自知甜苦此食即同他人無與於汝何故稱汝名知味者是則不生於食明矣若謂此味生於空中汝噉虗空作何滋味若作鹹味則此界人受其鹹味皆同海魚既常受鹹必不識淡若不識淡必不識鹹既兩不相識不可名知味之人是則不生於空明矣阿難汝又齅此鑪中栴檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生栴檀木生於汝鼻為生於空阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非栴檀云何鼻中有栴檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒香應常在何藉鑪中爇此枯木若生於木則此香質因爇成煙若鼻得聞合蒙煙氣其煙騰空未及遙遠四十里內云何已聞是故當知香鼻與聞俱無處所即齅與香二處虗妄本非因緣非自然性若謂此香是鼻所生則此香氣當從鼻出鼻非栴檀云何鼻中有栴檀氣稱鼻聞香當是香氣入鼻方可稱聞豈有鼻中出香而說為聞香耶若謂此香生於空者空常在香亦常存何藉鑪中爇而後有若生於木則此香氣因爇成煙而鼻得聞合當蒙其煙氣其煙未遠四十里內未及蒙煙云何已聞則知香性本來周徧何待合知哉阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性汝當以手摩頭時則手知有頭頭知有手是誰為能觸而生此知為手觸頭即手為能觸而生此知乎為頭觸手即頭為能觸而生此知乎若以手為能觸而生此知則觸知在手頭成無知之物云何知手之觸頭而成觸乎若以頭為能觸而生此知則觸知在頭手成無用之物云何知頭之觸手而名觸乎若頭與手各有一知則汝阿難應有二身若頭與手只有一知則手與頭應成一體若一體者不應成觸若二體者此觸當何所屬為屬能觸為屬所觸若觸為能則在手在頭俱成能觸而無所觸豈虗空與汝成所觸乎若觸屬所則在手在頭皆成所觸而無能觸豈虗空與汝成能觸乎觸因根境能所相感而獨依根明者示萬法一體由妄分能所故有妄觸非所非能言皆無實處阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷煖及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立是故當知法則與心俱無處所則意與法二俱處妄本非因緣非自然性善惡無記總謂內塵意緣此三生成法則名為法塵法塵非相因意知顯故問為知非知異汝從離字生心既異於汝且又非塵豈不同他人心量乎若即汝心不與汝異應無二相云何心境相對宛然與汝為二乎此破知也設若非知法塵非色聲香味等有形相者特由知發耳今既非知處當何在色空名一切處今於色空無所表顯豈更在色空之外乎色容有外空豈有外此破非知也復次阿難云何十八界本如來藏妙真如性根境識皆六成十八界界者內外中三各成界限不相雜亂下專就識立論者如三家比隣撤其中家左右界墻則三家界限俱不成矣破界者何妙歸一性也阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界若因色生空無色時汝識應滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恆既從色生應不識知虗空所在若兼二種眼色共生合則中離離則兩合體性雜亂云何成界是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性如汝所明猶乘所解也根塵相對識生其中而成三界因緣生法皆然但不了即空耳故破其執此識為復因眼所生以眼為界因色所生以色為界雙徵雙破又出眼與色不共生一破若因眼生不有色空則識無緣且眼見無形無所表示界從何立此非因眼生也若因色生色滅應與俱滅識既俱滅則空獨存誰識空者若色滅時識不俱滅則識獨存無色為侶誰界空者不但識有無界假使隨色變滅則識已變誰與空為界者不但識滅不應識空假使識不變滅則常與色一體與空無干誰識空者此非因色生也若兼眼與色共生根塵合在一處自無空隙容識而中界之識應離而在傍何成中界又此根塵若離在兩處則所生之識亦應分在兩處半在根半在塵亦不得為中界矣此非眼色共生也色界者色識界也下同諸法不自生亦不從他生不共不無因是故說無生從根生自生也從塵生他生也根塵合生共生也虗空生無因生也四生法前後間出總顯無生之義阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木不應聲聞雜成中界界無中位則內外相復從何成是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性動靜二句無塵也根不成知句無根也必無所知三句牒上無塵則無根也能生之根尚且不成所生之塵作何形貌若取耳中聞性為識者既無前境亦無聞性矣難道取卷葉之形與色觸二塵相對可為識界耶若轉計云識從聲生但此聲相亦許因聞而有則聞聲之時即應謂之聞識何以故以識從聲生故若不聞識則聲非識界若果聞識則識亦同聲全無知覺識既無知已被耳聞知聞識者又是何物若謂更無有知聞識者則汝便應同於草本既單根不出獨境不生豈應根塵交雜以成中界而識生於根境之間耶阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及栴檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性肉形雙爪浮塵根也齅知動搖勝義根也鼻根分此二肉質乃身鼻相轉轉為根矣身知即觸鼻知轉為觸塵矣名身即非鼻名觸即屬身根所對之塵皆非鼻名齅知又分肉空香三義肉即鼻形空指鼻孔肉質之知屬身故曰非鼻若以空為知空有知而肉無知則應一切虗空皆是汝身而汝身反非知矣阿難何所在乎葢虗空無在汝何有在耶香又配臭分二若香臭氣必從鼻生是不出於伊蘭及栴檀木矣伊蘭臭木生末利山二物不來汝自齅鼻為香乎為臭乎鼻不兼聞也若能兼聞是有兩鼻矣若鼻是一不應香臭有二今香臭互奪則鼻之二性尚無自體識界從誰立乎以上俱破識因鼻生以鼻為界也眼識因眼而有既不能見眼鼻識因香而有應不知香若曰能知即非香生若曰不知即不名識香界託知而顯若香自為香不從知有則塊然一物不成香界矣識界託香而立若識自為識不能知香則頑然一物不得從香立界而謂之鼻識矣中間識也內外根境也阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自嘗舌為甜為苦若舌性苦誰來嘗舌舌不自嘗孰為知覺舌性非苦味自不生云何立界若因味生識自為味同於舌根應不自嘗云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生醎淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界不應虗空生汝心識舌味和合即於是中元無自性云何界生是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性若謂識從根生則五味未合時汝自嘗舌為甜為苦若謂舌性是苦則汝舌性已成苦味誰來嘗舌既不能自嘗其舌云何得知舌之成苦味耶若謂舌性非苦則舌不能自生其味云何立界以生識乎若謂識從味生識即是味則不能嘗味同於舌根不自嘗舌云何知其是味非味又一切下言味多識亦應多識體下言識一而味亦一應不知其味之多種若不知其味之多種不得名之為識云何以味為識界乎和合者眾味共成也俱生者本性不易也變易者燒煑異味也不應下辨非無因生舌味下辨非共生言根塵既合為一尚無自性豈有中間空隙之處可容識界之生乎既非自生他生共生無因生即是無生豈因緣所生者哉阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界阿難若因身生必無合離二覺觀緣身何所識若因觸生必無汝身誰有非身知合離者阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性覺觀即身識以離合二境為緣無緣則無識是非因身也無身則不知離合是非因觸也物不觸知徒物不能自觸而知也身知有觸必合身方知有觸也當合知時能知身者何物即觸也能知觸者何物即身也若身即觸則身不可專言身矣若觸即身則觸不可專言觸矣身觸二相互融互奪故無處所合身則無觸位故即為身體離身則無觸用故即同虗空然則內外中間之位皆不成立阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以為法界阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意唯同與異二性無成界云何立若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性所思謂法塵意生於法識生於意若無前法意無所生矣意既離緣而無形則識雖生出亦無所用矣識心即識也思量分別皆意也此識與意同乎異乎若識同意識即意矣何得云意之所生乎若識異意識無知矣無知即與意非類云何名為意生之識乎若許識有知則必意無知矣云何識屬於意同異不成界云何立以上破識因意生也五塵之法各配五根離五塵外意無別法法法者法塵之法也色空動靜通塞即色聲香三塵也合離即味觸二塵也生滅即法塵通承五塵法塵離五塵無體故云生則諸法生滅則諸法滅所因即法塵也前謂識因法生今所因之法自無實體則因之生滅復作何狀耶不有則界亦無矣阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬唯垂哀愍開示眾生中道了義無戲論法和合因緣乃佛初立權教之旨一切世間四句撮其大義發明猶言出現也二俱排擯意專因緣帶過自然因緣和合前已破盡今又何疑前約見性而論故領性體非因緣等而諸法因緣之執尚在今聞陰入處界悉非因緣和合是以又起斯疑葢前疑一性而此疑萬相猶云妙覺性是寂滅法乃第一義不屬因緣已聞命矣陰入處界是生滅法乃第二義定屬因緣云何擯棄之也爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽我當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨阿難如汝所言四大和合發明世間種種變化阿難若彼大性體非和合則不能與諸大雜和猶知虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息阿難如水成氷氷還成水和合與不和合以性相論諸大即相也諸大之性即如來藏心同於變化者性與相同遷也若諸四大之性不和四大之相則性居相外二不相雜此偏於自然墮於常見知不變不知隨緣夫真如隨緣而成相豈同頑空哉若和合者則真如性隨相變遷始終生滅無有休息此偏於因緣墮於斷見知隨緣不知不變夫真如不變豈同變化等相哉阿難唯執和合佛兼不和合而破杜轉計也如水成氷氷還成水直示大性非和不和之理七大之性不因和合循業發現其相如此還字足顯不變正因不變故還為水若真和合則變矣汝觀地性麤為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應知所量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此借阿難所知以破和合也和合之謬不必質諸了義即就小乘析色明空之法觀之極微之塵猶有微色名色邊際相析極微為七分則微色殆盡故名鄰虗既從大地析成虗空可見色無實體全是空中生出矣既依空生則非和合而生明矣今謂和合故生者然則鄰虗塵亦應和合而成乃至虗空亦應和合所成且用幾个虗空合成隣虗耶又用幾个色相合成虗空耶若色合時只合成色相又成不得虗空若空合時又永成虗空終成不得色相且世間但有析色之法那有合空之法虗空與隣虗既非和合而有則諸變化相又豈和合出生耶由汝不知如來藏中性本自空不待析色成空空本自色不待合空成色以此法性身法性土本來清淨本來不動本來周遍故也但眾生心有染淨量有大小業有善惡故各隨其心各應其量各循其業而發起現行轉如來藏為識藏轉如來法性身為根身轉法性土為器界世間迷於清淨本然周徧法界者則惑為因緣墮於斷見迷於隨心應量隨業發現者則執為自然墮於常見皆意識計度分別所生豈知不變隨緣隨緣不變之真宗耶業非但善惡之業兼指日用事業阿難火性無我寄於諸緣汝觀城中未食之家欲炊爨時手執陽燧日前求火阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義先標定火性火無有我寄諸緣而似有我非真和合汝觀下騐出無我汝觀世人手執陽燧對日求火而有火出因名火性和合而生即如現前一千二百五十比丘和合一處名和合眾雖千二百總名一眾詰其根本各有身名種族是真和合若此火性因和合生則彼手執陽燧及艾對日求火而火出應一一詰其根本各有來處此火為從鏡出為從艾出為從日來若日下辨非日來若鏡下辨非鏡出若生下辨非艾生汝又下令其觀所自出言此三物各有處所此火從何所來既於三處詰之了無根本不應無自而出言必有本也汝猶下方指火之來處不在鏡中艾中日中元在如來藏中循業發現非和合也阿難水性不定流息無恆如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水此水為復從珠中出空中自有為從月來阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月書若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義流息無恆者求則有不求則無也太陰精月中水也望前為白月當正中曰晝方諸陰燧水精珠也方諸見月則津而為水此水下詰其出處阿難下辨非月來若從珠出下辨非珠出若從空生下辨非空生汝更下令其審詳出處阿難風性無體動靜不常汝常整衣入於大眾僧伽梨角動及傍人則有微風拂彼人面此風為復出袈裟角發於虗空生彼人面阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和非合不應風性無從自有汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義動靜不常者如搖箑則動不搖則靜也僧伽梨大衣也此風下徵其出處阿難下辨非衣生若生下辨非空生空性常住風應常生者空常而風亦常也若無風時虗空當滅者風滅而空亦滅也滅風可見滅空何狀者風濟則萬竅皆虗故有狀可見空滅應無狀貌可見若是生滅則是可作之法不名虗空既名虗空則知風非是空云何言風從空出若風下辨非面生若謂風不從自己整衣而生生於彼人被拂之面則拂汝為順今反拂彼面豈非倒拂乎動靜不同故曰性隔阿難空性無形因色顯發如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少此空為當因土所出因鑿所有無因自生阿難若復此空無因自生未鑿土前何不無礙唯見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾生心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義空性無形無大小方圓之形量也毗舍商賈首陀農夫頗羅墮利根旃陀羅頑愚此空下詰其生處阿難下辨非無因生若因土下辨非土出若因鑿下辨非鑿出若謂空因鑿出則應隨手鑿出虗空不須出土若謂不因鑿出鑿自出土云何井中得見虗空汝更下警令用心觀察審諦審其實也諦審無浮察也諦觀必欲見其端的也汝心下言汝迷執四大和合不悟四大本如來藏汝但例觀空大審其有出入無出入若悟空大不動周圓非出非入非不出入即悟四大非和非合非不和合阿難見覺無知因色空有如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見明暗相背云何或同離三元無云何或異分空分見本無邊畔云何非同見暗見明性非遷改云何非異汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出見覺空頑非和非合不應見精無從自出若見聞知性圓周徧本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅嘗觸覺觸覺知妙德瑩然徧周法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義見覺即見性常居現量不起分別故曰無知必因色空而顯所謂不變隨緣也如汝下詰其見之起處此見下辨見性不與三法一體以明暗二相自相陵奪見性不殊故若此下辨見性不與三法異體以見性離塵無體故明暗相背下辨非或同或異分空分見下辨非非同非異汝更下令其審察見性畢竟從何處來若見下會成六大作此會者以見相二分元是一體故汝性沉淪者責其溺於因緣不能自出也汝曾不知者汝前因破見性無體重加迷悶我與汝發明至今還不知見精清淨本然周徧法界本如來藏也見性覺明覺精明見者言性中之見即本覺之光明本覺之光明即性明之見豈汝向以眼為見哉如一下會六根也嘗觸即舌根覺觸覺知身意二根也妙德瑩然者言此六根即妙真如性所具之德相大智慧光明故能晝夜常然靈明不昧周徧圓滿其相如此寧有方所而汝執為大小舒縮耶此等皆是循業發現豈真見真聞哉阿難認四大和合故上段責其不悟四大阿難認見性為眼故此段責其不悟見大阿難識性無源因於六種根塵妄出汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗此識了知為生於見為生於相為生虗空為無所因突然而出阿難若汝識性生於見中如無明暗及與色空四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相尚無識從何發若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別若無所因突然而出何不日中別識明月汝更細詳微細詳審見託汝睛相推前境可狀成有不相成無如是識緣因何所出識動見澄非和非合聞聽覺知亦復如是不應識緣無從自出若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅阿難汝心麤浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有汝元不知如來藏中性識明知覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義無源者因根塵而妄出故汝今下騐其無源而妄出觀即根聖眾即塵標指者識眼根周圓而視如鏡中像而無分別不帶名言無籌度心由彼同時意識於性境上起第二念執取名字如某某等名隨念計度分別也阿難下辨單根不生若汝下辨單境不生若生下辨不從空生若謂此識不從見生不從相生是從空生者若非見則色空莫辨若非相則根無從立既無相見唯是一空空則識亦同無若必有識不與根塵相偶縱發汝識欲何分別則離根塵而言識從空生尤不可也若無下辨非無因生汝更下令彼審觀見託二句指根塵可狀二句指色空言此四者歷歷分明汝識從何而出也識動見澄者識有分別故動見無分別故澄動靜不同本非和合定無生處不應識之緣由無從而自出耶若此下會成七大當知了別見聞覺知者了別指識見聞覺知指根謂生了別之見聞覺知也并前五大均名七大者前則會相歸見此則會相見總歸於識也汝心麤浮者責其用心麤淺輕浮不肯深入不悟六根所發之識是如來藏汝應觀察六處識心是同是異是空是有非同非異非空非有若是同不應用中相背若是異不應性中相知若是空不應現有分別若是有不應了無踪跡性識明知覺明真識者言本性之識即妙明之知本覺之明即性真之識汝前所明覺性湛然徧十方界性非生滅者即是此物豈汝向以意識為心知哉含則攝事歸理吐則依體起用十虗即十方虗空其性如此豈有方所而汝執在色身之內不知在色身之內者是循業發現之體非真體也萬法生成不離四大而依空建立因根有覺因識有知所以有七無處不有曰大七大該陰入處界疊疊顯發前方談其皆是真性後乃談其皆周法界前顯法法當體真常後顯法法圓融周徧由淺入深也五陰中以喻比法用破執情六入中指假說事顯其妄相十二處至七大即於見前見聞之境示其藏性從疎向親也爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙是諸大眾各各自知心徧十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含裹十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從了然自知獲本妙心常住不滅禮佛合掌得未曾有於如來前說偈讚佛破妄中并見精亦破是破到微妙處顯真處并萬相皆真是顯到微妙處所謂微妙開示也阿難大眾初認心在身內今知心徧十方矣初以虗空為大今悟妙心廣大觀十方空僅如手持葉物矣初以目前諸物作障今了一切物皆即妙明真心矣初認父母所生之身為實而生愛戀今觀此身如空中一塵巨海一漚存亡起滅了不可得矣初執妄想生滅為心今了知妙心常住不滅矣自知心徧句是大頭腦下由大及小層層照破皆承知字來以了然自知二句總結初卷佛言不知常住真心可見知之一字眾妙之門當不知時只謂虗空中有萬物萬物中有身身中有心是至大無如虗空至小無如心矣今也眼目頓開忽見心量徧周法界始知空生大覺不過手中一葉耳空且如此何況空中所有之物何況父母所生之身此時遍觀萬物全一真心不復為物所轉唯有心精含包十方及觀肉身渺小虗妄不復以心惑為色身之內矣向來佛責不知常住真心今日了然自知如乞兒獲寶安得不歡喜贊嘆發願報恩耶妙湛總持不動尊首楞嚴王世希有銷我億劫顛倒想不歷僧祇獲法身願今得果成寶王還度如是恆沙眾將此深心奉塵剎是則名為報佛恩伏請世尊為證明五濁惡世誓先入如一眾生未成佛終不於此取泥洹大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場舜若多性可銷亡爍迦羅心無動轉妙湛總持不動即妙覺湛然不動周徧也如是德為聖中尊讚佛也首楞嚴王世希有讚法也無始迷真妄認緣影及因緣自然乃億劫顛倒想也一蒙開示了獲本心不歷僧祇獲法身矣後經理則頓悟乘悟并消是也願得聖果智心也即佛道無上誓願成還度眾多悲心也即眾生無邊誓願度智悲雙運廣大無量即深心也徧奉塵剎諸佛以明行必廣也請佛為證者濁世難入仗佛威神庶遠魔事不違本願也泥洹此云滅度度盡眾生方成佛道再申前願能破眾生惑之堅體曰大雄能拔眾生惑之深根曰大力與眾生二嚴之樂曰大慈拔眾生二死之苦曰大悲雖獲法身猶有無明微細惑仗佛審諦而除破之即煩惱無盡誓願斷後經事須漸除因次第盡是也早登無上覺坐道場而度眾生亦申前願舜若多此云空爍迦羅此云堅固虗空決不可銷極言此願決不動轉
