front:
  text: 楞嚴經如説大佛頂如來密因修證了義諸菩薩萬行首楞嚴經天竺沙門般剌密諦譯天竺西域國之總名沙門此云勤息勤行善法止息惡行般剌密諦此云極量譯師名也譯者翻梵字而成華字五天世主最寶此經祕而不傳般剌密諦欲傳震旦密藏而來竟被獲回後以微妙細㲲書之破臂藏於皮中航海而達廣州時唐中宗神龍元年宰相房融在廣請就制止寺譯出烏萇國沙門彌伽釋迦譯語烏萇此云苑古大國之苑囿在北天竺彌伽釋迦此云能降伏譯語即度語謂裁度兩方正理翻梵語而成華言唐菩薩戒弟子同中書門下平章事房融筆受菩薩戒者宰官而受菩薩戒者也弟子者以三寶為大師也同者兼也中書門下二俱內省即左右相府也平章事者平和章明國家之政筆受者譯語或拙則秉筆而潤色之房相在譯場中亦兼此職故與二師互顯其功楞嚴經敘首楞嚴經者諸佛之慧命衆生之達道教網之宏綱禪門之要關也世尊成道以來五時設化無非為一大事因緣求其總攝化機直指心體發宣真勝義性簡定真實圓通使人轉物同如來彈指超無學者無尚楞嚴矣釋其名則一切事究竟堅固所謂徹法底源無動無壞而如來密因菩薩萬行靡不資始乎此歸極乎此考其所詮則談圓理以明真性開圓行以示真修其性也體用雙彰其修也果因一契原始要終了義之説也良由諸修行人背真向妄不成無上菩提或愛念小乘得少為足或欲漏不除畜聞成過故阿難以多聞邪染為緣浚發大教世尊首告之曰一切衆生生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉又曰有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路斯一經理行之大本歟由是破七處攀緣別二種根本因見顯心因心顯見雖心見互顯而正顯在心如以盲人矚暗喻見非眼屈指飛光驗見不動印觀河之非變比垂手之無遺辨於八還擇於諸物非舒非縮無是無非使悟淨圓真心妄為色空及聞見耳既悟妄為尚疑混濫故又破自然因緣示見見之非見合別業同分指見妄之所生且以一人例多人一國例諸國總顯器界根身同一妄耳自淺而深自狹而廣雖多方顯妄而所顯唯真故又舉陰入處界廣及七大會入如來藏性使悟物我同根是非一體妄無自性全體即真凡十界依正之相皆循業發現而已既悟即真尚迷循發故又答山河大地之難深窮生起之由譬虗空不拒諸相發揮顯真妙覺明圓照法界一多互應小大相容即體即用非俗非真至於離即離非是即非即則藏心妙性不涉名言矣復引照鏡狂走喻妄無因結責多聞勸修無漏通而言之皆圓理也理解雖圓非行莫證故又明二決定義初審因地發心伏斷無明為修行之要次審煩惱根本意擇圓根為發行之由於是定六根優劣令一門深入擊鐘驗常綰巾示結陳二十五聖所證法門敕選耳根為初心方便而又教以攝心軌則安立道場遂聞四種律儀頂光神呪通而言之皆圓行也乃至由三增進成就五十五位真菩提路雖談證位未盡行因下而戒業習於七趣情想防禪定於五陰魔邪無非行門之事必期於圓滿菩提歸無所得始名究竟堅固之證也然則依究竟堅固之理立究竟堅固之行修究竟堅固之行證究竟堅固之理楞嚴教旨大抵如是科經者合理行為正宗離正宗為五分一見道二修道三證果四結經五助道謂見道而後修道修道而後證果此常途之序耳究論上根修證如發明藏性之後謂不歷僧祇獲法身請入華屋之前謂疑惑銷除心悟實相之類豈局於常哉夫欲發真歸元明心見性者於此宜盡心焉故集諸師佳注而成會解元至正壬午廬陵沙門惟則天如述興福法師惟慤資中法師弘沇吳興法師仁嶽真際法師崇節擕李法師洪敏泐潭禪師曉月長水法師子璿孤山法師智圓溫陵禪師戒環楞嚴經如説原序妙性真如是謂大佛頂大定堅固斯名首楞嚴始中終所不得異過現未所不能殊顧圓通止趣一途修證必資萬行所以用果為因因曰密因乘因得果義曰了義行此乃能成佛昧此無由結經然舍利得祕記涅槃兼緣覺聲聞而畢舉阿難請最初方便雖內祕外現而俱遺蓋法華功成而位已極追談中路所經楞嚴就學而志無前豫斷化城之想結集明眼利根棄小舉要陳義不待其終開經已示其極括五十五位中約佛子善超之數語而圓通之法已見前矣就二十五聖內舉目連拘絺之六尊而圓通之人豈外此乎古今名宿分曹竪義殫力參微然意義幽深會者未易即文辭巧妙晦者亦多近三懷法師辨才無礙而不注一經人問其故曰不優文辭安敢注經若不得已以文士之筆代僧家之舌庶幾相濟旨哉斯言幾於無我夫行文之妙經難解已如斯矣況析理之深心要渺當何似焉要其大槩亦略可言生死之根本有二緣心最粗業識為細豈容一往無分菩提之途路無多真心獨露見性自除焉得兩存不廢旋妄而得法忍所旋者豈七番所破之心舍湛而至不搖所舍者正八識所邊之際見見何時乃如來照生相無明之候聞聞何法斯菩薩入見前寂滅之門從破自破他破共破無因悟生滅之本無故曰聞曰思曰修曰如幻證圓通之不隔第現業唯行可消宿愆非呪不敵既從頂出即是佛身立見邪逃豈關魔號言思已斷證悟斯存等妙前之頓漸境自分明乾慧後之淺深人多混濫諸天因地不真何以寄回心之聖二乘取途非錯何以墮邪見之流即數處之覺迷關全經之明晦不揣頑冥妄希信解研討五年棲尋衆典賀居士中男慧性辨才深心閎覽昔聚白門演説數過中來閩署披剝四旬辨因果於茲經析異同於諸教較如觀果快若拈華自謂厥衷所蘊非緣余筆不宣亦恐遺亡勉為疏緝幾回易稿始得成書居士來楚重事推詳猥蒙證可取經中如所如説之語爰名如説明天啓甲子佛弟子竟陵鍾惺伯敬撰如説新序佛之説法非於法外有説也如法説之而已後人之説經亦不宜於經外有説也如經説之而已有求多於説者或摘經之一二字以為脈絡之通或割經之前後章以為科分之晣其説也病在支離夫支離於經中已非如矣或以己學之所得師門之所傳不問經旨之果然而必以其意妄合之其説也病在附會附會於經外非如益甚焉善哉周子訥公之説楞嚴一本於如也夫楞嚴一經始自徵心極於見見觀觀宗門參究之指備矣由儀律道場歷五十五位絶諸七趣證與修畢舉因與果並彰其所説之法比他經為最全終辨入邪諸魔功尤最盡使後之學者但如經之文説經之意已莫可殫究支離附會之説又何容增益其間哉舊之説楞嚴者數十家説無全是非以如不如辨之其區別何可爽往者伯敬鍾公廣搜而約衷之唯擇其精不摘其謬但取其義不名其人題之曰如説周子深契是經無以易是説特梓而新之以行世蓋非周之説而鍾之説也又非鍾之説而諸家之説亦非諸家之説而佛之説并非佛他經之説而楞嚴之説説於經如於法如至矣蔑以加矣於此如於彼如求異同於其間不可得操是説也推之以説他經亦猶是矣賜進士出身山西布政使司布政使擕李佛弟子王庭康熙十八年菊月重陽後十日敬題
